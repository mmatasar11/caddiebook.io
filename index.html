<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Caddie Book</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Caddie Book">
<meta name="theme-color" content="#185C37">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%23185C37'/%3E%3Ccircle cx='90' cy='90' r='34' fill='%23FBFAF6'/%3E%3Ccircle cx='90' cy='90' r='9' fill='%23D22E2E'/%3E%3C/svg%3E">
<style>
/* ═══ src/css/theme.css ═══ */
/* ============================================================
   THEME TOKENS — every knob in one place
   ============================================================
   Change values here (or override from src/js/theme.js) and the
   whole app follows. Nothing in app.css hardcodes a color.
   ============================================================ */
:root{
  /* ---- surfaces ---- */
  --paper:#F6F2E6;        /* cream card-stock — the scorecard itself */
  --card:#FFFDF7;         /* card / sheet / input surfaces */
  --line:#E4DFD0;         /* hairline borders and dividers */

  /* ---- text ---- */
  --ink:#1C1F1A;          /* pencil-ink primary text */
  --ink2:#6B7066;         /* secondary / muted text */

  /* ---- brand ---- */
  --turf:#17693E;         /* primary green: links, accents, selected pads */
  --turf-deep:#0C3D24;    /* felt green: primary buttons, hero, tab bar */
  --turf-soft:#E4F1E9;    /* green tint: good-stat pills, lie badges */
  --flag:#CE2B21;         /* scorecard red: birdie circles, the pure cell */
  --flag-soft:#FCEAE7;    /* red tint: bad-stat pills, danger buttons */
  --sand:#F3ECD9;         /* warm tint: banners, warnings */
  --amber:#A07A22;        /* brass — trophies, hints, warm text */
  --sky:#EAF2F8;          /* cool tint: hole-history line */

  /* ---- shape & size ---- */
  --r:18px;               /* large radius: cards, sheets, hero */
  --rs:11px;              /* small radius: inputs, banners */
  --tap:52px;             /* minimum touch target (buttons) */
  --sh:0 1.5px 0 rgba(28,31,26,.10), 0 6px 18px rgba(28,31,26,.07); /* pressed-card shadow */
  --stamp:3px 3px 0 rgba(28,31,26,.16); /* offset "rubber stamp" shadow for primary actions */

  /* ---- type ---- */
  /* System stacks only — no webfonts, so offline needs zero requests. */
  --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace; /* ALL numbers */
  --ui:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}

/* ============================================================
   HIGH-VISIBILITY THEME — Settings → outdoor theme
   Pure black-on-white, thicker borders, bigger targets.
   Add alternate themes the same way: a body class that
   re-declares tokens. Toggle it from render().
   ============================================================ */
/* high visibility */
body.hivis{--paper:#FFFFFF;--card:#FFFFFF;--ink:#000;--ink2:#333;--line:#8F8F8F;
  --turf:#0B4A28;--turf-deep:#07351C;--flag:#C40000;--tap:60px;--sh:none;font-size:17px}
body.hivis .pad button{min-height:64px;border-width:2.5px}
body.hivis .btn{border-width:2.5px}
body.hivis .card{border-width:2px}

/* ═══ src/css/app.css ═══ */
/* ============================================================
   APP STYLES — layout + components (tokens live in theme.css)
   ============================================================
   Sections below in order: reset/shell, nav, cards, buttons &
   chips, forms, the 3×3 numpad (entry + heatmap variants),
   shot rows, hole header, overview grid, bottom sheet, keypad,
   course grid, tables, tips & drills, misc, responsive.
   ============================================================ */
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:var(--ui);background:var(--paper);color:var(--ink);font-size:16px;
  padding-top:env(safe-area-inset-top);
  padding-bottom:calc(80px + env(safe-area-inset-bottom));user-select:none;-webkit-user-select:none}
input,textarea{user-select:text;-webkit-user-select:text}
button{font-family:var(--ui);color:var(--ink)}
a{color:var(--turf);font-weight:700;text-decoration:none}
.num{font-family:var(--mono);font-weight:700;font-variant-numeric:tabular-nums}

/* ---------- shell ---------- */
#view{max-width:560px;margin:0 auto;padding:14px 14px 24px}
#nav{position:fixed;left:0;right:0;bottom:0;background:var(--turf-deep);
  display:flex;z-index:40;padding:5px 6px;padding-bottom:calc(5px + env(safe-area-inset-bottom))}
#nav button{flex:1;background:none;border:0;border-radius:13px;margin:0 2px;padding:8px 0 6px;font-size:10.5px;font-weight:700;
  letter-spacing:.05em;text-transform:uppercase;color:rgba(255,253,247,.65)}
#nav button .ic{display:block;font-size:21px;line-height:1.2;filter:grayscale(1) brightness(3);opacity:.7}
#nav button.on{background:var(--card);color:var(--turf-deep)}
#nav button.on .ic{filter:none;opacity:1}

.topbar{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:2px 0 12px;min-height:40px}
.pageTitle{display:flex;align-items:baseline;justify-content:space-between;margin:4px 2px 14px}
.pageTitle h1{margin:0;font-size:27px;font-weight:800;letter-spacing:-.03em}
.eyebrow{font-size:11px;font-weight:800;letter-spacing:.13em;text-transform:uppercase;color:var(--turf)}

.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);margin-bottom:14px;overflow:hidden;box-shadow:var(--sh)}
.card>.hd{padding:11px 16px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:8px}
.card>.hd .t{font-size:11.5px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--ink2)}
.card>.bd{padding:13px 16px}
.card>.bd.tight{padding:0}
.card.hero{background:linear-gradient(140deg,var(--turf-deep),var(--turf) 70%,#2E8253);color:#fff;border:0}
.card.hero .k{font-size:10px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;opacity:.75}
.card.hero .muted{color:rgba(255,255,255,.75)}

.row{display:flex;gap:8px;align-items:center}
.grow{flex:1}
.muted{color:var(--ink2)}
.small{font-size:13px}
.right{text-align:right}
.center{text-align:center}
hr.sep{border:0;border-top:1px solid var(--line);margin:11px 0}

/* ---------- buttons & chips ---------- */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:var(--tap);
  padding:0 18px;border:1.5px solid var(--ink);border-radius:14px;background:var(--card);
  font-size:16px;font-weight:700;cursor:pointer}
.btn.primary{background:var(--turf-deep);border-color:var(--turf-deep);color:#fff;box-shadow:var(--stamp)}
.btn.primary:active{transform:translate(2px,2px);box-shadow:1px 1px 0 rgba(28,31,26,.16)}
.btn.danger{background:var(--flag-soft);border-color:transparent;color:var(--flag)}
.btn.ghost{border-color:var(--line);color:var(--ink2);background:transparent}
.btn.wide{width:100%}
.btn.sm{min-height:38px;padding:0 12px;font-size:14px;border-width:1px;border-radius:11px}
.btn:active{transform:scale(.97)}

.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{min-height:44px;padding:0 14px;display:inline-flex;align-items:center;justify-content:center;
  border:1.5px solid var(--line);border-radius:999px;background:var(--card);font-weight:700;font-size:15px;cursor:pointer}
.chip.on{border-color:var(--turf-deep);background:var(--turf-deep);color:#fff}
.chip.hint{border-color:var(--amber);background:var(--sand)}
.chip.sm{min-height:34px;font-size:13px;padding:0 11px}
.seg{display:flex;background:var(--paper);border-radius:12px;padding:3px;gap:3px}
.seg button{flex:1;min-height:38px;border:0;border-radius:9px;background:transparent;font-weight:700;font-size:14px;color:var(--ink2)}
.seg button.on{background:var(--card);color:var(--ink);box-shadow:var(--sh)}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}

label.f{display:block;font-size:11.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--ink2);margin:11px 0 5px}
input.f,textarea.f,select.f{width:100%;min-height:48px;padding:8px 13px;font-size:17px;border:1.5px solid var(--line);
  border-radius:var(--rs);background:var(--card);color:var(--ink);font-family:var(--ui)}
input.f:focus,textarea.f:focus{outline:none;border-color:var(--turf)}
input.f.num{font-family:var(--mono);font-weight:700}
textarea.f{min-height:80px}

/* ---------- signature numpad ---------- */
.pad{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;max-width:340px}
.pad button{position:relative;aspect-ratio:1.35/1;min-height:56px;border:1.5px solid var(--line);border-radius:13px;
  background:var(--card);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;padding:2px}
.pad button .d{font-family:var(--mono);font-weight:800;font-size:20px;line-height:1}
.pad button .l{font-size:9.5px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:var(--ink2);margin-top:3px}
.pad button.pure{border-color:var(--flag)}
.pad button.pure::after{content:"";position:absolute;top:7px;right:7px;width:7px;height:7px;border-radius:50%;background:var(--flag)}
.pad button.on{background:var(--turf-deep);border-color:var(--turf-deep);color:#fff}
.pad button.on .l{color:#CFE6D8}
.pad button.on.pure{background:var(--flag);border-color:var(--flag)}
.pad .axis{grid-column:1/-1;display:flex;justify-content:space-between;font-size:10px;font-weight:800;
  letter-spacing:.1em;text-transform:uppercase;color:var(--ink2);padding:0 2px}
.pad.heat button{cursor:default;min-height:62px}
.pad.heat button .pct{font-family:var(--mono);font-weight:800;font-size:17px}
.pad.heat button .n{font-size:10px;color:var(--ink2);font-family:var(--mono)}

/* ---------- shots ---------- */
.shotRow{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--line);cursor:pointer}
.shotRow:last-child{border-bottom:0}
.shotRow .sn{font-family:var(--mono);font-weight:800;color:var(--ink2);width:20px}
.shotRow .club{font-weight:800;width:44px}
.shotRow .lie{font-family:var(--mono);font-weight:700;font-size:12.5px;background:var(--turf-soft);color:var(--turf-deep);border-radius:7px;padding:3px 7px}
.shotRow .fin{font-family:var(--mono);font-weight:700;font-size:14px}
.penRow{background:var(--flag-soft)}
.penRow .lie{background:#fff;color:var(--flag)}

/* ---------- hole header ---------- */
.holeHd{display:flex;align-items:stretch;gap:10px;margin-bottom:12px}
.holeNo{border-radius:14px;background:var(--card);color:var(--ink);min-width:76px;border:2.5px solid var(--ink);
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:7px;
  transform:rotate(-2deg);box-shadow:var(--stamp)}
.holeNo .h{font-size:10px;font-weight:800;letter-spacing:.15em;text-transform:uppercase;opacity:.7}
.holeNo .n{font-family:var(--mono);font-weight:800;font-size:34px;line-height:1}
.holeMeta{flex:1;border:1px solid var(--line);border-radius:var(--r);background:var(--card);
  display:grid;grid-template-columns:1fr 1fr 1fr;align-items:center;box-shadow:var(--sh)}
.holeMeta div{text-align:center;padding:6px 2px}
.holeMeta .k{font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--ink2)}
.holeMeta .v{font-family:var(--mono);font-weight:800;font-size:22px}

.statChips{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}
.stat{border:1px solid var(--line);border-radius:9px;padding:6px 10px;font-size:12.5px;font-weight:700;background:var(--card)}
.stat b{font-family:var(--mono)}
.stat.good{border-color:var(--turf);color:var(--turf-deep);background:var(--turf-soft)}
.stat.bad{border-color:transparent;color:var(--flag);background:var(--flag-soft)}

/* ---------- overview grid ---------- */
.ovGrid{display:grid;grid-template-columns:repeat(9,1fr);gap:4px}
.ovCell{border:1px solid var(--line);border-radius:9px;padding:4px 2px;text-align:center;cursor:pointer;background:var(--card)}
.ovCell .hn{font-size:9px;font-weight:800;color:var(--ink2)}
.ovCell .sc{font-family:var(--mono);font-weight:800;font-size:16px}
.ovCell .dots{font-size:8px;letter-spacing:1px;min-height:10px}
/* classic scorecard notation: circle a birdie, square a bogey, double-box worse */
.ovCell.under{border:2px solid var(--flag);border-radius:50%;color:var(--flag)}
.ovCell.under .sc{color:var(--flag)}
.ovCell.over1{border:2px solid var(--ink);border-radius:4px}
.ovCell.overX{border:2px solid var(--ink);border-radius:4px;box-shadow:inset 0 0 0 2px var(--card), inset 0 0 0 3.5px var(--ink)}

/* ---------- sheet ---------- */
#sheetWrap{position:fixed;inset:0;background:rgba(15,20,17,.5);z-index:60;display:none;align-items:flex-end;justify-content:center}
#sheetWrap.open{display:flex}
#sheet{background:var(--paper);border-radius:22px 22px 0 0;width:100%;max-width:560px;
  max-height:90vh;overflow-y:auto;padding:16px 16px calc(24px + env(safe-area-inset-bottom));-webkit-overflow-scrolling:touch}
#sheet::before{content:"";display:block;width:40px;height:4px;border-radius:2px;background:var(--line);margin:0 auto 12px}
#sheet .sheetHd{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
#sheet .sheetHd .t{font-size:18px;font-weight:800;letter-spacing:-.01em}
.sec{margin:15px 0 5px;font-size:11px;font-weight:800;letter-spacing:.13em;text-transform:uppercase;color:var(--turf)}

.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;max-width:300px}
.keypad button{min-height:52px;border:1.5px solid var(--line);border-radius:13px;background:var(--card);
  font-family:var(--mono);font-weight:800;font-size:22px;cursor:pointer}
.keypad button:active{background:var(--turf-soft)}
.distShow{font-family:var(--mono);font-weight:800;font-size:34px;min-width:110px;text-align:right;
  border-bottom:3px solid var(--ink);padding:0 6px 2px;line-height:1.1}
.distShow .u{font-size:15px;color:var(--ink2);font-weight:700}

/* course grid */
.crsGrid{width:100%;border-collapse:collapse}
.crsGrid th{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--ink2);padding:4px 2px;text-align:center}
.crsGrid td{padding:3px 2px;text-align:center;border-top:1px solid var(--line)}
.crsGrid .hn{font-family:var(--mono);font-weight:800;color:var(--ink2)}
.parBtns{display:flex;gap:3px;justify-content:center}
.parBtns button{width:34px;height:38px;border:1px solid var(--line);border-radius:8px;background:var(--card);
  font-family:var(--mono);font-weight:800;font-size:15px}
.parBtns button.on{background:var(--turf-deep);border-color:var(--turf-deep);color:#fff}
.crsGrid input{width:56px;min-height:38px;text-align:center;border:1px solid var(--line);border-radius:8px;
  font-family:var(--mono);font-weight:700;font-size:15px;padding:2px}
.crsGrid input.si{width:42px}

table.data{width:100%;border-collapse:collapse;font-size:14px}
table.data th{font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--ink2);
  text-align:left;padding:8px 9px;border-bottom:1.5px solid var(--ink)}
table.data td{padding:8px 9px;border-bottom:1px solid var(--line)}
table.data td.num,table.data th.num{text-align:right;font-family:var(--mono)}
table.data tr:last-child td{border-bottom:0}

/* tips & drills */
.tipCard{border:1px solid var(--line);border-radius:var(--r);background:var(--card);padding:13px 15px;margin-bottom:10px;box-shadow:var(--sh)}
.tipCard .tt{font-weight:800;font-size:16px;display:flex;justify-content:space-between;gap:8px}
.tipCard .tb{margin-top:6px;white-space:pre-wrap;font-size:15px;line-height:1.45}
.tipCard img{max-width:100%;border-radius:10px;margin-top:8px}
.tag{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;
  background:var(--turf-soft);color:var(--turf-deep);border-radius:7px;padding:3px 8px;margin:6px 6px 0 0}
.pinBadge{color:var(--amber);font-size:14px}
details.drill{border:1px solid var(--line);border-radius:var(--rs);background:var(--card);margin-bottom:8px;overflow:hidden}
details.drill summary{list-style:none;cursor:pointer;padding:13px 15px;font-weight:800;display:flex;justify-content:space-between;align-items:center;gap:8px}
details.drill summary::-webkit-details-marker{display:none}
details.drill summary::after{content:"▾";color:var(--ink2)}
details.drill[open] summary::after{content:"▴"}
details.drill .db{padding:0 15px 13px;font-size:14.5px;line-height:1.5;white-space:pre-wrap;color:var(--ink)}

.banner{border:0;background:var(--sand);border-radius:var(--rs);padding:10px 13px;
  font-size:14px;font-weight:600;margin-bottom:12px;display:flex;gap:8px;align-items:center;cursor:pointer}
.spark{display:block}
.spark polyline{fill:none;stroke:var(--turf);stroke-width:2.5}
.spark circle{fill:var(--flag)}

.listRow{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid var(--line);cursor:pointer}
.listRow:last-child{border-bottom:0}
.listRow .main{flex:1}
.listRow .ti{font-weight:800;font-size:16px}
.listRow .sub{font-size:13px;color:var(--ink2);margin-top:2px}
.listRow .arr{color:var(--ink2);font-size:18px}

.quip{border-left:4px solid var(--turf);padding:8px 13px;margin:0 0 12px;font-size:16px;font-style:italic;line-height:1.4;background:var(--card);border-radius:0 var(--rs) var(--rs) 0}
.quip .by{display:block;font-style:normal;font-size:12px;font-weight:700;color:var(--ink2);margin-top:5px}

.courseChip{min-width:150px;flex:0 0 auto;border:1px solid var(--line);border-radius:var(--r);background:var(--card);
  padding:12px 14px;cursor:pointer;box-shadow:var(--sh)}
.courseChip .cn{font-weight:800;font-size:15px;line-height:1.2}
.courseChip .cs{font-size:12px;color:var(--ink2);margin-top:3px}
.hscroll{display:flex;gap:9px;overflow-x:auto;padding:2px 2px 8px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.hscroll::-webkit-scrollbar{display:none}

.insight{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:14.5px;line-height:1.4}
.insight:last-child{border-bottom:0}
.insight .ii{font-size:17px}

@media (max-width:380px){ .ovGrid{grid-template-columns:repeat(6,1fr)} }

/* segmented controls used across play + start sheet */
.segs{display:flex;background:#E9EBE7;border-radius:12px;padding:3px;gap:3px}
.segs button{flex:1;min-height:40px;border:0;border-radius:9px;background:transparent;font-weight:700;font-size:14px;color:var(--ink2);cursor:pointer}
.segs button.on{background:var(--card);color:var(--ink);box-shadow:var(--sh)}
/* quick-score button grid (Basic mode) */
.qgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.qgrid button{min-height:56px;border:1.5px solid var(--line);border-radius:12px;background:var(--card);
  font-family:var(--mono);font-weight:800;font-size:19px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center}
.qgrid button .sub{font-family:var(--ui);font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--ink2)}
.qgrid button.on{background:var(--turf-deep);border-color:var(--turf-deep);color:#fff}
.qgrid button.on .sub{color:#CFE6D8}
/* hero number + hole history line */
.big{font-family:var(--mono);font-weight:800;font-size:44px;line-height:1}
.histLine{display:flex;gap:8px;align-items:center;background:var(--sky);border-radius:var(--rs);
  padding:9px 12px;font-size:13.5px;margin-bottom:10px}
.histLine b{font-family:var(--mono)}


/* ---------- strokes gained bars ---------- */
.sgRow{display:flex;align-items:center;gap:10px;padding:6px 0}
.sgLab{width:92px;font-size:13px;font-weight:800}
.sgTrack{flex:1;position:relative;height:16px;background:var(--paper);border-radius:8px;overflow:hidden}
.sgTrack i{position:absolute;left:50%;top:0;bottom:0;width:1.5px;background:var(--line)}
.sgBar{position:absolute;top:2px;bottom:2px;border-radius:6px}
.sgBar.pos{background:var(--turf)}
.sgBar.neg{background:var(--flag)}
.sgVal{width:52px;text-align:right;font-weight:800}
.sgVal.good{color:var(--turf-deep)} .sgVal.bad{color:var(--flag)}

/* pencil-dashed distance underline */
.distShow{border-bottom:none;background-image:linear-gradient(90deg,var(--ink) 60%,transparent 0);
  background-size:10px 3px;background-repeat:repeat-x;background-position:0 100%;padding-bottom:5px}
</style>
</head>
<body>
<div id="view"></div>
<nav id="nav"></nav>
<div id="sheetWrap"><div id="sheet"></div></div>
<script>
/* ═══════════════ src/js/01-core.js ═══════════════ */
'use strict';
/* ============================================================
   CADDIE BOOK — personal golf scoring, data & practice
   ============================================================
   Single-user, offline-first. One HTML file at runtime; this
   modular source tree is assembled by build.js (see the
   manifest there for load order — it matters, later modules
   call things defined in earlier ones).

   MODULE MAP
   ----------
   01-core        storage primitives + tiny utilities (this file)
   02-store       the state object S: schema, seeds, load/save
   03-notation    the 1-9 notation system constants
   04-engine      per-hole and per-round derivation
   05-handicap    WHS handicap math + stat filters
   theme          THEME override object (restyle in one place)
   components     ui.* reusable HTML builders
   06-router      bottom nav registry + render()
   07-play-home   Play hub, history, course pages
   08-course-editor  manual grid, paste parser, online lookup
   09-hole        the on-course hole screen (Shots + Quick modes)
   10-shot-sheet  the tap-first shot entry sheet
   11-round-views overview grid, finish, past-round detail
   12-stats       stats dashboard, heatmaps, yardages, insights
   13-practice    drill library + sessions + TrackMan logging
   14-tips        tips/swing-thought library
   15-more        bag, courses list, settings, golf-isms
   16-data        JSON backup, CSV, AI text, 18Birdies import
   17-init        sheet/toast plumbing, boot, console bridge
   ============================================================ */

/* ---------- persistence primitives ----------
   Everything lives under ONE localStorage key as a JSON blob.
   If localStorage is unavailable (private mode edge cases) we
   fall back to memory and render() shows a warning banner. */
const DBKEY = 'caddiebook_v1';
let MEMSTORE = null;       // in-memory fallback when localStorage fails
let STORAGE_OK = true;     // flips false on the first storage error

/** Read the raw JSON blob (or null on first run). */
function storeGet(){
  try { return localStorage.getItem(DBKEY); }
  catch(e){ STORAGE_OK = false; return MEMSTORE; }
}
/** Write the raw JSON blob; always mirrors to memory first so a
 *  storage failure never loses the in-session state. */
function storeSet(v){
  MEMSTORE = v;
  try { localStorage.setItem(DBKEY, v); }
  catch(e){ STORAGE_OK = false; }
}

/* ---------- tiny utilities used everywhere ---------- */
/** Unique-enough id: time base36 + 6 random chars. */
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
/** HTML-escape user text before interpolation into templates. */
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
/** querySelector shorthand. */
const $ = s => document.querySelector(s);
/** Local date as YYYY-MM-DD (round dates, backups). */
function todayISO(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
/** YYYY-MM-DD → M/D/YY for display. */
function fmtDate(iso){ if(!iso) return ''; const [y,m,d]=iso.split('-'); return `${m}/${d}/${String(y).slice(2)}`; }

/* ---------- small stats helpers ---------- */
/** Median of a numeric array (null if empty). */
function median(a){ if(!a.length) return null; const s=[...a].sort((x,y)=>x-y); const m=Math.floor(s.length/2); return s.length%2? s[m] : (s[m-1]+s[m])/2; }
/** Linear-interpolated quantile, q in [0,1]. */
function quantile(a,q){ if(!a.length) return null; const s=[...a].sort((x,y)=>x-y); const p=(s.length-1)*q; const b=Math.floor(p); return s[b] + (s[Math.min(b+1,s.length-1)]-s[b])*(p-b); }
/** Arithmetic mean (null if empty). */
function mean(a){ return a.length? a.reduce((x,y)=>x+y,0)/a.length : null; }
/** Sample standard deviation (null if n<2). */
function sd(a){ if(a.length<2) return null; const m=mean(a); return Math.sqrt(a.reduce((s,x)=>s+(x-m)*(x-m),0)/(a.length-1)); }
/** Format helpers: one decimal / whole number / percentage, all '–' safe. */
function r1(x){ return x==null? '–' : (Math.round(x*10)/10).toFixed(1); }
function r0(x){ return x==null? '–' : String(Math.round(x)); }
function pct(n,d){ return d? Math.round(100*n/d)+'%' : '–'; }

/** Parse the saved blob, merge over defaults (see MIGRATION RULE above). */
function loadState(){
  const raw = storeGet();
  if(!raw) return defaultState();
  try{

    const d = defaultState();
    s.settings = Object.assign(d.settings, s.settings||{});
    for(const k of ['clubs','courses','rounds','tips','quips','practice']) if(!Array.isArray(s[k])) s[k]=d[k];

/* ============================================================
   NOTATION SYSTEM — the conceptual core
   ============================================================
   One rule governs every 3×3 pad: 5 is pure, the ring is the
   miss, horizontal = left/right, vertical = more/less.
   Digits are stored raw (1-9); which pad they came from is
   carried separately (shot.fType / shot.shape), so a green-4,
   putt-4 and shape-4 can never be confused in analysis.

   EXTENSION POINT: a new lie code, strike tag, wind direction
   or TrackMan metric is one row in the arrays below — pickers,
   exports and stats all read from here.
   ============================================================ */
/* The lie picker (datadriven.golf-style). Each shot = distance-to-hole + lie;
   the shot's RESULT is simply the next shot's position, so most swings need
   no result entry at all. PN (Penalty) = playing after a drop for OB/water/
   lost ball — it is a real position AND adds one penalty stroke. */
const LIES = [
  ['T','Tee'],['FW','Fairway'],['RF','Rough'],['DR','Deep rough'],
  ['SD','Sand'],['RC','Recovery'],['GR','Green'],['PN','Penalty']
];
const LIE_NAME = Object.assign(Object.fromEntries(LIES),
  {FR:'Fringe', HZ:'Drop'});   // legacy codes from pre-v4 rounds still display
const LATS = ['LL','L','C','R','RR'];
const LAT_NAME = {LL:'Far left',L:'Left',C:'On line',R:'Right',RR:'Far right'};

/* GREEN PAD SEMANTICS (v5): the digit is relative to YOUR TARGET, not the
   pin and not the green. Aim middle with a back pin, finish on the front
   fringe = a "short" (2) that still may have hit the green. Whether the
   GREEN was hit is never asked — the chain answers it (next lie = GR).
   This separates dispersion (the pad) from outcome (GIR), which is the
   only way both stay honest. */
/* PUTT COMPASS (v6): the same 3×3, spoken in putter. Columns = start line
   vs your aim line (pulled | on path | pushed). Rows = pace (long | good |
   short). 5 = pure: on path with good pace — which is also what every
   holed putt is. Center (5) = holed — the engine keys on pad===5. */
const PAD_LABELS = {
  green:{7:'Long-L',8:'Long',9:'Long-R',4:'Left',5:'ON TARGET',6:'Right',1:'Short-L',2:'Short',3:'Short-R'},
  putt: {7:'Pull-Long',8:'Long',9:'Push-Long',4:'Pulled',5:'MADE',6:'Pushed',1:'Pull-Short',2:'Short',3:'Push-Short'},
  shape:{7:'Pull-draw',8:'Draw',9:'Push-draw',4:'Pull',5:'STRAIGHT',6:'Push',1:'Pull-fade',2:'Fade',3:'Push-slice'}
};
const PAD_AXES = {
  green:['LONG ↑','SHORT ↓'], putt:['LONG ↑','SHORT ↓'], shape:['DRAW ↑','FADE ↓']
};
// display order top→bottom for the standard orientation (top = long / draw)
/** Row order for rendering a pad top→bottom; the shape pad can flip via settings
 *  (display only — digit meaning never changes). */
function padRows(kind){
  let rows = [[7,8,9],[4,5,6],[1,2,3]];
  if(kind==='shape' && !S.settings.shapeTopDraw) rows = [[1,2,3],[4,5,6],[7,8,9]];
  return rows;
}

const STRIKES = [['t','Thin'],['h','Heavy'],['to','Toe'],['hl','Heel']];
const WINDS = [['H','Into'],['D','Down'],['L2R','L→R'],['R2L','R→L']];
const FRACS = ['½','¾'];
/* Horizontal axis labels per pad; putting talks aim-line, not compass. */
const PAD_HAXES = {
  green:['◀ LEFT','RIGHT ▶'], putt:['◀ PULLED','PUSHED ▶'], shape:['◀ LEFT','RIGHT ▶']
};
/* Short-game styles: trajectory/technique vocabulary for shots inside
   100 — nobody fades a chip the way they fade a 7-iron. */
const SHORT_STYLES=[['low','Low / bump'],['std','Standard'],['high','High / flop'],['spin','Spinner']];
/* Strategy tags (multi-select, any shot). The payoff stat is SG per tag:
   do you actually score better playing the smart shot? */
const SHOT_TAGS=[['smart','Smart play'],['risky','Risky'],['hero','Hero shot'],['layup','Layup'],['punch','Punch']];

const TM_METRICS = [
  ['carry','Carry','yd'],['total','Total','yd'],['bs','Ball spd','mph'],['cs','Club spd','mph'],
  ['sm','Smash',''],['la','Launch','°'],['spin','Spin','rpm'],['axis','Spin axis','°'],
  ['apex','Apex','ft'],['side','Side','yd'],['sideT','Side total','yd'],['aa','Attack','°'],
  ['path','Path','°'],['face','Face','°']
];

/* ---------------- club helpers ---------------- */
/** Look up a club object by id (undefined if deleted). */
function club(id){ return S.clubs.find(c=>c.id===id); }
/** Display label for a club id; '?' survives deleted clubs in old rounds. */
function clubLabel(id){ const c=club(id); return c? c.label : '?'; }
/** The active putter (falls back to a benched one so putts never lose a club). */
function putterId(){ const c=S.clubs.find(c=>c.type==='P'&&!c.bench)||S.clubs.find(c=>c.type==='P'); return c? c.id : null; }
/** Clubs shown in pickers: benched ones are hidden but keep their history. */
function activeClubs(){ return [...S.clubs].filter(c=>!c.bench).sort((a,b)=>a.sort-b.sort); }
/** Closest active club to a target distance — powers the highlighted suggestion. */
function suggestClub(dist){
  if(!dist) return null;
  let best=null, bd=1e9;
  for(const c of activeClubs()){ if(c.type==='P') continue;
    const d=Math.abs((c.stock||0)-dist); if(d<bd){bd=d;best=c;} }
  return best? best.id : null;
}

/* ---- putting vocabulary (v5): putts are not little approach shots ----
   Intent: were you trying to make it or lag it close? (default guessed
   from distance, one tap to flip). Line: did the ball start on your
   intended line? Miss: green-reading language, not compass points —
   short / long is pace, low / high side is the read. The LEAVE distance
   needs no entry at all: it is simply the next putt's distance. */
const PUTT_INTENTS=[['make','Trying to make'],['lag','Lagging close']];
/* pace / line readers for the putt compass digits */
const PUTT_LINE = d=> d==null?null : [1,4,7].includes(d)?'pulled' : [3,6,9].includes(d)?'pushed':'onpath';
const PUTT_PACE = d=> d==null?null : d>=7?'long' : d<=3?'short':'good';

/* ---- shot-type detail (v6): different swings produce different data ----
   full  (>100y)      → ball-flight shape pad (draw/fade)
   short (≤100y, off green) → trajectory, not curvature
   putt  (GR)         → the putt compass above
   Strategy tags apply to any shot; average SG per tag answers whether the
   smart play or the hero shot actually scores better for THIS player. */
const TRAJS=[['lo','Low runner'],['st','Standard'],['hi','High soft'],['fl','Flop'],['sp','Spinner']];
const TAGS=[['smart','Smart play'],['layup','Layup'],['risky','Risky'],['hero','Hero shot'],['punch','Punch out']];
/** Shot-kind for choosing which detail controls to show. */
function shotKind(s){
  if(s.lie==='GR') return 'putt';
  const yds = s.unit==='f'? (s.dist||0)/3 : s.dist;
  return (yds!=null && yds<=100)? 'short' : 'full';
}

/* ============================================================
   DERIVATION ENGINE
   ============================================================
   Nothing about a hole is stored twice: score, putts, FIR, GIR,
   penalties, scrambling, sand saves and 3-putts are all DERIVED
   from the shot list on demand. Two escape hatches:

     h.ov{}     per-hole overrides — any derived field the player
                taps to correct wins over derivation. Quick-score
                mode writes ONLY into ov (no shots at all).
     h.basic{}  reserved (see deriveBasicHole) for a fully
                separate quick store if ov ever gets crowded.

   deriveHole(h) returns:
     {score, putts, fir:'Y'|'N'|'-', gir:'Y'|'N', pen, threePutt,
      udA, udM,              // scramble attempted / made
      sand, sandA, sandM,    // sand shot count / save attempt / made
      firstPuttFt, firstPuttMade, toPar}

   RULES ENCODED (change here, changes everywhere):
     FIR   par 3 → '-' ; tee shot lateral 'C' → Y ; green attempt
           from the tee → '-' (fairway irrelevant)
     GIR   strokes to reach the green (shots before first putt
           + penalties) ≤ par−2 ; hole-outs count if ≤ par−2
     U&D   attempt = every missed GIR ; made = par or better
     SAND  save attempt = greenside sand (≤50y or no distance)
           on a missed GIR ; made = par or better
   ============================================================ */
/** Was the ball holed on this shot? New data carries s.holed (set by the
 *  In-the-hole button); pre-v6 shots signalled a make with pad===5, so
 *  that remains the fallback when the flag is absent. */
function isHoled(s){ return s.holed===true || (s.holed==null && s.pad===5); }
/** The first shot taken from the green — its distance IS first-putt distance. */
function firstPuttShot(h){
  return (h.shots||[]).find(s=>s.lie==='GR') || null;
}
function deriveHole(h){
  const shots = h.shots||[];
  const ov = h.ov||{};
  // penalties = manual count + one per PN (penalty-drop) position played
  const pen = ov.pen!=null? ov.pen : (h.pen||0) + shots.filter(s=>s.lie==='PN').length;
  const score = ov.score!=null? ov.score : (shots.length? shots.length + pen : null);
  const putts = ov.putts!=null? ov.putts : shots.filter(s=>s.lie==='GR').length;

  // FIR: par 3 => '-', else first tee shot lateral === 'C'
  let fir = ov.fir!=null? ov.fir : null;
  if(fir==null){
    if(h.par<=3) fir='-';
    else{
      const tee = shots.find(s=>s.lie==='T');
      if(!tee) fir=null;
      else if(tee.fType==='lat') fir = tee.lat==='C' ? 'Y' : 'N';
      else if(tee.fType==='green') fir = '-';   // went for the green from the tee
      else fir = null;
    }
  }

  // GIR: strokes to reach green <= par-2
  let gir = ov.gir!=null? ov.gir : null;
  if(gir==null && shots.length){
    const fpIdx = shots.findIndex(s=>s.lie==='GR');
    if(fpIdx>=0){
      const strokesToGreen = fpIdx + pen;              // shots before first putt + penalties
      gir = strokesToGreen <= h.par-2 ? 'Y':'N';
    } else if(score!=null){
      // holed out from off the green: GIR only if it dropped within regulation strokes
      gir = score <= h.par-2 ? 'Y' : 'N';
    }
  }

  const threePutt = putts>=3;

  // scrambling: missed GIR → attempt; made if par or better
  let udA = ov.udA!=null? ov.udA : (gir==='N' && score!=null);
  let udM = ov.udM!=null? ov.udM : (udA && score!=null && score<=h.par);

  // sand
  const sandShots = ov.sand!=null? ov.sand : shots.filter(s=>s.lie==='SD').length;
  const greensideSand = shots.some(s=>s.lie==='SD' && (s.unit==='y'? (s.dist==null||s.dist<=50):true));
  const sandA = greensideSand && gir==='N';
  const sandM = sandA && score!=null && score<=h.par;

  const fp = firstPuttShot(h);
  let fpFt = fp? fp.dist : null, fpMade = fp? fp.pad===5 : null;
  if(fpFt==null && ov.firstPuttFt!=null){ fpFt=ov.firstPuttFt; fpMade = putts>=1? putts===1 : null; }
  return {score, putts, fir, gir, pen, threePutt, udA, udM,
          sand:sandShots, sandA, sandM,
          firstPuttFt: fpFt, firstPuttMade: fpMade,
          toPar: score!=null? score-h.par : null};
}
/** Sum a round: totals, nine splits, and rate-stat numerators/denominators.
 *  Returns {perHole[], played, score, par, toPar, putts, pen, f9, b9,
 *  firY, firD, girY, girD, tp, udA, udM, sA, sM}. Legacy rounds branch. */
function deriveRound(r){
  if(r.legacy) return deriveLegacyRound(r);
  const holes = r.holes||[];
  let sc=0,par=0,putts=0,pen=0,played=0, firY=0,firN=0, girY=0,girN=0, tp=0, udA=0,udM=0, sA=0,sM=0, f9=0,b9=0;
  const perHole=[];
  holes.forEach(h=>{
    const d = deriveHole(h); perHole.push(d);
    if(d.score!=null){ played++; sc+=d.score; par+=h.par; putts+=d.putts; pen+=d.pen;
      if(h.n<=9) f9+=d.score; else b9+=d.score;
      if(d.fir==='Y') firY++; else if(d.fir==='N') firN++;
      if(d.gir==='Y') girY++; else if(d.gir==='N') girN++;
      if(d.threePutt) tp++;
      if(d.udA){ udA++; if(d.udM) udM++; }
      if(d.sandA){ sA++; if(d.sandM) sM++; }
    }
  });
  return {perHole, played, score:sc, par, toPar:sc-par, putts, pen, f9, b9,
          firY, firD:firY+firN, girY, girD:girY+girN, tp, udA, udM, sA, sM};
}

/* ---------------- legacy (imported) rounds ----------------
   Imported from 18Birdies: hole strokes + round aggregates only.
   No per-shot data, no hole pars, no rating/slope. */
function deriveLegacyRound(r){
  const a = r.agg||{};
  const hs = (r.holes||[]).map(h=>h.strokes||0);
  const f9 = hs.slice(0,9).reduce((s,x)=>s+x,0);
  const b9 = hs.slice(9).reduce((s,x)=>s+x,0);
  return {legacy:true, perHole:hs.map(s=>({score:s})), played:hs.length,
    score:a.strokes||f9+b9, par:(a.strokes||0)-(a.toPar||0), toPar:a.toPar||0,
    putts:a.putts||0, pen:0, f9, b9,
    firY:a.firY||0, firD:a.firD||0, girY:a.girY||0, girD:a.girD||0,
    tp:0, udA:0, udM:0, sA:0, sM:0,
    eagles:a.eagles||0, birdies:a.birdies||0, pars:a.pars||0, bogeys:a.bogeys||0, dblOrWorse:a.dblOrWorse||0};
}

/* ---------------- chain-derived carry ----------------
   Because every shot stores DISTANCE TO HOLE, the distance a club
   actually traveled falls out of consecutive positions:
     carry ≈ dist_i − dist_{i+1}          (finished short of the hole)
     carry ≈ dist_i + dist_{i+1}          (flew long — result pad 7/8/9)
     carry ≈ dist_i                       (pin high offline — pad 4/6, or holed)
   An explicit player estimate (s.est) always wins; a following PN
   position means the outcome is unknown (OB/water) so no sample. */
/** A shot's distance-to-hole in yards (putt feet ÷ 3). */
function toYards(s){ return s.dist==null? null : (s.unit==='f'? s.dist/3 : s.dist); }
/** Estimated distance shot i in hole h actually traveled (null = no sample). */
function derivedCarry(h, i){
  const s=(h.shots||[])[i]; if(!s || s.lie==='PN' || s.lie==='GR') return null;
  if(s.est) return s.est;                       // player's own estimate wins
  const d0=toYards(s); if(d0==null) return null;
  const nx=h.shots[i+1];
  if(!nx){                                      // final shot: counts only if holed
    const d=deriveHole(h);
    return d.score!=null && d.score===h.shots.length + (d.pen||0) && isHoled(s) ? d0 : null;
  }
  if(nx.lie==='PN') return null;                // ball is gone; carry unknowable
  const d1=toYards(nx); if(d1==null) return null;
  if(s.pad!=null){
    if(s.pad>=7) return d0+d1;                  // long row: flew past the hole
    if(s.pad===4||s.pad===6) return d0;         // pin high, offline
  }
  return Math.max(0, d0-d1);                    // default: finished short
}

/* ═══════════════ src/js/05-handicap.js ═══════════════ */

/* ============================================================
   HANDICAP (WHS-style) + GLOBAL STAT FILTERS
   ============================================================
   Differential = 113 / slope × (adjusted gross − rating)
   Adjusted gross applies net double bogey per hole once an
   index exists (par+5 before that); unplayed holes score net
   par. Index = the standard best-8-of-20 table with the WHS
   reduced-count schedule under 20 rounds.

   DELIBERATE LIMITS (documented, not bugs):
   - 9-hole rounds produce NO differential (needs 9-hole ratings)
   - legacy 18Birdies imports produce NO differential (no tee)
   - the 54.0 cap and exceptional-score reductions aren't modeled
   ============================================================ */
/** WHS course handicap = index × slope/113 + (rating − par). */
function courseHandicap(index, slope, rating, parTotal){
  if(index==null||!slope) return null;
  return Math.round(index * (slope/113) + ((rating||parTotal) - parTotal));
}
/** Handicap strokes received on a hole given course handicap + stroke index. */
function strokesOnHole(ch, si){
  if(ch==null||!si) return 0;
  if(ch<=0) return 0;
  return Math.floor(ch/18) + (si <= (ch%18) ? 1 : 0);
}
/** Net-double-bogey-capped gross for differential math; unplayed holes = net par. */
function adjustedGross(r, indexBefore){
  const tee = teeOf(r);
  const parTotal = r.holes.reduce((s,h)=>s+h.par,0);
  const ch = indexBefore!=null && tee? courseHandicap(indexBefore, tee.slope, tee.rating, parTotal) : null;
  let ags=0, complete=true;
  for(const h of r.holes){
    const d=deriveHole(h);
    if(d.score==null){ complete=false; ags += h.par + (ch!=null? strokesOnHole(ch,h.si||18):0); continue; } // net par for unplayed (WHS hole-not-played)
    const cap = ch!=null ? h.par + 2 + strokesOnHole(ch, h.si||18) : h.par + 5;
    ags += Math.min(d.score, cap);
  }
  return {ags, complete};
}
/** One round → one differential (or null; see DELIBERATE LIMITS above). */
function scoreDifferential(r, indexBefore){
  if(!is18(r)) return null;                     // 9-hole differentials need 9-hole ratings we don't store
  const tee = teeOf(r);
  if(!tee || !tee.slope || !tee.rating) return null;
  const {ags} = adjustedGross(r, indexBefore);
  return Math.round((113/tee.slope) * (ags - tee.rating) * 10)/10;
}
/** WHS index from a window of ≤20 differentials (reduced-count table under 20). */
function handicapIndexFrom(diffs){
  const n = diffs.length;
  if(n<3) return null;
  const s=[...diffs].sort((a,b)=>a-b);
  const avg=(k)=> s.slice(0,k).reduce((a,b)=>a+b,0)/k;
  let idx;
  if(n>=20) idx=avg(8);
  else if(n===19) idx=avg(7);
  else if(n>=17) idx=avg(6);
  else if(n>=15) idx=avg(5);
  else if(n>=12) idx=avg(4);
  else if(n>=9)  idx=avg(3);
  else if(n>=7)  idx=avg(2);
  else if(n===6) idx=avg(2)-1.0;
  else if(n===5) idx=avg(1);
  else if(n===4) idx=avg(1)-1.0;
  else           idx=avg(1)-2.0; // n===3
  return Math.round(idx*10)/10;
}
/** '18' | 'F9' | 'B9' — with a length fallback for rounds saved before spans. */
function roundSpan(r){
  if(r.span) return r.span;                     // '18' | 'F9' | 'B9'
  return (r.holes||[]).length<=10 ? 'F9' : '18';
}
/** Convenience: does this round count as a full 18? */
function is18(r){ return roundSpan(r)==='18'; }

/* global stats filter, applied across the Stats tab */
let STATF = {time:'all', courseId:''};          // time: all | ytd | l90 | l5
/** finishedRounds() narrowed by the STATF chips (time window + course). */
function filteredRounds(){
  let rs = finishedRounds();
  if(STATF.courseId) rs = rs.filter(r=>r.courseId===STATF.courseId);
  if(STATF.time==='ytd'){ const y=new Date().getFullYear(); rs=rs.filter(r=>r.date&&r.date.startsWith(String(y))); }
  else if(STATF.time==='l90'){ const cut=new Date(Date.now()-90*864e5).toISOString().slice(0,10); rs=rs.filter(r=>r.date>=cut); }
  else if(STATF.time==='l5'){ rs=rs.slice(-5); }
  return rs;
}

/** All completed rounds, oldest first — the canonical stats input. */
function finishedRounds(){
  return S.rounds.filter(r=>r.finished).sort((a,b)=> (a.date+a.id) < (b.date+b.id) ? -1:1);
}
/** Walk rounds chronologically computing each differential with the index
 *  known at the time (stamps r._diff), returning [{round,diff,index}]. */
function handicapTimeline(){
  const rs = finishedRounds();
  const out=[]; let idx=null;
  rs.forEach(r=>{
    const d = scoreDifferential(r, idx);
    r._diff = d;
    if(d!=null){
      const recent = out.filter(o=>o.diff!=null).slice(-19).map(o=>o.diff).concat([d]);
      idx = handicapIndexFrom(recent);
    }
    out.push({round:r, diff:d, index:idx});
  });
  return out;
}
/** Latest computed handicap index, or null before 3 rated rounds. */
function currentIndex(){
  const t=handicapTimeline();
  for(let i=t.length-1;i>=0;i--) if(t[i].index!=null) return t[i].index;
  return null;
}

/* ---------------- course helpers ---------------- */
/** The course a round was played at (undefined if course deleted). */
function courseOf(r){ return S.courses.find(c=>c.id===r.courseId); }
/** The tee a round was played from. */
function teeOf(r){ const c=courseOf(r); return c? (c.tees||[]).find(t=>t.id===r.teeId) : null; }


/* ═══════════════ src/js/sg.js ═══════════════ */
/* ============================================================
   STROKES GAINED ENGINE
   ============================================================
   The question SG answers per shot: how many strokes did this
   shot save or cost versus the expected result from that
   position? Because every shot already stores DISTANCE TO HOLE
   + LIE, the chain gives us SG for free:

     SG(shot i) = E(pos i) − E(pos i+1) − strokes consumed

   where E(lie, distance) is the expected strokes to hole out.
   The whole round telescopes: total SG = Σ E(each hole's first
   position) − actual score. That identity is tested.

   BASELINE: scratch/tour-level expected-strokes tables adapted
   from Mark Broadie's published research (Every Shot Counts).
   Linear interpolation between anchors, clamped at the ends.
   Deep rough = rough + 0.25 (documented approximation);
   a Penalty position is valued as rough at its distance, and
   the shot that sent the ball OB/water consumes 2 strokes
   (swing + penalty) — Broadie's convention.

   CATEGORIES (datadriven.golf's split):
     ott       tee shot on par 4/5
     approach  ≥100y toward the green, not on it
     short     <100y, not on the green
     putt      on the green

   TARGET CALIBRATION: raw SG is vs scratch, so a 10-handicap
   sees ≈ −10 per round — true but demoralizing. Like
   datadriven.golf we also show SG vs YOUR TARGET: the target
   handicap's strokes are distributed across categories in
   proportion to each category's share of expected strokes in
   your actual rounds. The category ranking (where the leak is)
   is what drives practice; it is stable under this shift.
   ============================================================ */

/* anchor tables: [distance, expected strokes]; putt in feet, rest yards */
const SG_BASE = {
  putt:[[1,1.00],[2,1.01],[3,1.04],[4,1.13],[5,1.23],[6,1.34],[7,1.42],[8,1.50],[10,1.61],
        [15,1.78],[20,1.87],[25,1.93],[30,1.98],[40,2.06],[50,2.14],[60,2.21],[90,2.40]],
  T:  [[100,2.92],[120,2.99],[140,2.97],[160,2.99],[180,3.05],[200,3.12],[220,3.17],[240,3.25],
       [260,3.45],[280,3.65],[300,3.71],[320,3.79],[340,3.86],[360,3.92],[380,3.96],[400,3.99],
       [420,4.02],[440,4.08],[460,4.17],[480,4.28],[500,4.41],[540,4.65],[600,4.82]],
  FW: [[10,2.18],[20,2.40],[40,2.60],[60,2.70],[80,2.75],[100,2.80],[120,2.85],[140,2.91],[160,2.98],
       [180,3.08],[200,3.19],[220,3.32],[240,3.42],[260,3.53],[280,3.62],[300,3.71],[320,3.79],
       [340,3.86],[380,3.96],[420,4.02],[460,4.17],[500,4.41],[600,4.82]],
  RF: [[10,2.34],[20,2.59],[40,2.78],[60,2.91],[80,2.96],[100,3.02],[120,3.08],[140,3.15],[160,3.23],
       [180,3.31],[200,3.42],[220,3.53],[240,3.64],[260,3.74],[280,3.83],[300,3.90],[340,4.06],
       [380,4.22],[420,4.38],[500,4.70],[600,5.00]],
  SD: [[10,2.43],[20,2.53],[40,2.82],[60,3.15],[80,3.24],[100,3.23],[120,3.21],[140,3.22],[160,3.28],
       [180,3.40],[200,3.55],[220,3.70],[240,3.84],[280,4.00],[320,4.12],[400,4.40],[600,5.10]],
  RC: [[10,2.90],[40,3.30],[80,3.60],[100,3.80],[140,4.00],[180,4.20],[220,4.40],[260,4.60],
       [300,4.80],[400,5.10],[600,5.60]],
};
/** Expected strokes to hole out from (lie, distance). Distance in the
 *  shot's own unit — feet on the green, yards elsewhere. */
function expStrokes(lie, dist, unit){
  if(dist==null) return null;
  let key=lie, bump=0;
  if(lie==='GR') key='putt';
  else if(lie==='DR'){ key='RF'; bump=0.25; }      // deep rough approximation
  else if(lie==='PN'){ key='RF'; }                 // drop position ≈ rough
  else if(lie==='FR'||lie==='HZ') key='FW';        // legacy codes
  const t=SG_BASE[key]||SG_BASE.FW;
  const d = key==='putt' ? (unit==='f'? dist : dist*3) : (unit==='f'? dist/3 : dist);
  if(d<=t[0][0]) return t[0][1]+bump;
  for(let i=1;i<t.length;i++){
    if(d<=t[i][0]){
      const [d0,e0]=t[i-1], [d1,e1]=t[i];
      return e0 + (e1-e0)*(d-d0)/(d1-d0) + bump;
    }
  }
  return t[t.length-1][1]+bump;
}
/** SG category for a shot given its hole. */
function sgCat(s, h, isFirst){
  if(s.lie==='GR') return 'putt';
  if(isFirst && s.lie==='T' && h.par>3) return 'ott';
  const yds = s.unit==='f'? (s.dist||0)/3 : (s.dist||0);
  return yds>=100? 'approach' : 'short';
}
/** Per-shot strokes gained for one (shot-tracked, completed) hole.
 *  Returns [{shot, cat, sg, exp}] or null when distances are missing.
 *  Convention: reaching a PN position costs the PREVIOUS shot 2 strokes
 *  (swing + penalty); the PN row then plays on normally. */
function sgHole(h){
  const shots=h.shots||[];
  if(!shots.length) return null;
  const d=deriveHole(h);
  if(d.score==null) return null;
  const out=[];
  for(let i=0;i<shots.length;i++){
    const s=shots[i];
    const e0=expStrokes(s.lie, s.dist, s.unit);
    if(e0==null) return null;                        // incomplete data: skip hole
    const nx=shots[i+1];
    let e1=0, cost=1;
    if(nx){
      e1=expStrokes(nx.lie, nx.dist, nx.unit);
      if(e1==null) return null;
      if(nx.lie==='PN') cost=2;                      // this swing found trouble
    } else {
      // final position: only sound if the hole was actually holed out here
      if(d.score !== shots.length + d.pen) return null;
    }
    out.push({shot:s, cat:sgCat(s,h,i===0), sg: e0-e1-cost, exp:e0});
  }
  return out;
}
/** Round-level SG: totals, per-category, and each category's share of
 *  strokes played (used to distribute the target handicap's strokes in
 *  calibration — transparent and documented, not a black box).
 *  holesCounted lets the UI say "16 of 18 holes had full data". */
function sgRound(r){
  if(r.legacy) return null;
  const cats={ott:0,approach:0,short:0,putt:0};
  const strokes={ott:0,approach:0,short:0,putt:0};
  let total=0, holesCounted=0, strokesTotal=0;
  for(const h of r.holes){
    const rows=sgHole(h);
    if(!rows) continue;
    holesCounted++;
    for(let i=0;i<rows.length;i++){
      const row=rows[i];
      cats[row.cat]+=row.sg; total+=row.sg;
      const cost = (h.shots[i+1]&&h.shots[i+1].lie==='PN')? 2:1;  // penalty charged here
      strokes[row.cat]+=cost; strokesTotal+=cost;
    }
  }
  if(!holesCounted) return null;
  const share={};
  for(const k in strokes) share[k]= strokesTotal? strokes[k]/strokesTotal : 0;
  return {total, cats, share, holesCounted};
}
/** Aggregate SG across filtered rounds, per-18 normalized, with
 *  target-handicap calibration applied per category. */
function sgSummary(rounds, targetHcp){
  const per=[]; let cats={ott:0,approach:0,short:0,putt:0}, share={ott:0,approach:0,short:0,putt:0};
  let holes=0;
  rounds.forEach(r=>{ const s=sgRound(r); if(!s) return;
    per.push({r, s}); holes+=s.holesCounted;
    for(const k in cats){ cats[k]+=s.cats[k]; share[k]+=s.share[k]*s.holesCounted; } });
  if(!per.length) return null;
  const per18=x=> x/holes*18;
  const calCats={}, rawCats={};
  for(const k in cats){
    rawCats[k]=per18(cats[k]);
    // hand the target handicap's strokes back, split by stroke share
    calCats[k]=rawCats[k] + (targetHcp||0) * (share[k]/holes);
  }
  return {rounds:per, rawTotal:per18(Object.values(cats).reduce((a,b)=>a+b,0)),
          rawCats, calCats, holes, target:targetHcp||0};
}

/* ═══════════════ src/js/theme.js ═══════════════ */
/* ============================================================
   THEME — single place to restyle the whole app
   ============================================================
   Every color, radius, shadow and font in the app is a CSS
   custom property (see src/css/theme.css for the defaults).
   The THEME object below is an OVERRIDE LAYER applied at boot:
   put any subset of those variables here and they win, without
   ever touching the CSS.

   HOW TO USE
   ----------
   1. Change a color everywhere:      THEME['--turf'] = '#0E5A8A';
   2. Rounder buttons everywhere:     THEME['--r'] = '22px';
   3. Different number font:          THEME['--mono'] = 'Menlo, monospace';
   Then rebuild (node build.js) or just edit + refresh if testing.

   The full list of themeable variables lives at the top of
   src/css/theme.css, grouped and commented.

   EXTENSION POINT: add your own variables here AND reference
   them in CSS as var(--your-name) — applyTheme() injects every
   key in this object, known or new.
   ============================================================ */
const THEME = {
  // Examples (commented out = CSS defaults apply):
  // '--turf':      '#1B6B41',   // primary green
  // '--flag':      '#D93A2B',   // the "5 = pure" accent red
  // '--r':         '16px',      // large corner radius (cards, sheets)
  // '--tap':       '52px',      // minimum touch-target height
};

/** Push every THEME override onto <html> as an inline CSS variable.
 *  Called once at boot (see init module). Safe to call again at
 *  runtime if you ever build a live theme editor. */
function applyTheme(){
  const root = document.documentElement;
  for(const [k,v] of Object.entries(THEME)) root.style.setProperty(k, v);
}

/* ═══════════════ src/js/components.js ═══════════════ */
/* ============================================================
   UI COMPONENT LIBRARY — reusable HTML builders
   ============================================================
   Views in this app are plain template strings. These helpers
   are the sanctioned way to build common elements so styling
   stays consistent and future changes happen in ONE place.

   All builders return an HTML string. Event handlers are passed
   as inline `onclick` strings because the app uses global
   functions (simple, debuggable from Safari's console).

   USAGE EXAMPLES
   --------------
   ui.btn('Save round', "saveRound()", {kind:'primary', wide:true})
   ui.chip('56°', "pickClub('abc')", {on:true})
   ui.card('Wedge matrix', '<table>…</table>', {tight:true})
   ui.seg('modeSeg', [['a','Shots'],['b','Quick']], 'a', "setMode('%v')")
   ui.stat('GIR', 'Y', {good:true, onclick:"cycleOv('gir')"})

   EXTENSION POINT: add new builders here (e.g. ui.badge,
   ui.toggle) and every view can use them immediately.
   ============================================================ */
const ui = {
  /** Standard button.
   *  @param {string} label   visible text (already-safe or esc() it yourself)
   *  @param {string} onclick inline handler, e.g. "startRound()"
   *  @param {object} o       {kind:'primary'|'danger'|'ghost', sm, wide, style, disabled} */
  btn(label, onclick, o={}){
    const cls = ['btn', o.kind||'', o.sm?'sm':'', o.wide?'wide':''].filter(Boolean).join(' ');
    return `<button class="${cls}" ${o.disabled?'disabled':''} ${o.style?`style="${o.style}"`:''} onclick="${onclick}">${label}</button>`;
  },

  /** Pill chip, optionally selected. o = {on, sm, hint, style} */
  chip(label, onclick, o={}){
    const cls = ['chip', o.sm?'sm':'', o.on?'on':'', o.hint?'hint':''].filter(Boolean).join(' ');
    return `<button class="${cls}" ${o.style?`style="${o.style}"`:''} onclick="${onclick}">${label}</button>`;
  },

  /** Card shell with the standard uppercase header.
   *  @param {string} title   header text ('' for headerless)
   *  @param {string} bodyHTML
   *  @param {object} o {tight: no body padding, right: HTML for header's right side, hero: green gradient} */
  card(title, bodyHTML, o={}){
    const hd = title ? `<div class="hd"><span class="t">${title}</span>${o.right||''}</div>` : '';
    return `<div class="card ${o.hero?'hero':''}">${hd}<div class="bd ${o.tight?'tight':''}">${bodyHTML}</div></div>`;
  },

  /** Segmented control. Items = [[value,label],…]; onPick receives
   *  the value via %v substitution, e.g. "setMode('%v')". */
  seg(id, items, current, onPick){
    return `<div class="segs" id="${id}">` + items.map(([v,l])=>
      `<button ${v===current?'class="on"':''} data-v="${v}" onclick="srSeg(this);${onPick.replace('%v',v)}">${l}</button>`).join('') + `</div>`;
  },

  /** Small stat pill used on the hole screen and summaries.
   *  o = {good, bad, onclick} */
  stat(label, value, o={}){
    const cls = ['stat', o.good?'good':'', o.bad?'bad':''].filter(Boolean).join(' ');
    return `<span class="${cls}" ${o.onclick?`onclick="${o.onclick}"`:''}>${label} <b>${value}</b></span>`;
  },

  /** Tappable list row with title/subtitle and chevron. */
  listRow(title, sub, onclick, o={}){
    return `<div class="listRow" onclick="${onclick}">${o.lead||''}
      <div class="main"><div class="ti">${title}</div>${sub?`<div class="sub">${sub}</div>`:''}</div>
      ${o.trail||''}<span class="arr">›</span></div>`;
  },

  /** Labeled input. o = {id, type, placeholder, inputmode, num, onchange} */
  field(label, value, o={}){
    return `<label class="f">${label}</label>
      <input class="f ${o.num?'num':''}" ${o.id?`id="${o.id}"`:''} type="${o.type||'text'}"
        ${o.inputmode?`inputmode="${o.inputmode}"`:''} value="${value==null?'':value}"
        ${o.placeholder?`placeholder="${o.placeholder}"`:''} ${o.onchange?`onchange="${o.onchange}"`:''}>`;
  }
};

/* ═══════════════ src/js/06-router.js ═══════════════ */
/* ============================================================
   ROUTER + TAB REGISTRY
   ============================================================
   Navigation model:
     TAB       which bottom-nav tab is active
     PLAYVIEW  sub-screen inside the Play tab
               ('home' hub | 'hole' | 'overview' | 'roundDetail'
                | 'rounds' history list | 'course' course page)
     MOREVIEW  sub-screen inside the More tab (see more module)

   render() is the single draw call: it paints the nav from the
   TABS registry and the body from the active tab's view fn,
   then autosaves. Every user action ends by calling render().

   EXTENSION POINT — adding a whole new tab is one entry here:
     TABS.push({id:'goals', ic:'🎯', label:'Goals', view: vGoals});
   …then define vGoals() returning an HTML string in a new module
   and add that module to build.js's manifest. Nothing else.
   ============================================================ */
let TAB='play';
let PLAYVIEW='home';
let VIEWROUND=null;   // round id being viewed in roundDetail/overview
let CID=null;         // course id for the course page

/** Bottom-nav registry. Order here = order on screen. */
const TABS = [
  {id:'play',     ic:'⛳', label:'Play',     view: ()=>vPlay()},
  {id:'stats',    ic:'📊', label:'Stats',    view: ()=>vStats()},
  {id:'practice', ic:'🎯', label:'Practice', view: ()=>vPractice()},
  {id:'tips',     ic:'💡', label:'Tips',     view: ()=>vTips()},
  {id:'more',     ic:'⚙︎', label:'More',    view: ()=>vMore()},
];

/** Switch tabs. Play always lands on the hub (the "pick up where
 *  you left off" dashboard) — resuming a hole is an explicit tap. */
function go(tab){ TAB=tab; if(tab==='play') PLAYVIEW='home'; render(); window.scrollTo(0,0); }

/** The one and only draw call. Nav from registry, body from the
 *  active tab, storage-warning banner when localStorage is dead,
 *  then persist. Views are pure string builders — no side effects. */
function render(){
  document.body.classList.toggle('hivis', !!S.settings.hiVis);
  $('#nav').innerHTML = TABS.map(t=>
    `<button class="${TAB===t.id?'on':''}" onclick="go('${t.id}')"><span class="ic">${t.ic}</span>${t.label}</button>`).join('');
  const tab = TABS.find(t=>t.id===TAB) || TABS[0];
  $('#view').innerHTML =
    (STORAGE_OK? '' : `<div class="banner">⚠️ Device storage is unavailable in this browser. Data will only last this session. Export a JSON backup before closing.</div>`)
    + tab.view();
  save();
}

/* ============================================================
   PLAY TAB — sub-router
   ============================================================ */
/** Dispatch inside the Play tab based on PLAYVIEW. */
function vPlay(){
  if(PLAYVIEW==='hole' && S.activeRoundId) return vHole();
  if(PLAYVIEW==='overview'){ const r=activeRound()||S.rounds.find(x=>x.id===VIEWROUND); if(r) return vOverview(r); }
  if(PLAYVIEW==='roundDetail' && VIEWROUND) return vRoundDetail(VIEWROUND);
  if(PLAYVIEW==='rounds') return vRoundsList();
  if(PLAYVIEW==='course' && CID) return vCoursePage();
  return vRoundsHome();
}
/** The in-progress round, or undefined when none is active. */
function activeRound(){ return S.rounds.find(r=>r.id===S.activeRoundId); }

/* ============================================================
   PLAY TAB — home hub, round history, course pages
   ============================================================
   vRoundsHome  the dashboard the Play tab lands on: resume card
                for an in-progress round, recent course chips,
                quick start, link to full history
   vRoundsList  every finished round, newest first
   vCoursePage  one course: location + Maps link, tee data,
                per-hole history table, rounds played there
   ============================================================ */
function lastRoundAt(cid){ const rs=finishedRounds().filter(r=>r.courseId===cid); return rs.length? rs[rs.length-1]:null; }

/** The Play hub: resume hero, quick start, recent course chips, history link. */
function vRoundsHome(){
  const idx = currentIndex();
  const act = activeRound();
  const rs = finishedRounds();
  // recent courses by last played
  const recent = [...S.courses].map(c=>({c, last:lastRoundAt(c.id)}))
    .sort((a,b)=> (b.last?b.last.date:'') > (a.last?a.last.date:'') ? 1:-1).slice(0,8);
  let hero;
  if(act){
    const d=deriveRound(act);
    const h=act.holes[act.curHole-1];
    hero = `<div class="hero">
      <div class="k">Round in progress · ${esc(courseOf(act)?courseOf(act).name:'')}</div>
      <div class="big">${d.played? d.score:'–'} <span style="font-size:20px;opacity:.85">${d.played? (d.toPar===0?'E':(d.toPar>0?'+':'')+d.toPar):''}</span></div>

        <button class="btn" style="background:rgba(255,255,255,.16);color:#fff" onclick="PLAYVIEW='overview';render()">Scorecard</button>
      </div></div>`;
  } else {
    const last = rs[rs.length-1];
    hero = `<div class="hero">
      <div class="k">Caddie Book${idx!=null? ' · HCP '+r1(idx):''}</div>
      <div class="big">${last? deriveRound(last).score : '—'}</div>
      <div class="sub">${last? 'Last round · '+esc(courseOf(last)?courseOf(last).name:'')+' · '+fmtDate(last.date) : 'No rounds yet — everything works offline.'}</div>
      <button class="btn" onclick="startRoundSheet()" style="min-height:56px;font-size:17px">⛳ Start a round</button>

  }
  return `${hero}
  <div class="row" style="justify-content:space-between;align-items:baseline;margin:2px 2px 8px">
    <span class="eyebrow">Recent courses</span>
    <button class="btn sm ghost" onclick="mgoCourses()">All courses ›</button></div>
  <div class="hscroll">${recent.map(x=>{
      const t=(x.c.tees||[])[0];
      return `<div class="crsCard" onclick="CID='${x.c.id}';PLAYVIEW='course';render()">
        <div class="nm">${esc(x.c.name)}</div>
        <div class="loc">${esc([x.c.info&&x.c.info.city, x.c.info&&x.c.info.state].filter(Boolean).join(', ')||'add location')}</div>
        <div class="meta">${x.last? fmtDate(x.last.date)+' · '+deriveRound(x.last).score : (t&&t.rating? t.rating+' / '+t.slope : 'no rounds yet')}</div>
      </div>`;}).join('') || '<div class="muted small" style="padding:8px">Add a course to get started.</div>'}
  </div>
  <div class="grid2" style="margin-top:6px">
    <button class="btn" onclick="PLAYVIEW='rounds';render()">📋 All rounds</button>
    <button class="btn" onclick="courseEditor(null,false)">＋ New course</button>

}

    <div class="segs" id="srSpan">
      <button class="on" data-v="18" onclick="srSeg(this)">Full 18</button>
      <button data-v="F9" onclick="srSeg(this)">Front 9</button>
      <button data-v="B9" onclick="srSeg(this)">Back 9</button></div>
    <label class="f">Entry style</label>
    <div class="segs" id="srMode">
      <button ${S.settings.defaultMode!=='basic'?'class="on"':''} data-v="advanced" onclick="srSeg(this)">Shot-by-shot</button>

/** Segmented-control click handler: move the .on class to the tapped button. */
function srSeg(btn){ [...btn.parentElement.children].forEach(b=>b.classList.remove('on')); btn.classList.add('on'); }
/** Read a segmented control\u2019s selected data-v value. */
function srSegVal(id){ const b=document.querySelector('#'+id+' button.on'); return b? b.dataset.v : null; }
/** Repopulate the tee dropdown after a course change (stub courses get a hint). */
function srTees(){
  const c=S.courses.find(c=>c.id===$('#srCourse').value);
  const ts=(c.tees||[]);
  $('#srTee').innerHTML = ts.length? ts.map(t=>`<option value="${t.id}">${esc(t.name)} · ${t.rating||'?'} / ${t.slope||'?'}</option>`).join('')
    : `<option value="">No tee data yet — pick to set up</option>`;
}
/** Build the round object (slicing F9/B9 holes) and enter play. Guards
 *  imported stub courses by opening the editor prefilled instead. */
function startRound(){
  const c=S.courses.find(c=>c.id===$('#srCourse').value);
  const t=(c.tees||[]).find(t=>t.id===$('#srTee').value);
  if(!t){ toast('Add tee details for this course first.'); courseEditor(c.id, true); return; }
  const span=srSegVal('srSpan')||'18';
  const src9 = span==='F9'? t.holes.slice(0,9) : span==='B9'? t.holes.slice(9,18) : t.holes;
  const r={id:uid(), courseId:c.id, teeId:t.id, date:$('#srDate').value||todayISO(),
    weather:$('#srWx').value.trim(), notes:'', finished:false, curHole:1,
    span, mode:srSegVal('srMode')||S.settings.defaultMode,
    ctx:{partners:$('#srWith').value.trim(), drinks:0, vibe:0},
    holes:src9.map(h=>({n:h.n,par:h.par,ydg:h.ydg,si:h.si,windD:'',windS:0,shots:[],pen:0,ov:{}}))};
  S.rounds.push(r); S.activeRoundId=r.id; PLAYVIEW='hole'; closeSheet(); render();
}

/* ============================================================
   COURSE EDITOR — three ways in, one verification grid out
   ============================================================
   1. Manual: 18-row grid, par defaults to 4, done in <60s.
   2. Paste parser: iPhone Live Text copies the scorecard
      (on-device OCR); ceParse() classifies the numbers —
      3-5 = pars, 100-650 = yardages, leftover 1-18 = stroke
      index, decimal 60-80 = rating with its neighbor as slope.
   3. Online (optional): golfcourseapi.com with a free key from
      Settings — fills name, location, rating, slope, 18 holes.
   All three land in the same editable CE draft before saving.
   ============================================================ */
let CE=null; // {courseId|null, name, teeName, rating, slope, holes[], startAfter}
/** Open the editor: blank 18×par-4 draft, or prefilled from an existing course. */
function courseEditor(courseId, startAfter){
  CE={courseId, startAfter:!!startAfter, name:'', teeName:'White', rating:'', slope:'',
      info:{address:'',city:'',state:''},
      holes:Array.from({length:18},(_,i)=>({n:i+1,par:4,ydg:'',si:''}))};
  if(courseId){ const c=S.courses.find(x=>x.id===courseId); CE.name=c.name; CE.info=Object.assign({address:'',city:'',state:''}, c.info||{});
    const t=c.tees[0]; if(t){CE.teeName=t.name;CE.rating=t.rating;CE.slope=t.slope;CE.holes=t.holes.map(h=>({...h}));} }
  renderCourseEditor();
}
/** Draw the editor sheet: name/location/tee fields + the 18-row grid. */
function renderCourseEditor(){
  const rows = CE.holes.map((h,i)=>`<tr>
    <td class="hn">${h.n}</td>
    <td><div class="parBtns">${[3,4,5].map(p=>`<button class="${h.par===p?'on':''}" onclick="cePar(${i},${p})">${p}</button>`).join('')}</div></td>
    <td><input inputmode="numeric" value="${h.ydg||''}" placeholder="yds" onchange="ceSet(${i},'ydg',this.value)"></td>
    <td><input class="si" inputmode="numeric" value="${h.si||''}" placeholder="SI" onchange="ceSet(${i},'si',this.value)"></td>
  </tr>` + (h.n===9?`<tr><td colspan="4" style="border-top:2px solid var(--ink)"></td></tr>`:'')).join('');
  openSheet(`<div class="sheetHd"><span class="t">${CE.courseId?'Edit course':'New course'}</span><button class="btn sm ghost" onclick="closeSheet()">Cancel</button></div>
    <label class="f">Course name</label><input class="f" id="ceName" value="${esc(CE.name)}" placeholder="Fossil Trace">
    ${S.settings.gcApiKey? `<div style="margin-top:8px"><button class="btn sm wide" onclick="gcSearch()">🔎 Look up online (fills everything)</button></div>`:''}
    <div class="grid2">
      <div><label class="f">City</label><input class="f" id="ceCity" value="${esc(CE.info.city||'')}"></div>
      <div><label class="f">State</label><input class="f" id="ceState" value="${esc(CE.info.state||'')}"></div>
    </div>
    <div class="grid3">
      <div><label class="f">Tee</label><input class="f" id="ceTee" value="${esc(CE.teeName)}"></div>
      <div><label class="f">Rating</label><input class="f num" id="ceRating" inputmode="decimal" value="${CE.rating||''}" placeholder="71.2"></div>
      <div><label class="f">Slope</label><input class="f num" id="ceSlope" inputmode="numeric" value="${CE.slope||''}" placeholder="135"></div>
    </div>
    <div class="sec">Holes</div>
    <div class="row small muted" style="margin-bottom:6px">Par defaults to 4 — tap to change. Enter yardage, then SI.</div>
    <table class="crsGrid"><tr><th>#</th><th>Par</th><th>Yardage</th><th>SI</th></tr>${rows}</table>
    <div style="height:10px"></div>
    <button class="btn wide" onclick="cePasteUI()">📷 Paste from scorecard photo</button>
    <div class="small muted" style="margin:8px 2px">Point the iPhone camera at the scorecard, use Live Text to <b>Select All → Copy</b> (fully on-device), then paste here. The parser pulls out pars, yardages and stroke indexes for you to verify.</div>
    <div style="height:6px"></div>
    <button class="btn primary wide" onclick="ceSave()">Save course</button>`);
}
/** Par button tap for row i (grabs live inputs first so nothing is lost). */
function cePar(i,p){ CE.holes[i].par=p; ceGrab(); renderCourseEditor(); }
/** Store a yardage/SI cell as it changes. */
function ceSet(i,k,v){ CE.holes[i][k]=parseInt(v)||''; }
/** Pull every live input into the CE draft before re-rendering or saving. */
function ceGrab(){ CE.name=$('#ceName').value; CE.teeName=$('#ceTee').value; CE.rating=$('#ceRating').value; CE.slope=$('#ceSlope').value;
  if($('#ceCity')) CE.info.city=$('#ceCity').value.trim();
  if($('#ceState')) CE.info.state=$('#ceState').value.trim();
  document.querySelectorAll('.crsGrid input').forEach((inp,j)=>{ const i=Math.floor(j/2); if(j%2===0)CE.holes[i].ydg=parseInt(inp.value)||''; else CE.holes[i].si=parseInt(inp.value)||''; }); }
/** Sheet for pasting Live-Text scorecard output into the parser. */
function cePasteUI(){
  ceGrab();
  openSheet(`<div class="sheetHd"><span class="t">Paste scorecard text</span><button class="btn sm ghost" onclick="renderCourseEditor()">Back</button></div>
    <div class="small muted" style="margin-bottom:8px">Paste anything the camera copied — messy is fine. Numbers 3–5 in runs of 18 are read as pars, 100–650 as yardages, 1–18 as stroke index.</div>
    <textarea class="f" id="cePaste" style="min-height:160px" placeholder="4 4 3 5 4 4 3 4 5 …&#10;387 402 165 520 …"></textarea>
    <div style="height:10px"></div>
    <button class="btn primary wide" onclick="ceParse()">Read numbers → verify grid</button>`);
}
/** Heuristic number classifier: pars, yardages, stroke index, rating, slope
 *  (slope is matched next to the decimal rating first so it can\u2019t be eaten
 *  as a yardage). Fills the grid for verification. */
function ceParse(){
  const txt=$('#cePaste').value;
  const nums=(txt.match(/\d+(\.\d+)?/g)||[]).map(Number);
  const ratingIdx = nums.findIndex(n=>n>=60 && n<=80 && !Number.isInteger(n));
  const rating = ratingIdx>=0 ? nums[ratingIdx] : null;
  const tok = nums.map(n=>({v:n,used:!Number.isInteger(n)}));
  let slope = null;
  // slope: an integer 55–155 sitting right next to the rating (e.g. "71.4 / 132")
  if(ratingIdx>=0){
    for(const j of [ratingIdx+1,ratingIdx+2,ratingIdx-1]){
      if(tok[j] && !tok[j].used && tok[j].v>=55 && tok[j].v<=155){ slope=tok[j].v; tok[j].used=true; break; }
    }
  }
  const ints = tok;
  const pars=[], ydgs=[];
  for(const t of ints){
    if(t.used) continue;
    if(t.v>=3&&t.v<=5 && pars.length<18){ pars.push(t.v); t.used=true; }
    else if(t.v>=100&&t.v<=650 && ydgs.length<18){ ydgs.push(t.v); t.used=true; }
  }
  // slope fallback: any leftover int 55–155
  if(slope==null){ for(const t of ints){ if(!t.used && t.v>=55 && t.v<=155){ slope=t.v; t.used=true; break; } } }
  // stroke index: unused ints 1–18, each once
  const sis=[]; const seen=new Set();
  for(const t of ints){ if(!t.used && t.v>=1&&t.v<=18 && !seen.has(t.v) && sis.length<18){ seen.add(t.v); sis.push(t.v); t.used=true; } }
  pars.forEach((p,i)=>{ if(CE.holes[i]) CE.holes[i].par=p; });
  ydgs.forEach((y,i)=>{ if(CE.holes[i]) CE.holes[i].ydg=y; });
  if(sis.length===18) sis.forEach((s,i)=>{ CE.holes[i].si=s; });
  if(rating) CE.rating=rating;
  if(slope) CE.slope=slope;
  renderCourseEditor();
  toast(`Read ${pars.length} pars, ${ydgs.length} yardages${sis.length===18?', 18 stroke indexes':''}${rating?', rating '+rating:''}${slope?', slope '+slope:''}. Verify below.`);
}
/** Validate + persist the course (updating tee in place keeps round links). */
function ceSave(){
  ceGrab();
  if(!CE.name.trim()){ toast('Name the course'); return; }
  const teeObj={id:uid(), name:CE.teeName.trim()||'Tee', rating:parseFloat(CE.rating)||null, slope:parseInt(CE.slope)||null,
    holes:CE.holes.map(h=>({n:h.n,par:h.par,ydg:parseInt(h.ydg)||null,si:parseInt(h.si)||null}))};
  if(CE.courseId){
    const c=S.courses.find(x=>x.id===CE.courseId); c.name=CE.name.trim();
    c.info=Object.assign(c.info||{}, CE.info);
    c.tees[0]=Object.assign(c.tees[0]||{}, teeObj, {id:(c.tees[0]||teeObj).id});
  } else {
    S.courses.push({id:uid(), name:CE.name.trim(), info:{...CE.info}, tees:[teeObj]});
  }
  save(); closeSheet();
  if(CE.startAfter) startRoundSheet(); else render();
}

/** Authenticated GET against api.golfcourseapi.com (optional online path). */
async function gcApi(path){
  const res = await fetch('https://api.golfcourseapi.com/v1/'+path, {headers:{'Authorization':'Key '+S.settings.gcApiKey}});
  if(!res.ok) throw new Error('HTTP '+res.status);
  return res.json();
}
/** Search courses by the typed name; user picks a result to apply. */
async function gcSearch(){
  ceGrab();
  const q = CE.name.trim(); if(!q){ toast('Type the course name first.'); return; }
  toast('Searching…');
  try{
    const data = await gcApi('search?search_query='+encodeURIComponent(q));
    GCRES = (data.courses||[]).slice(0,5);
    if(!GCRES.length){ toast('No matches. Paste or type it instead.'); return; }
    openSheet(`<div class="sheetHd"><span class="t">Pick your course</span><button class="btn sm ghost" onclick="renderCourseEditor()">Back</button></div>
      ${GCRES.map((c,i)=>{
        const tees=((c.tees&&c.tees.male)||[]).concat((c.tees&&c.tees.female)||[]);
        return `<div class="card"><div class="bd">
          <div style="font-weight:800">${esc(c.club_name||'')}${c.course_name&&c.course_name!==c.club_name? ' — '+esc(c.course_name):''}</div>
          <div class="small muted">${esc([c.location&&c.location.city, c.location&&c.location.state].filter(Boolean).join(', '))}</div>
          <div class="chips" style="margin-top:8px">${tees.map((t,j)=>`<button class="chip sm" onclick="gcApply(${i},${j})">${esc(t.tee_name)} · ${t.course_rating||'?'} / ${t.slope_rating||'?'}</button>`).join('')||'<span class="small muted">no tee data</span>'}</div>
        </div></div>`;}).join('')}`);
  }catch(e){
    toast('Lookup failed ('+e.message+'). If this keeps happening the API may block browser requests — the paste import always works.');
  }
}
/** Map an API course onto the CE draft: location, tee rating/slope, 18 holes. */
function gcApply(ci,ti){
  const c=GCRES[ci];
  const tees=((c.tees&&c.tees.male)||[]).concat((c.tees&&c.tees.female)||[]);
  const t=tees[ti]; if(!t) return;
  CE.name = CE.name || c.club_name || '';
  if(!CE.name.trim()) CE.name = c.club_name||c.course_name||'';
  CE.teeName = t.tee_name||'Tee';
  CE.rating = t.course_rating||''; CE.slope = t.slope_rating||'';
  CE.info = {address:(c.location&&c.location.address)||'', city:(c.location&&c.location.city)||'', state:(c.location&&c.location.state)||''};
  (t.holes||[]).slice(0,18).forEach((hh,i)=>{ CE.holes[i]={n:i+1, par:hh.par||4, ydg:hh.yardage||'', si:hh.handicap||''}; });
  renderCourseEditor();
  toast('Filled from golfcourseapi.com — verify the grid.');
}
/** From a course page: fetch and fill location fields for an existing course. */
function gcFill(courseId){ courseEditor(courseId,false); setTimeout(gcSearch, 50); }

   Two entry modes per round, switchable any time:

/** Advanced mode: the tappable shot list + Add shot / Penalty+drop. */
function vShotsPanel(r,h,d){

/* quick-score entry: score, putts, first putt ft, FIR, approach pad, sand, pen */
function vBasicPanel(r,h,d){

    return `<button class="${ov.score===s?'on':''}" onclick="bset('score',${s})">${s}<span class="sub">${lab}</span></button>`;}).join('');

  const fpChips=[3,5,8,10,15,20,25,30,40,50].map(f=>`<button class="chip sm ${ov.firstPuttFt===f?'on':''}" onclick="bset('firstPuttFt',${f})">${f}</button>`).join('');
  return `<div class="card"><div class="bd">

      <button class="chip ${ov.fir==='N'?'on':''}" onclick="bset('fir','N')">✗ Missed</button></div>`:''}
    <div class="sec">Approach vs pin — 5 = on, pin high</div>
    ${padHTML('green', ov.girPad, 'bPad')}
    <div class="sec">Trouble</div>
    <div class="chips">
      <button class="chip sm" onclick="bstep('sand',1)">Sand ${ov.sand||0} ＋</button>
      <button class="chip sm" onclick="bstep('pen',1)">Penalty ${ov.pen||0} ＋</button>
      <button class="chip sm ghost" onclick="bclear()">Reset hole</button>
