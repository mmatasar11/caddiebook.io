<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Caddie Book</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Caddie Book">
<meta name="theme-color" content="#185C37">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%23185C37'/%3E%3Ccircle cx='90' cy='90' r='34' fill='%23FBFAF6'/%3E%3Ccircle cx='90' cy='90' r='9' fill='%23D22E2E'/%3E%3C/svg%3E">
<style>
:root{
  --paper:#F4F5F2; --card:#FFFFFF; --ink:#171B1E; --ink2:#61686E; --line:#E3E5E1;
  --turf:#1B6B41; --turf-deep:#0F4A2C; --turf-soft:#E4F1E9; --flag:#D93A2B; --flag-soft:#FCEAE7;
  --sand:#F3ECD9; --amber:#A8770E; --sky:#EAF2F8;
  --r:16px; --rs:11px; --tap:52px;
  --sh:0 1px 2px rgba(23,27,30,.06),0 4px 14px rgba(23,27,30,.06);
  --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace;
  --ui:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:var(--ui);background:var(--paper);color:var(--ink);font-size:16px;
  padding-top:env(safe-area-inset-top);
  padding-bottom:calc(80px + env(safe-area-inset-bottom));user-select:none;-webkit-user-select:none}
input,textarea{user-select:text;-webkit-user-select:text}
button{font-family:var(--ui);color:var(--ink)}
a{color:var(--turf);font-weight:700;text-decoration:none}
.num{font-family:var(--mono);font-weight:700;font-variant-numeric:tabular-nums}

/* ---------- shell ---------- */
#view{max-width:560px;margin:0 auto;padding:14px 14px 24px}
#nav{position:fixed;left:0;right:0;bottom:0;background:rgba(255,255,255,.92);
  -webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);
  border-top:1px solid var(--line);display:flex;z-index:40;padding-bottom:env(safe-area-inset-bottom)}
#nav button{flex:1;background:none;border:0;padding:9px 0 7px;font-size:10.5px;font-weight:700;
  letter-spacing:.05em;text-transform:uppercase;color:var(--ink2)}
#nav button .ic{display:block;font-size:21px;line-height:1.2;filter:grayscale(1);opacity:.55}
#nav button.on{color:var(--turf-deep)}
#nav button.on .ic{filter:none;opacity:1}

.topbar{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:2px 0 12px;min-height:40px}
.pageTitle{display:flex;align-items:baseline;justify-content:space-between;margin:4px 2px 14px}
.pageTitle h1{margin:0;font-size:27px;font-weight:800;letter-spacing:-.03em}
.eyebrow{font-size:11px;font-weight:800;letter-spacing:.13em;text-transform:uppercase;color:var(--turf)}

.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);margin-bottom:14px;overflow:hidden;box-shadow:var(--sh)}
.card>.hd{padding:11px 16px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:8px}
.card>.hd .t{font-size:11.5px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--ink2)}
.card>.bd{padding:13px 16px}
.card>.bd.tight{padding:0}
.card.hero{background:linear-gradient(140deg,var(--turf-deep),var(--turf) 70%,#2E8253);color:#fff;border:0}
.card.hero .k{font-size:10px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;opacity:.75}
.card.hero .muted{color:rgba(255,255,255,.75)}

.row{display:flex;gap:8px;align-items:center}
.grow{flex:1}
.muted{color:var(--ink2)}
.small{font-size:13px}
.right{text-align:right}
.center{text-align:center}
hr.sep{border:0;border-top:1px solid var(--line);margin:11px 0}

/* ---------- buttons & chips ---------- */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:var(--tap);
  padding:0 18px;border:1.5px solid var(--ink);border-radius:14px;background:var(--card);
  font-size:16px;font-weight:700;cursor:pointer}
.btn.primary{background:var(--turf-deep);border-color:var(--turf-deep);color:#fff;box-shadow:0 6px 16px rgba(15,74,44,.28)}
.btn.danger{background:var(--flag-soft);border-color:transparent;color:var(--flag)}
.btn.ghost{border-color:var(--line);color:var(--ink2);background:transparent}
.btn.wide{width:100%}
.btn.sm{min-height:38px;padding:0 12px;font-size:14px;border-width:1px;border-radius:11px}
.btn:active{transform:scale(.97)}

.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{min-height:44px;padding:0 14px;display:inline-flex;align-items:center;justify-content:center;
  border:1.5px solid var(--line);border-radius:999px;background:var(--card);font-weight:700;font-size:15px;cursor:pointer}
.chip.on{border-color:var(--turf-deep);background:var(--turf-deep);color:#fff}
.chip.hint{border-color:var(--amber);background:var(--sand)}
.chip.sm{min-height:34px;font-size:13px;padding:0 11px}
.seg{display:flex;background:var(--paper);border-radius:12px;padding:3px;gap:3px}
.seg button{flex:1;min-height:38px;border:0;border-radius:9px;background:transparent;font-weight:700;font-size:14px;color:var(--ink2)}
.seg button.on{background:var(--card);color:var(--ink);box-shadow:var(--sh)}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}

label.f{display:block;font-size:11.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--ink2);margin:11px 0 5px}
input.f,textarea.f,select.f{width:100%;min-height:48px;padding:8px 13px;font-size:17px;border:1.5px solid var(--line);
  border-radius:var(--rs);background:var(--card);color:var(--ink);font-family:var(--ui)}
input.f:focus,textarea.f:focus{outline:none;border-color:var(--turf)}
input.f.num{font-family:var(--mono);font-weight:700}
textarea.f{min-height:80px}

/* ---------- signature numpad ---------- */
.pad{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;max-width:340px}
.pad button{position:relative;aspect-ratio:1.35/1;min-height:56px;border:1.5px solid var(--line);border-radius:13px;
  background:var(--card);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;padding:2px}
.pad button .d{font-family:var(--mono);font-weight:800;font-size:20px;line-height:1}
.pad button .l{font-size:9.5px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:var(--ink2);margin-top:3px}
.pad button.pure{border-color:var(--flag)}
.pad button.pure::after{content:"";position:absolute;top:7px;right:7px;width:7px;height:7px;border-radius:50%;background:var(--flag)}
.pad button.on{background:var(--turf-deep);border-color:var(--turf-deep);color:#fff}
.pad button.on .l{color:#CFE6D8}
.pad button.on.pure{background:var(--flag);border-color:var(--flag)}
.pad .axis{grid-column:1/-1;display:flex;justify-content:space-between;font-size:10px;font-weight:800;
  letter-spacing:.1em;text-transform:uppercase;color:var(--ink2);padding:0 2px}
.pad.heat button{cursor:default;min-height:62px}
.pad.heat button .pct{font-family:var(--mono);font-weight:800;font-size:17px}
.pad.heat button .n{font-size:10px;color:var(--ink2);font-family:var(--mono)}

/* ---------- shots ---------- */
.shotRow{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--line);cursor:pointer}
.shotRow:last-child{border-bottom:0}
.shotRow .sn{font-family:var(--mono);font-weight:800;color:var(--ink2);width:20px}
.shotRow .club{font-weight:800;width:44px}
.shotRow .lie{font-family:var(--mono);font-weight:700;font-size:12.5px;background:var(--turf-soft);color:var(--turf-deep);border-radius:7px;padding:3px 7px}
.shotRow .fin{font-family:var(--mono);font-weight:700;font-size:14px}
.penRow{background:var(--flag-soft)}
.penRow .lie{background:#fff;color:var(--flag)}

/* ---------- hole header ---------- */
.holeHd{display:flex;align-items:stretch;gap:10px;margin-bottom:12px}
.holeNo{border-radius:var(--r);background:var(--turf-deep);color:#fff;min-width:76px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:7px;box-shadow:var(--sh)}
.holeNo .h{font-size:10px;font-weight:800;letter-spacing:.15em;text-transform:uppercase;opacity:.7}
.holeNo .n{font-family:var(--mono);font-weight:800;font-size:34px;line-height:1}
.holeMeta{flex:1;border:1px solid var(--line);border-radius:var(--r);background:var(--card);
  display:grid;grid-template-columns:1fr 1fr 1fr;align-items:center;box-shadow:var(--sh)}
.holeMeta div{text-align:center;padding:6px 2px}
.holeMeta .k{font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--ink2)}
.holeMeta .v{font-family:var(--mono);font-weight:800;font-size:22px}

.statChips{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}
.stat{border:1px solid var(--line);border-radius:9px;padding:6px 10px;font-size:12.5px;font-weight:700;background:var(--card)}
.stat b{font-family:var(--mono)}
.stat.good{border-color:var(--turf);color:var(--turf-deep);background:var(--turf-soft)}
.stat.bad{border-color:transparent;color:var(--flag);background:var(--flag-soft)}

/* ---------- overview grid ---------- */
.ovGrid{display:grid;grid-template-columns:repeat(9,1fr);gap:4px}
.ovCell{border:1px solid var(--line);border-radius:9px;padding:4px 2px;text-align:center;cursor:pointer;background:var(--card)}
.ovCell .hn{font-size:9px;font-weight:800;color:var(--ink2)}
.ovCell .sc{font-family:var(--mono);font-weight:800;font-size:16px}
.ovCell .dots{font-size:8px;letter-spacing:1px;min-height:10px}
.ovCell.under{background:var(--turf-deep);border-color:var(--turf-deep);color:#fff}
.ovCell.under .hn{color:#CFE6D8}
.ovCell.over1{background:var(--sand);border-color:transparent}
.ovCell.overX{background:var(--flag-soft);border-color:transparent}

/* ---------- sheet ---------- */
#sheetWrap{position:fixed;inset:0;background:rgba(15,20,17,.5);z-index:60;display:none;align-items:flex-end;justify-content:center}
#sheetWrap.open{display:flex}
#sheet{background:var(--paper);border-radius:22px 22px 0 0;width:100%;max-width:560px;
  max-height:90vh;overflow-y:auto;padding:16px 16px calc(24px + env(safe-area-inset-bottom));-webkit-overflow-scrolling:touch}
#sheet::before{content:"";display:block;width:40px;height:4px;border-radius:2px;background:var(--line);margin:0 auto 12px}
#sheet .sheetHd{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
#sheet .sheetHd .t{font-size:18px;font-weight:800;letter-spacing:-.01em}
.sec{margin:15px 0 5px;font-size:11px;font-weight:800;letter-spacing:.13em;text-transform:uppercase;color:var(--turf)}

.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;max-width:300px}
.keypad button{min-height:52px;border:1.5px solid var(--line);border-radius:13px;background:var(--card);
  font-family:var(--mono);font-weight:800;font-size:22px;cursor:pointer}
.keypad button:active{background:var(--turf-soft)}
.distShow{font-family:var(--mono);font-weight:800;font-size:34px;min-width:110px;text-align:right;
  border-bottom:3px solid var(--ink);padding:0 6px 2px;line-height:1.1}
.distShow .u{font-size:15px;color:var(--ink2);font-weight:700}

/* course grid */
.crsGrid{width:100%;border-collapse:collapse}
.crsGrid th{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--ink2);padding:4px 2px;text-align:center}
.crsGrid td{padding:3px 2px;text-align:center;border-top:1px solid var(--line)}
.crsGrid .hn{font-family:var(--mono);font-weight:800;color:var(--ink2)}
.parBtns{display:flex;gap:3px;justify-content:center}
.parBtns button{width:34px;height:38px;border:1px solid var(--line);border-radius:8px;background:var(--card);
  font-family:var(--mono);font-weight:800;font-size:15px}
.parBtns button.on{background:var(--turf-deep);border-color:var(--turf-deep);color:#fff}
.crsGrid input{width:56px;min-height:38px;text-align:center;border:1px solid var(--line);border-radius:8px;
  font-family:var(--mono);font-weight:700;font-size:15px;padding:2px}
.crsGrid input.si{width:42px}

table.data{width:100%;border-collapse:collapse;font-size:14px}
table.data th{font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--ink2);
  text-align:left;padding:8px 9px;border-bottom:1.5px solid var(--ink)}
table.data td{padding:8px 9px;border-bottom:1px solid var(--line)}
table.data td.num,table.data th.num{text-align:right;font-family:var(--mono)}
table.data tr:last-child td{border-bottom:0}

/* tips & drills */
.tipCard{border:1px solid var(--line);border-radius:var(--r);background:var(--card);padding:13px 15px;margin-bottom:10px;box-shadow:var(--sh)}
.tipCard .tt{font-weight:800;font-size:16px;display:flex;justify-content:space-between;gap:8px}
.tipCard .tb{margin-top:6px;white-space:pre-wrap;font-size:15px;line-height:1.45}
.tipCard img{max-width:100%;border-radius:10px;margin-top:8px}
.tag{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;
  background:var(--turf-soft);color:var(--turf-deep);border-radius:7px;padding:3px 8px;margin:6px 6px 0 0}
.pinBadge{color:var(--amber);font-size:14px}
details.drill{border:1px solid var(--line);border-radius:var(--rs);background:var(--card);margin-bottom:8px;overflow:hidden}
details.drill summary{list-style:none;cursor:pointer;padding:13px 15px;font-weight:800;display:flex;justify-content:space-between;align-items:center;gap:8px}
details.drill summary::-webkit-details-marker{display:none}
details.drill summary::after{content:"▾";color:var(--ink2)}
details.drill[open] summary::after{content:"▴"}
details.drill .db{padding:0 15px 13px;font-size:14.5px;line-height:1.5;white-space:pre-wrap;color:var(--ink)}

.banner{border:0;background:var(--sand);border-radius:var(--rs);padding:10px 13px;
  font-size:14px;font-weight:600;margin-bottom:12px;display:flex;gap:8px;align-items:center;cursor:pointer}
.spark{display:block}
.spark polyline{fill:none;stroke:var(--turf);stroke-width:2.5}
.spark circle{fill:var(--flag)}

.listRow{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid var(--line);cursor:pointer}
.listRow:last-child{border-bottom:0}
.listRow .main{flex:1}
.listRow .ti{font-weight:800;font-size:16px}
.listRow .sub{font-size:13px;color:var(--ink2);margin-top:2px}
.listRow .arr{color:var(--ink2);font-size:18px}

.quip{border-left:4px solid var(--turf);padding:8px 13px;margin:0 0 12px;font-size:16px;font-style:italic;line-height:1.4;background:var(--card);border-radius:0 var(--rs) var(--rs) 0}
.quip .by{display:block;font-style:normal;font-size:12px;font-weight:700;color:var(--ink2);margin-top:5px}

.courseChip{min-width:150px;flex:0 0 auto;border:1px solid var(--line);border-radius:var(--r);background:var(--card);
  padding:12px 14px;cursor:pointer;box-shadow:var(--sh)}
.courseChip .cn{font-weight:800;font-size:15px;line-height:1.2}
.courseChip .cs{font-size:12px;color:var(--ink2);margin-top:3px}
.hscroll{display:flex;gap:9px;overflow-x:auto;padding:2px 2px 8px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.hscroll::-webkit-scrollbar{display:none}

.insight{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:14.5px;line-height:1.4}
.insight:last-child{border-bottom:0}
.insight .ii{font-size:17px}

/* high visibility */
body.hivis{--paper:#FFFFFF;--card:#FFFFFF;--ink:#000;--ink2:#333;--line:#8F8F8F;
  --turf:#0B4A28;--turf-deep:#07351C;--flag:#C40000;--tap:60px;--sh:none;font-size:17px}
body.hivis .pad button{min-height:64px;border-width:2.5px}
body.hivis .btn{border-width:2.5px}
body.hivis .card{border-width:2px}
@media (max-width:380px){ .ovGrid{grid-template-columns:repeat(6,1fr)} }

/* segmented controls used across play + start sheet */
.segs{display:flex;background:#E9EBE7;border-radius:12px;padding:3px;gap:3px}
.segs button{flex:1;min-height:40px;border:0;border-radius:9px;background:transparent;font-weight:700;font-size:14px;color:var(--ink2);cursor:pointer}
.segs button.on{background:var(--card);color:var(--ink);box-shadow:var(--sh)}
/* quick-score button grid (Basic mode) */
.qgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.qgrid button{min-height:56px;border:1.5px solid var(--line);border-radius:12px;background:var(--card);
  font-family:var(--mono);font-weight:800;font-size:19px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center}
.qgrid button .sub{font-family:var(--ui);font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--ink2)}
.qgrid button.on{background:var(--turf-deep);border-color:var(--turf-deep);color:#fff}
.qgrid button.on .sub{color:#CFE6D8}
/* hero number + hole history line */
.big{font-family:var(--mono);font-weight:800;font-size:44px;line-height:1}
.histLine{display:flex;gap:8px;align-items:center;background:var(--sky);border-radius:var(--rs);
  padding:9px 12px;font-size:13.5px;margin-bottom:10px}
.histLine b{font-family:var(--mono)}
</style>
</head>
<body>
<div id="view"></div>
<nav id="nav"></nav>
<div id="sheetWrap"><div id="sheet"></div></div>
<script>
'use strict';
/* ============================================================
   CADDIE BOOK — personal golf scoring, data & practice
   Single-user, offline-first. All data lives in localStorage
   under one key, mirrored to an in-memory fallback.
   ============================================================ */

const DBKEY = 'caddiebook_v1';
let MEMSTORE = null;
let STORAGE_OK = true;

function storeGet(){
  try { return localStorage.getItem(DBKEY); }
  catch(e){ STORAGE_OK = false; return MEMSTORE; }
}
function storeSet(v){
  MEMSTORE = v;
  try { localStorage.setItem(DBKEY, v); }
  catch(e){ STORAGE_OK = false; }
}
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
const $ = s => document.querySelector(s);
function todayISO(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function fmtDate(iso){ if(!iso) return ''; const [y,m,d]=iso.split('-'); return `${m}/${d}/${String(y).slice(2)}`; }
function median(a){ if(!a.length) return null; const s=[...a].sort((x,y)=>x-y); const m=Math.floor(s.length/2); return s.length%2? s[m] : (s[m-1]+s[m])/2; }
function quantile(a,q){ if(!a.length) return null; const s=[...a].sort((x,y)=>x-y); const p=(s.length-1)*q; const b=Math.floor(p); return s[b] + (s[Math.min(b+1,s.length-1)]-s[b])*(p-b); }
function mean(a){ return a.length? a.reduce((x,y)=>x+y,0)/a.length : null; }
function sd(a){ if(a.length<2) return null; const m=mean(a); return Math.sqrt(a.reduce((s,x)=>s+(x-m)*(x-m),0)/(a.length-1)); }
function r1(x){ return x==null? '–' : (Math.round(x*10)/10).toFixed(1); }
function r0(x){ return x==null? '–' : String(Math.round(x)); }
function pct(n,d){ return d? Math.round(100*n/d)+'%' : '–'; }

/* ---------------- default state / seed ---------------- */
function defaultBag(){
  const rows = [
    ['Dr','D',270],['3w','W',240],['5i','I',190],['6i','I',178],['7i','I',166],
    ['8i','I',154],['9i','I',142],['PW','Wg',130],['52°','Wg',115],['56°','Wg',100],['60°','Wg',82],['Pt','P',0]
  ];
  return rows.map((r,i)=>({id:uid()+i, label:r[0], type:r[1], stock:r[2], sort:i, brand:'', model:'', bench:false}));
}
function seedTips(){
  return [
    {id:uid()+'t1', title:'Wedge clock system', body:'½ = hands to 9 o’clock, ¾ = 10:30, full = normal. Same tempo for all three. Log carry for each and trust the matrix, not the feel of the day.', tags:['wedges','pre-shot'], pinned:true, created:todayISO()},
    {id:uid()+'t2', title:'Lag putt: look at the hole', body:'On putts over 25 ft, take two rehearsal strokes while looking at the hole, then match that energy. Goal is a 3-ft circle, not the cup.', tags:['putting'], pinned:false, created:todayISO()},

function suggestClub(dist){
  if(!dist) return null;

/* ============================================================
   DERIVATION ENGINE — everything auto-computed from shot list,
   any field overridable per hole via h.ov
   ============================================================ */
function firstPuttShot(h){
  return (h.shots||[]).find(s=>s.lie==='GR') || null;
}
function deriveHole(h){
  const shots = h.shots||[];
  const ov = h.ov||{};
  const pen = ov.pen!=null? ov.pen : (h.pen||0);
  const score = ov.score!=null? ov.score : (shots.length? shots.length + pen : null);
  const putts = ov.putts!=null? ov.putts : shots.filter(s=>s.lie==='GR').length;

  // FIR: par 3 => '-', else first tee shot lateral === 'C'
  let fir = ov.fir!=null? ov.fir : null;
  if(fir==null){
    if(h.par<=3) fir='-';
    else{
      const tee = shots.find(s=>s.lie==='T');
      if(!tee) fir=null;
      else if(tee.fType==='lat') fir = tee.lat==='C' ? 'Y' : 'N';
      else if(tee.fType==='green') fir = '-';   // went for the green from the tee
      else fir = null;
    }
  }

  // GIR: strokes to reach green <= par-2
  let gir = ov.gir!=null? ov.gir : null;
  if(gir==null && shots.length){
    const fpIdx = shots.findIndex(s=>s.lie==='GR');
    if(fpIdx>=0){
      const strokesToGreen = fpIdx + pen;              // shots before first putt + penalties
      gir = strokesToGreen <= h.par-2 ? 'Y':'N';
    } else if(score!=null){
      // holed out from off the green: GIR only if it dropped within regulation strokes
      gir = score <= h.par-2 ? 'Y' : 'N';
    }
  }

  const threePutt = putts>=3;

  // scrambling: missed GIR → attempt; made if par or better
  let udA = ov.udA!=null? ov.udA : (gir==='N' && score!=null);
  let udM = ov.udM!=null? ov.udM : (udA && score!=null && score<=h.par);

  // sand
  const sandShots = ov.sand!=null? ov.sand : shots.filter(s=>s.lie==='SD').length;
  const greensideSand = shots.some(s=>s.lie==='SD' && (s.unit==='y'? (s.dist==null||s.dist<=50):true));
  const sandA = greensideSand && gir==='N';
  const sandM = sandA && score!=null && score<=h.par;

  const fp = firstPuttShot(h);
  let fpFt = fp? fp.dist : null, fpMade = fp? fp.pad===5 : null;
  if(fpFt==null && ov.firstPuttFt!=null){ fpFt=ov.firstPuttFt; fpMade = putts>=1? putts===1 : null; }
  return {score, putts, fir, gir, pen, threePutt, udA, udM,
          sand:sandShots, sandA, sandM,
          firstPuttFt: fpFt, firstPuttMade: fpMade,
          toPar: score!=null? score-h.par : null};
}
function deriveRound(r){
  if(r.legacy) return deriveLegacyRound(r);
  const holes = r.holes||[];
  let sc=0,par=0,putts=0,pen=0,played=0, firY=0,firN=0, girY=0,girN=0, tp=0, udA=0,udM=0, sA=0,sM=0, f9=0,b9=0;
  const perHole=[];
  holes.forEach(h=>{
    const d = deriveHole(h); perHole.push(d);
    if(d.score!=null){ played++; sc+=d.score; par+=h.par; putts+=d.putts; pen+=d.pen;
      if(h.n<=9) f9+=d.score; else b9+=d.score;
      if(d.fir==='Y') firY++; else if(d.fir==='N') firN++;
      if(d.gir==='Y') girY++; else if(d.gir==='N') girN++;
      if(d.threePutt) tp++;
      if(d.udA){ udA++; if(d.udM) udM++; }
      if(d.sandA){ sA++; if(d.sandM) sM++; }
    }
  });
  return {perHole, played, score:sc, par, toPar:sc-par, putts, pen, f9, b9,
          firY, firD:firY+firN, girY, girD:girY+girN, tp, udA, udM, sA, sM};
}

/* ---------------- legacy (imported) rounds ----------------
   Imported from 18Birdies: hole strokes + round aggregates only.
   No per-shot data, no hole pars, no rating/slope. */
function deriveLegacyRound(r){
  const a = r.agg||{};
  const hs = (r.holes||[]).map(h=>h.strokes||0);
  const f9 = hs.slice(0,9).reduce((s,x)=>s+x,0);
  const b9 = hs.slice(9).reduce((s,x)=>s+x,0);
  return {legacy:true, perHole:hs.map(s=>({score:s})), played:hs.length,
    score:a.strokes||f9+b9, par:(a.strokes||0)-(a.toPar||0), toPar:a.toPar||0,
    putts:a.putts||0, pen:0, f9, b9,
    firY:a.firY||0, firD:a.firD||0, girY:a.girY||0, girD:a.girD||0,
    tp:0, udA:0, udM:0, sA:0, sM:0,
    eagles:a.eagles||0, birdies:a.birdies||0, pars:a.pars||0, bogeys:a.bogeys||0, dblOrWorse:a.dblOrWorse||0};
}

/* ============================================================
   HANDICAP (WHS-style)
   Differential = 113/slope × (AGS − rating)
   Index = per-count table over most recent 20 rounds
   ============================================================ */
function courseHandicap(index, slope, rating, parTotal){
  if(index==null||!slope) return null;
  return Math.round(index * (slope/113) + ((rating||parTotal) - parTotal));
}
function strokesOnHole(ch, si){
  if(ch==null||!si) return 0;
  if(ch<=0) return 0;
  return Math.floor(ch/18) + (si <= (ch%18) ? 1 : 0);
}
function adjustedGross(r, indexBefore){
  const tee = teeOf(r);
  const parTotal = r.holes.reduce((s,h)=>s+h.par,0);
  const ch = indexBefore!=null && tee? courseHandicap(indexBefore, tee.slope, tee.rating, parTotal) : null;
  let ags=0, complete=true;
  for(const h of r.holes){
    const d=deriveHole(h);
    if(d.score==null){ complete=false; ags += h.par + (ch!=null? strokesOnHole(ch,h.si||18):0); continue; } // net par for unplayed (WHS hole-not-played)
    const cap = ch!=null ? h.par + 2 + strokesOnHole(ch, h.si||18) : h.par + 5;
    ags += Math.min(d.score, cap);
  }
  return {ags, complete};
}
function scoreDifferential(r, indexBefore){
  if(!is18(r)) return null;                     // 9-hole differentials need 9-hole ratings we don't store
  const tee = teeOf(r);
  if(!tee || !tee.slope || !tee.rating) return null;
  const {ags} = adjustedGross(r, indexBefore);
  return Math.round((113/tee.slope) * (ags - tee.rating) * 10)/10;
}
function handicapIndexFrom(diffs){
  const n = diffs.length;
  if(n<3) return null;
  const s=[...diffs].sort((a,b)=>a-b);
  const avg=(k)=> s.slice(0,k).reduce((a,b)=>a+b,0)/k;
  let idx;
  if(n>=20) idx=avg(8);
  else if(n===19) idx=avg(7);
  else if(n>=17) idx=avg(6);
  else if(n>=15) idx=avg(5);
  else if(n>=12) idx=avg(4);
  else if(n>=9)  idx=avg(3);
  else if(n>=7)  idx=avg(2);
  else if(n===6) idx=avg(2)-1.0;
  else if(n===5) idx=avg(1);
  else if(n===4) idx=avg(1)-1.0;
  else           idx=avg(1)-2.0; // n===3
  return Math.round(idx*10)/10;
}
function roundSpan(r){
  if(r.span) return r.span;                     // '18' | 'F9' | 'B9'
  return (r.holes||[]).length<=10 ? 'F9' : '18';
}
function is18(r){ return roundSpan(r)==='18'; }

/* global stats filter, applied across the Stats tab */
let STATF = {time:'all', courseId:''};          // time: all | ytd | l90 | l5
function filteredRounds(){
  let rs = finishedRounds();
  if(STATF.courseId) rs = rs.filter(r=>r.courseId===STATF.courseId);
  if(STATF.time==='ytd'){ const y=new Date().getFullYear(); rs=rs.filter(r=>r.date&&r.date.startsWith(String(y))); }
  else if(STATF.time==='l90'){ const cut=new Date(Date.now()-90*864e5).toISOString().slice(0,10); rs=rs.filter(r=>r.date>=cut); }
  else if(STATF.time==='l5'){ rs=rs.slice(-5); }
  return rs;
}

function finishedRounds(){
  return S.rounds.filter(r=>r.finished).sort((a,b)=> (a.date+a.id) < (b.date+b.id) ? -1:1);
}
function handicapTimeline(){
  const rs = finishedRounds();
  const out=[]; let idx=null;
  rs.forEach(r=>{
    const d = scoreDifferential(r, idx);
    r._diff = d;
    if(d!=null){
      const recent = out.filter(o=>o.diff!=null).slice(-19).map(o=>o.diff).concat([d]);
      idx = handicapIndexFrom(recent);
    }
    out.push({round:r, diff:d, index:idx});
  });
  return out;
}
function currentIndex(){
  const t=handicapTimeline();
  for(let i=t.length-1;i>=0;i--) if(t[i].index!=null) return t[i].index;
  return null;
}

function cePar(i,p){ CE.holes[i].par=p; ceGrab(); renderCourseEditor(); }

function ceGrab(){ CE.name=$('#ceName').value; CE.teeName=$('#ceTee').value; CE.rating=$('#ceRating').value; CE.slope=$('#ceSlope').value;
  if($('#ceCity')) CE.info.city=$('#ceCity').value.trim();
  if($('#ceState')) CE.info.state=$('#ceState').value.trim();
  document.querySelectorAll('.crsGrid input').forEach((inp,j)=>{ const i=Math.floor(j/2); if(j%2===0)CE.holes[i].ydg=parseInt(inp.value)||''; else CE.holes[i].si=parseInt(inp.value)||''; }); }
function cePasteUI(){
  ceGrab();
  openSheet(`<div class="sheetHd"><span class="t">Paste scorecard text</span><button class="btn sm ghost" onclick="renderCourseEditor()">Back</button></div>
    <div class="small muted" style="margin-bottom:8px">Paste anything the camera copied — messy is fine. Numbers 3–5 in runs of 18 are read as pars, 100–650 as yardages, 1–18 as stroke index.</div>
    <textarea class="f" id="cePaste" style="min-height:160px" placeholder="4 4 3 5 4 4 3 4 5 …&#10;387 402 165 520 …"></textarea>
    <div style="height:10px"></div>
    <button class="btn primary wide" onclick="ceParse()">Read numbers → verify grid</button>`);
}
function ceParse(){
  const txt=$('#cePaste').value;
  const nums=(txt.match(/\d+(\.\d+)?/g)||[]).map(Number);
  const ratingIdx = nums.findIndex(n=>n>=60 && n<=80 && !Number.isInteger(n));
  const rating = ratingIdx>=0 ? nums[ratingIdx] : null;
  const tok = nums.map(n=>({v:n,used:!Number.isInteger(n)}));
  let slope = null;
  // slope: an integer 55–155 sitting right next to the rating (e.g. "71.4 / 132")
  if(ratingIdx>=0){
    for(const j of [ratingIdx+1,ratingIdx+2,ratingIdx-1]){
      if(tok[j] && !tok[j].used && tok[j].v>=55 && tok[j].v<=155){ slope=tok[j].v; tok[j].used=true; break; }
    }
  }
  const ints = tok;
  const pars=[], ydgs=[];
  for(const t of ints){
    if(t.used) continue;
    if(t.v>=3&&t.v<=5 && pars.length<18){ pars.push(t.v); t.used=true; }
    else if(t.v>=100&&t.v<=650 && ydgs.length<18){ ydgs.push(t.v); t.used=true; }
  }
  // slope fallback: any leftover int 55–155
  if(slope==null){ for(const t of ints){ if(!t.used && t.v>=55 && t.v<=155){ slope=t.v; t.used=true; break; } } }
  // stroke index: unused ints 1–18, each once
  const sis=[]; const seen=new Set();
  for(const t of ints){ if(!t.used && t.v>=1&&t.v<=18 && !seen.has(t.v) && sis.length<18){ seen.add(t.v); sis.push(t.v); t.used=true; } }
  pars.forEach((p,i)=>{ if(CE.holes[i]) CE.holes[i].par=p; });
  ydgs.forEach((y,i)=>{ if(CE.holes[i]) CE.holes[i].ydg=y; });
  if(sis.length===18) sis.forEach((s,i)=>{ CE.holes[i].si=s; });
  if(rating) CE.rating=rating;
  if(slope) CE.slope=slope;
  renderCourseEditor();
  toast(`Read ${pars.length} pars, ${ydgs.length} yardages${sis.length===18?', 18 stroke indexes':''}${rating?', rating '+rating:''}${slope?', slope '+slope:''}. Verify below.`);
}
function ceSave(){
  ceGrab();
  if(!CE.name.trim()){ toast('Name the course'); return; }
  const teeObj={id:uid(), name:CE.teeName.trim()||'Tee', rating:parseFloat(CE.rating)||null, slope:parseInt(CE.slope)||null,
    holes:CE.holes.map(h=>({n:h.n,par:h.par,ydg:parseInt(h.ydg)||null,si:parseInt(h.si)||null}))};
  if(CE.courseId){
    const c=S.courses.find(x=>x.id===CE.courseId); c.name=CE.name.trim();
    c.info=Object.assign(c.info||{}, CE.info);
    c.tees[0]=Object.assign(c.tees[0]||{}, teeObj, {id:(c.tees[0]||teeObj).id});
  } else {
    S.courses.push({id:uid(), name:CE.name.trim(), info:{...CE.info}, tees:[teeObj]});
  }
  save(); closeSheet();
  if(CE.startAfter) startRoundSheet(); else render();
}

function bset(k,v){ const h=curHole(); h.ov=h.ov||{};
  h.ov[k] = h.ov[k]===v? undefined : v;
  if(h.ov[k]===undefined) delete h.ov[k];
  render(); }
function bstep(k,dv){ const h=curHole(); h.ov=h.ov||{}; h.ov[k]=Math.max(0,(h.ov[k]||0)+dv); render(); }
function bclear(){ const h=curHole(); h.ov={}; render(); }
function bPad(dgt){ const h=curHole(); h.ov=h.ov||{};
  if(h.ov.girPad===dgt){ delete h.ov.girPad; delete h.ov.gir; }
  else { h.ov.girPad=dgt; h.ov.gir = dgt===5? 'Y':'N'; }
  render(); }
function setMode(m){ activeRound().mode=m; render(); }
function addDrink(){ const r=activeRound(); r.ctx=r.ctx||{drinks:0}; r.ctx.drinks=(r.ctx.drinks||0)+1; render(); }
function holeHistory(courseId, holeN, excludeId){
  const scores=[];
  S.rounds.forEach(r=>{ if(!r.finished||r.courseId!==courseId||r.id===excludeId) return;
    (r.holes||[]).forEach(h=>{ if(h.n!==holeN) return;
      const sc=r.legacy? h.strokes : deriveHole(h).score; if(sc!=null) scores.push(sc); }); });
  return {n:scores.length, avg:mean(scores), best:scores.length?Math.min(...scores):null};
}
function setWind(w){ const h=curHole(); h.windD = h.windD===w? '':w; if(!h.windD)h.windS=0; else if(!h.windS)h.windS=1; render(); }
function setWindS(n){ curHole().windS=n; render(); }
function curHole(){ const r=activeRound(); return r.holes[r.curHole-1]; }
function navHole(dir){
  const r=activeRound(); const nH=r.holes.length;
  if(dir>0 && r.curHole===nH){ PLAYVIEW='overview'; render(); return; }
  r.curHole=Math.min(nH,Math.max(1,r.curHole+dir)); render();
}
function adjPen(d){ const h=curHole(); h.pen=Math.max(0,(h.pen||0)+d); render(); }
function penaltyDrop(){ const h=curHole(); h.pen=(h.pen||0)+1; render(); newShot('HZ'); }
function cycleOv(k){
  const h=curHole(); h.ov=h.ov||{};
  if(k==='fir'||k==='gir'){ const cur=deriveHole(h)[k]; const seq= k==='fir'&&h.par<=3? ['-']:['Y','N']; 
    const nxt = seq[(seq.indexOf(cur)+1)%seq.length]; h.ov[k]=nxt; }
  if(k==='ud'){ const cur=deriveHole(h).udM; h.ov.udA=true; h.ov.udM=!cur; }
  render();
}

function blankShot(prefLie){
  const h=curHole();
  const prev=h.shots[h.shots.length-1];
  let lie = prefLie || 'FW';
  if(!prefLie){
    if(!h.shots.length) lie='T';
    else if(prev.lie==='GR' && prev.pad!==5) lie='GR';
    else if(prev.fType==='green') lie='GR';
    else if(prev.fType==='lat') lie = prev.lat==='C'?'FW':'RF';
  }
  const remain = estRemaining(h);
  return {id:uid(), clubId: lie==='GR'? putterId(): suggestClub(remain), lie,
    dist: null, unit: lie==='GR'?'f':'y', fType:null, lat:null, pad:null,
    shape:null, effort:null, frac:null, strike:null, note:''};
}
function estRemaining(h){
  if(!h.shots.length) return h.ydg||null;
  const last=h.shots[h.shots.length-1];
  if(last.unit==='y'&&last.dist&&last.clubId){ const c=club(last.clubId); if(c&&c.stock) return Math.max(0, last.dist - c.stock) || Math.round(last.dist*0.12); }
  return null;
}
function newShot(prefLie){ SH={idx:null, s:blankShot(prefLie), more:false, distStr:''}; renderShotSheet(); }
function editShot(i){ const h=curHole(); SH={idx:i, s:JSON.parse(JSON.stringify(h.shots[i])), more:true, distStr: h.shots[i].dist!=null? String(h.shots[i].dist):''}; renderShotSheet(); }

function defaultFType(s){
  if(s.lie==='GR') return 'putt';
  const c=club(s.clubId);
  if(s.lie==='T' && curHole().par>3) return 'lat';
  if(c && c.type==='D') return 'lat';
  if(s.dist!=null) return s.dist<=240? 'green':'lat';
  if(curHole().par===3 && s.lie==='T') return 'green';
  return c && (c.type==='Wg'||c.type==='I')? 'green':'lat';
}
function renderShotSheet(){
  const s=SH.s;
  if(s.lie==='GR'){ s.unit='f'; if(!s.clubId) s.clubId=putterId(); }
  else s.unit='y';
  if(!s.fType) s.fType=defaultFType(s);
  if(s.fType==='putt' && s.lie!=='GR') s.fType=defaultFType(s);

  const lieChips = LIES.map(l=>`<button class="chip ${s.lie===l[0]?'on':''}" onclick="shSet('lie','${l[0]}')">${l[0]}<span class="small" style="margin-left:5px;font-weight:600;opacity:.75">${S.settings.showLabels? l[1]:''}</span></button>`).join('');
  const sug = s.lie!=='GR'? suggestClub(parseInt(SH.distStr)||null): putterId();
  const clubChips = S.clubs.map(c=>`<button class="chip ${s.clubId===c.id?'on':(c.id===sug?'hint':'')}" onclick="shSet('clubId','${c.id}')">${esc(c.label)}</button>`).join('');
  const keyp = `
    <div class="row" style="align-items:flex-end;gap:14px;margin-bottom:8px">
      <div class="distShow">${SH.distStr||'<span class="muted">–</span>'}<span class="u"> ${s.unit==='f'?'ft':'yds'}</span></div>
      <div class="small muted">${s.lie==='GR'? 'first-putt distance':'distance to target'}</div>
    </div>
    <div class="keypad">
      ${[1,2,3,4,5,6,7,8,9].map(n=>`<button onclick="shKey('${n}')">${n}</button>`).join('')}
      <button onclick="shKey('C')" style="font-size:15px">CLR</button><button onclick="shKey('0')">0</button><button onclick="shKey('B')">⌫</button>
    </div>`;
  const fSwitch = s.lie==='GR'? '' :
    `<div class="chips" style="margin-bottom:8px">
       <button class="chip sm ${s.fType==='green'?'on':''}" onclick="shSet('fType','green')">Green attempt</button>
       <button class="chip sm ${s.fType==='lat'?'on':''}" onclick="shSet('fType','lat')">Layup / tee ball</button></div>`;
  let finish='';
  if(s.fType==='lat'){
    finish = `<div class="chips">${LATS.map(L=>`<button class="chip ${s.lat===L?'on':''}" style="min-width:56px" onclick="shSet('lat','${L}')">${L}</button>`).join('')}</div>
      <div class="small muted" style="margin-top:6px">${s.lat? LAT_NAME[s.lat]:'Finish vs. intended line'}</div>`;
  } else {
    finish = padHTML(s.fType==='putt'?'putt':'green', s.pad, "shPad");
  }
  const moreBody = `
    <div class="sec">Shape</div>${padHTML('shape', s.shape, "shShape")}
    <div class="sec">Effort</div>
    <div class="chips">
      ${FRACS.map(f=>`<button class="chip ${s.frac===f?'on':''}" onclick="shSet('frac','${f}')">${f}</button>`).join('')}
      <button class="chip ${s.frac===null&&s.effort===null?'on':''}" onclick="shSet('frac',null);shSet('effort',null)">Full</button>
      <input class="f num" style="width:92px;min-height:44px" inputmode="numeric" placeholder="e80" value="${s.effort||''}" onchange="SH.s.effort=parseInt(this.value)||null;SH.s.frac=null;">
    </div>
    <div class="sec">Strike</div>
    <div class="chips">${STRIKES.map(k=>`<button class="chip ${s.strike===k[0]?'on':''}" onclick="shSet('strike','${k[0]}')">${k[0]} <span class="small" style="opacity:.7;margin-left:4px">${k[1]}</span></button>`).join('')}</div>
    <div class="sec">Note</div>
    <input class="f" value="${esc(s.note)}" onchange="SH.s.note=this.value" placeholder="optional">`;
  openSheet(`
    <div class="sheetHd"><span class="t">${SH.idx==null?'Shot '+(curHole().shots.length+1):'Edit shot '+(SH.idx+1)}</span>
      <button class="btn sm ghost" onclick="closeSheet()">Cancel</button></div>
    <div class="sec">Lie — hit from</div><div class="chips">${lieChips}</div>
    <div class="sec">Distance</div>${keyp}
    ${s.lie==='GR'? `<div style="margin-top:8px"><button class="chip sm" onclick="tapIn()">⛳ Tap-in (2 ft, made)</button></div>`:''}
    <div class="sec">Club</div><div class="chips">${clubChips}</div>
    <div class="sec">Finish — where it ended up</div>${fSwitch}${finish}
    <div style="height:10px"></div>
    <button class="btn wide ghost" onclick="SH.more=!SH.more;renderShotSheet()">${SH.more?'▴ Hide detail':'▾ Shape · effort · strike · note'}</button>
    ${SH.more? moreBody:''}
    <div style="height:14px"></div>
    <div class="grid2">
      ${SH.idx!=null? `<button class="btn danger" onclick="delShot()">Delete</button>`:`<span></span>`}
      <button class="btn primary" style="min-height:60px;font-size:18px" onclick="saveShot()">Save shot</button>
    </div>
    ${SH.idx!=null? `<div style="height:8px"></div><div class="grid2">
      <button class="btn sm" onclick="moveShot(-1)">↑ Move up</button><button class="btn sm" onclick="moveShot(1)">↓ Move down</button>
    </div><div style="height:8px"></div><button class="btn sm wide ghost" onclick="insertBefore()">Insert a missed shot before this one</button>`:''}
  `);
}
function padHTML(kind, sel, fn){
  const rows=padRows(kind), lab=PAD_LABELS[kind], ax=PAD_AXES[kind];
  const topAx = (kind==='shape'&&!S.settings.shapeTopDraw)? ['FADE ↑','DRAW ↓'] : ax;
  let b=`<div class="pad"><div class="axis"><span>◀ LEFT</span><span>${topAx[0]}</span><span>RIGHT ▶</span></div>`;
  for(const row of rows) for(const d of row){
    b+=`<button class="${d===5?'pure ':''}${sel===d?'on':''}" onclick="${fn}(${d})">
        <span class="d">${d}</span>${S.settings.showLabels?`<span class="l">${lab[d]}</span>`:''}</button>`;
  }
  b+=`<div class="axis"><span></span><span>${topAx[1]}</span><span></span></div></div>`;
  return b;
}
function shSet(k,v){
  if(k==='lie'){ SH.s.lie=v; SH.s.fType=null; SH.s.pad=null; SH.s.lat=null;
    if(v==='GR'){SH.s.unit='f'; SH.s.clubId=putterId();} else {SH.s.unit='y'; if(SH.s.clubId===putterId()) SH.s.clubId=null;} }
  else if(k==='fType'){ SH.s.fType=v; if(v==='lat')SH.s.pad=null; else SH.s.lat=null; }
  else if(k==='frac'){ SH.s.frac = SH.s.frac===v? null:v; if(SH.s.frac)SH.s.effort=null; }
  else if(k==='strike'){ SH.s.strike = SH.s.strike===v? null:v; }
  else { if(k==='clubId') SH.userPickedClub=true; SH.s[k]=v; }
  renderShotSheet();
}
function shKey(k){
  if(k==='C') SH.distStr='';
  else if(k==='B') SH.distStr=SH.distStr.slice(0,-1);
  else if(SH.distStr.length<3) SH.distStr+=k;
  SH.s.dist = SH.distStr? parseInt(SH.distStr):null;
  if(SH.s.lie!=='GR' && !SH.userPickedClub){ const sg=suggestClub(SH.s.dist); if(sg) SH.s.clubId=sg; }
  renderShotSheet();
}
function shPad(d){ SH.s.pad = SH.s.pad===d? null:d; renderShotSheet(); }
function shShape(d){ SH.s.shape = SH.s.shape===d? null:d; renderShotSheet(); }
function saveShot(){
  const h=curHole(); const s=SH.s;
  s.dist = SH.distStr? parseInt(SH.distStr) : s.dist;
  if(SH.idx==null) h.shots.push(s); else h.shots[SH.idx]=s;
  closeSheet(); render();
}
function delShot(){ curHole().shots.splice(SH.idx,1); closeSheet(); render(); }
function moveShot(d){ const a=curHole().shots; const j=SH.idx+d; if(j<0||j>=a.length)return;
  [a[SH.idx],a[j]]=[a[j],a[SH.idx]]; SH.idx=j; renderShotSheet(); render(); }
function insertBefore(){ const h=curHole(); const ins=blankShot(); h.shots.splice(SH.idx,0,ins);
  SH={idx:SH.idx, s:h.shots[SH.idx], more:false, distStr:''}; renderShotSheet(); }

        <span>Pen <b class="num">${rd.pen}</b></span></div>
    </div></div>

      <span class="small">Vibe <span class="stars">${[1,2,3,4,5].map(v=>`<button class="${(r.ctx.vibe||0)>=v?'on':''}" onclick="rVibe('${r.id}',${v})">⭐</button>`).join('')}</span></span>

      ${r.ctx.partners?`<span class="small">👥 ${esc(r.ctx.partners)}</span>`:''}
    </div></div></div>`:''}

      <div style="height:8px"></div><button class="btn wide danger" onclick="if(confirm('Discard this round entirely?')){S.rounds=S.rounds.filter(x=>x.id!=='${r.id}');S.activeRoundId=null;PLAYVIEW='home';render();}">Discard round</button>`
    : `<button class="btn wide" onclick="exportRoundText('${r.id}')">Copy AI text export</button>`}`;
}
function jumpHole(n){ const r=activeRound()||S.rounds.find(x=>x.id===VIEWROUND); if(!r||r.finished) return;
  const i=r.holes.findIndex(h=>h.n===n); if(i>=0){ r.curHole=i+1; PLAYVIEW='hole'; render(); } }
function finishRound(){
  const r=activeRound(); r.finished=true; S.activeRoundId=null;
  handicapTimeline(); // stamps _diff
  VIEWROUND=r.id; PLAYVIEW='roundDetail'; render();
  toast('Round saved. Stats updated.');
}
function vRoundDetail(id){
  const r=S.rounds.find(x=>x.id===id); if(!r){PLAYVIEW='home';return vRoundsHome();}

  const rd=deriveRound(r);

    const d=rd.perHole[i];

    return `<div class="listRow" onclick="reopenHole('${r.id}',${h.n})"><div class="main">
      <div class="ti">H${h.n} · Par ${h.par} <span class="num" style="margin-left:8px">${d.score!=null?d.score:'–'}</span>
        ${d.gir==='Y'?'<span class="tag">GIR</span>':''}${d.threePutt?'<span class="tag" style="background:var(--flag-soft);color:var(--flag)">3-putt</span>':''}</div>
      <div class="sub">${shots||'no shots logged'}</div></div><span class="arr">›</span></div>`;
  }).join('');
  return `<div class="row" style="justify-content:space-between;margin-bottom:10px">
    <button class="btn sm ghost" onclick="PLAYVIEW='home';render()">‹ Rounds</button>

    <div class="small muted" style="margin:-8px 2px 12px">${fmtDate(r.date)} · ${esc(teeOf(r)?teeOf(r).name:'')} tees${roundSpan(r)!=='18'?' · '+(roundSpan(r)==='B9'?'back 9':'front 9'):''}${r._diff!=null? ' · differential '+r1(r._diff):''}${r.weather? ' · '+esc(r.weather):''}${r.ctx&&r.ctx.partners? ' · with '+esc(r.ctx.partners):''}${r.ctx&&r.ctx.vibe? ' · '+'⭐'.repeat(r.ctx.vibe):''}${r.ctx&&r.ctx.drinks? ' · 🍺'+r.ctx.drinks:''}</div>
    <div class="card"><div class="bd tight">${holes}</div></div>
    <div class="grid2"><button class="btn" onclick="exportRoundText('${r.id}')">Copy AI text</button>
    <button class="btn" onclick="reopenRound('${r.id}')">Reopen to edit</button></div>
    <div style="height:8px"></div>
    <button class="btn wide danger sm" onclick="if(confirm('Delete this round?')){S.rounds=S.rounds.filter(x=>x.id!=='${r.id}');PLAYVIEW='home';render();}">Delete round</button>`;
}

/* Online course lookup via golfcourseapi.com — optional; offline paths stand alone. */
let GCRES=null;
async function gcApi(path){
  const res = await fetch('https://api.golfcourseapi.com/v1/'+path, {headers:{'Authorization':'Key '+S.settings.gcApiKey}});
  if(!res.ok) throw new Error('HTTP '+res.status);
  return res.json();
}
async function gcSearch(){
  ceGrab();
  const q = CE.name.trim(); if(!q){ toast('Type the course name first.'); return; }
  toast('Searching…');
  try{
    const data = await gcApi('search?search_query='+encodeURIComponent(q));
    GCRES = (data.courses||[]).slice(0,5);
    if(!GCRES.length){ toast('No matches. Paste or type it instead.'); return; }
    openSheet(`<div class="sheetHd"><span class="t">Pick your course</span><button class="btn sm ghost" onclick="renderCourseEditor()">Back</button></div>
      ${GCRES.map((c,i)=>{
        const tees=((c.tees&&c.tees.male)||[]).concat((c.tees&&c.tees.female)||[]);
        return `<div class="card"><div class="bd">
          <div style="font-weight:800">${esc(c.club_name||'')}${c.course_name&&c.course_name!==c.club_name? ' — '+esc(c.course_name):''}</div>
          <div class="small muted">${esc([c.location&&c.location.city, c.location&&c.location.state].filter(Boolean).join(', '))}</div>
          <div class="chips" style="margin-top:8px">${tees.map((t,j)=>`<button class="chip sm" onclick="gcApply(${i},${j})">${esc(t.tee_name)} · ${t.course_rating||'?'} / ${t.slope_rating||'?'}</button>`).join('')||'<span class="small muted">no tee data</span>'}</div>
        </div></div>`;}).join('')}`);
  }catch(e){
    toast('Lookup failed ('+e.message+'). If this keeps happening the API may block browser requests — the paste import always works.');
  }
}
function gcApply(ci,ti){
  const c=GCRES[ci];
  const tees=((c.tees&&c.tees.male)||[]).concat((c.tees&&c.tees.female)||[]);
  const t=tees[ti]; if(!t) return;
  CE.name = CE.name || c.club_name || '';
  if(!CE.name.trim()) CE.name = c.club_name||c.course_name||'';
  CE.teeName = t.tee_name||'Tee';
  CE.rating = t.course_rating||''; CE.slope = t.slope_rating||'';
  CE.info = {address:(c.location&&c.location.address)||'', city:(c.location&&c.location.city)||'', state:(c.location&&c.location.state)||''};
  (t.holes||[]).slice(0,18).forEach((hh,i)=>{ CE.holes[i]={n:i+1, par:hh.par||4, ydg:hh.yardage||'', si:hh.handicap||''}; });
  renderCourseEditor();
  toast('Filled from golfcourseapi.com — verify the grid.');
}
function gcFill(courseId){ courseEditor(courseId,false); setTimeout(gcSearch, 50); }

let HM = {kind:'green', clubId:'', span:'all', band:''};   // heatmap filters

function allShots(spanRounds){
  const rs = spanRounds || finishedRounds();
  const out=[];
  rs.forEach(r=> r.holes.forEach(h=> (h.shots||[]).forEach(s=> out.push({r,h,s}))));
  return out;
}


function statFilterBar(){
  const times=[['all','All time'],['ytd','This year'],['l90','90 days'],['l5','Last 5']];
  const courses=[...new Set(finishedRounds().map(r=>r.courseId))].map(id=>S.courses.find(c=>c.id===id)).filter(Boolean);
  return `<div class="chips" style="margin-bottom:10px">
    ${times.map(t=>`<button class="chip sm ${STATF.time===t[0]?'on':''}" onclick="STATF.time='${t[0]}';render()">${t[1]}</button>`).join('')}
  </div>
  ${courses.length>1? `<select class="f" style="min-height:44px;margin-bottom:12px" onchange="STATF.courseId=this.value;render()">
    <option value="">All courses</option>
    ${courses.map(c=>`<option value="${c.id}" ${STATF.courseId===c.id?'selected':''}>${esc(c.name)}</option>`).join('')}</select>`:''}`;
}
function vStats(){
  const rs=filteredRounds();
  if(!rs.length) return `<div class="pageTitle"><h1>Stats</h1></div>${statFilterBar()}
    <div class="card"><div class="bd"><p class="muted">No rounds match this filter yet. Finish a round and this page fills itself in: handicap, scoring, putting, heatmaps, stock yardages, the wedge matrix.</p></div></div>`;
  const tl=handicapTimeline();
  const idx=currentIndex();
  const rds=rs.map(r=>deriveRound(r));
  const n=rs.length;
  const r18=rs.filter(is18), r9=rs.filter(r=>!is18(r));
  const d18=r18.map(deriveRound), d9=r9.map(deriveRound);
  const scores18=d18.map(d=>d.score), scores9=d9.map(d=>d.score);
  const totHoles=rds.reduce((s,d)=>s+d.played,0);
  const per18=(tot)=> totHoles? tot/totHoles*18 : null;

  const shotRs = rs.filter(r=>!r.legacy);             // rounds with full shot detail
  const nShot = shotRs.length, nLegacy = n-nShot;
  // scoring by par (shot-tracked only: legacy holes carry no par)
  const byPar={3:[],4:[],5:[]};
  shotRs.forEach(r=>r.holes.forEach(h=>{const d=deriveHole(h); if(d.score!=null&&byPar[h.par]) byPar[h.par].push(d.score);}));
  // score distribution — Dbl+ bucket so 18Birdies aggregates merge cleanly
  const dist={eagle:0,birdie:0,par:0,bogey:0,dbl:0};
  shotRs.forEach(r=>r.holes.forEach(h=>{const d=deriveHole(h); if(d.score==null)return; const t=d.score-h.par;
    if(t<=-2)dist.eagle++; else if(t===-1)dist.birdie++; else if(t===0)dist.par++; else if(t===1)dist.bogey++; else dist.dbl++;}));
  rds.filter(d=>d.legacy).forEach(d=>{dist.eagle+=d.eagles;dist.birdie+=d.birdies;dist.par+=d.pars;dist.bogey+=d.bogeys;dist.dbl+=d.dblOrWorse;});
  // aggregates: FIR/GIR/putts blend legacy; scrambling/3-putt need shot detail
  const agg=rds.reduce((a,d)=>{a.firY+=d.firY;a.firD+=d.firD;a.girY+=d.girY;a.girD+=d.girD;a.pen+=d.pen;a.putts+=d.putts;
    if(!d.legacy){a.tp+=d.tp;a.udA+=d.udA;a.udM+=d.udM;a.sA+=d.sA;a.sM+=d.sM;a.holes+=d.played;} return a;},
    {firY:0,firD:0,girY:0,girD:0,tp:0,udA:0,udM:0,sA:0,sM:0,pen:0,putts:0,holes:0});
  // putts per GIR + first-putt detail (shot-tracked only)
  let pGIR=[],fp=[];
  shotRs.forEach(r=>r.holes.forEach(h=>{const d=deriveHole(h);
    if(d.gir==='Y') pGIR.push(d.putts);
    if(d.firstPuttFt!=null) fp.push({ft:d.firstPuttFt, made:d.firstPuttMade, putts:d.putts});}));
  // first-putt buckets
  const buckets=[[0,3],[4,6],[7,10],[11,20],[21,30],[31,999]];
  const bRows=buckets.map(b=>{
    const g=fp.filter(x=>x.ft>=b[0]&&x.ft<=b[1]);
    return `<tr><td class="num">${b[1]===999? b[0]+'+':b[0]+'–'+b[1]} ft</td>
      <td class="num">${g.length}</td>
      <td class="num">${pct(g.filter(x=>x.made).length,g.length)}</td>
      <td class="num">${g.length? r1(mean(g.map(x=>x.putts))):'–'}</td>
      <td class="num">${pct(g.filter(x=>x.putts>=3).length,g.length)}</td></tr>`;
  }).join('');

  return `<div class="pageTitle"><h1>Stats</h1><span class="eyebrow">${r18.length}×18 ${r9.length?'· '+r9.length+'×9 ':''}${nLegacy?'· '+nLegacy+' imported':''}</span></div>
  ${statFilterBar()}

  <div class="card"><div class="hd"><span class="t">Handicap</span>
      <span class="num" style="font-size:20px;font-weight:800">${idx!=null? r1(idx):'–'}</span></div>
    <div class="bd">
      ${idx==null? `<p class="small muted">A WHS-style index appears after 3 rounds with a rated tee. ${n} of 3 so far.</p>`:''}
      ${spark(tl.filter(t=>t.index!=null).map(t=>t.index))}
      <div class="small muted" style="margin-top:6px">Differential = 113 ÷ slope × (adjusted gross − rating). Index = best 8 of last 20 (reduced table under 20). Last: ${tl.length&&tl[tl.length-1].diff!=null? r1(tl[tl.length-1].diff):'–'}</div>
      ${idx!=null && rs.length? courseHcpLine(idx):''}
    </div></div>

  <div class="card"><div class="hd"><span class="t">Scoring</span></div><div class="bd">
    <div class="grid4 center">
      ${bignum(r1(per18(rds.reduce((s,d)=>s+d.score,0))),'avg /18')}
      ${bignum((()=>{const v=per18(rds.reduce((s,d)=>s+d.toPar,0));return v==null?'–':(v>=0?'+':'')+r1(v);})(),'to par /18')}
      ${bignum(scores18.length? Math.min(...scores18):'–','best 18')}
      ${bignum(r1(per18(agg.pen)),'pen /18')}
    </div><hr class="sep">
    ${spark(rds.map(d=>d.played? d.score/d.played*18 : null).filter(x=>x!=null))}
    <div class="small muted">Every round normalized to 18 holes${r9.length? ' — nines count as half a round, not a sub-70 miracle':''}.</div>
    <hr class="sep">
    <div class="row small" style="flex-wrap:wrap;gap:12px">
      <span>Par 3 <b class="num">${r1(mean(byPar[3]))}</b></span>
      <span>Par 4 <b class="num">${r1(mean(byPar[4]))}</b></span>
      <span>Par 5 <b class="num">${r1(mean(byPar[5]))}</b></span></div>
    <hr class="sep">
    <div class="row small" style="flex-wrap:wrap;gap:10px">
      <span class="stat">Eag <b>${dist.eagle}</b></span><span class="stat good">Bird <b>${dist.birdie}</b></span>
      <span class="stat">Par <b>${dist.par}</b></span><span class="stat">Bog <b>${dist.bogey}</b></span>
      <span class="stat bad">Dbl+ <b>${dist.dbl}</b></span></div>
  </div></div>

  <div class="card"><div class="hd"><span class="t">Tee to green</span></div><div class="bd">
    <div class="grid3 center">
      ${bignum(pct(agg.firY,agg.firD),'FIR')}
      ${bignum(pct(agg.girY,agg.girD),'GIR')}
      ${bignum(pct(agg.udM,agg.udA),'up & down')}
    </div>
    <div class="small muted center" style="margin-top:6px">Sand saves ${agg.sA? agg.sM+'/'+agg.sA+' ('+pct(agg.sM,agg.sA)+')':'–'}</div>
  </div></div>

  <div class="card"><div class="hd"><span class="t">Putting</span></div><div class="bd">
    <div class="grid3 center">
      ${bignum(r1(per18(agg.putts)),'putts /18')}
      ${bignum(r1(mean(pGIR)),'putts/GIR')}
      ${bignum(pct(agg.tp,agg.holes),'3-putt')}
    </div><hr class="sep">
    <div class="small" style="font-weight:800;margin-bottom:4px">First-putt distance${nLegacy?' <span class="muted" style="font-weight:600">(shot-tracked rounds only)</span>':''}</div>
    <table class="data"><tr><th class="num">Dist</th><th class="num">n</th><th class="num">Make</th><th class="num">Avg putts</th><th class="num">3-putt</th></tr>${bRows}</table>
  </div></div>

  ${hotClubsCard(rs)}
  ${heatmapCard()}
  ${stockYardCard()}
  ${wedgeMatrixCard()}`;
}

/* ---------------- club form: best clubs + hot streaks ---------------- */
function hotClubsCard(rs){
  const shotRs = rs.filter(r=>!r.legacy);
  if(!shotRs.length) return '';
  const recent = new Set(shotRs.slice(-5).map(r=>r.id));
  const byClub = {};
  shotRs.forEach(r=>r.holes.forEach(h=>(h.shots||[]).forEach(s=>{
    if(s.fType!=='green'||!s.pad||!s.clubId) return;
    const b = byClub[s.clubId]=byClub[s.clubId]||{n:0,pure:0,rn:0,rp:0};
    b.n++; if(s.pad===5) b.pure++;
    if(recent.has(r.id)){ b.rn++; if(s.pad===5) b.rp++; }
  })));
  const rows = Object.entries(byClub).filter(([,b])=>b.n>=5)
    .map(([cid,b])=>({cid, n:b.n, pure:b.pure/b.n, rPure:b.rn>=3? b.rp/b.rn:null}))
    .sort((a,b)=>b.pure-a.pure).slice(0,6);
  if(!rows.length) return '';
  return `<div class="card"><div class="hd"><span class="t">Club form — green attempts</span></div><div class="bd tight">
    <table class="data"><tr><th>Club</th><th class="num">Attempts</th><th class="num">Pin-high %</th><th class="num">Last 5 rds</th></tr>
    ${rows.map(x=>{
      const hot = x.rPure!=null && x.rPure > x.pure+0.10;
      const cold = x.rPure!=null && x.rPure < x.pure-0.10;
      return `<tr><td><b>${esc(clubLabel(x.cid))}</b>${hot?' <span class="flame">🔥</span>':cold?' ❄️':''}</td>
        <td class="num">${x.n}</td><td class="num"><b>${Math.round(x.pure*100)}%</b></td>
        <td class="num">${x.rPure!=null? Math.round(x.rPure*100)+'%':'–'}</td></tr>`;}).join('')}
    </table>
    <div class="small muted" style="padding:8px 12px">Pin-high = finished 5 on the green pad. 🔥 running 10+ points above baseline over the last five rounds; ❄️ the opposite. Minimum 5 attempts.</div>
  </div></div>`;
}
function bignum(v,l){ return `<div><div class="num" style="font-size:24px;font-weight:800">${v}</div><div class="small muted" style="font-size:11px;text-transform:uppercase;letter-spacing:.08em;font-weight:700">${l}</div></div>`; }
function courseHcpLine(idx){
  const last=finishedRounds().slice(-1)[0]; const tee=teeOf(last);
  if(!tee||!tee.slope) return '';
  const parT=last.holes.reduce((s,h)=>s+h.par,0);
  const ch=courseHandicap(idx,tee.slope,tee.rating,parT);
  return `<div class="small" style="margin-top:6px">Course handicap at ${esc(courseOf(last).name)} (${esc(tee.name)}): <b class="num">${ch}</b></div>`;
}
function spark(vals){
  if(vals.length<2) return '';
  const w=300,ht=54,pad=4;
  const mn=Math.min(...vals),mx=Math.max(...vals),rg=(mx-mn)||1;
  const pts=vals.map((v,i)=>[pad+i*(w-2*pad)/(vals.length-1), ht-pad-(v-mn)*(ht-2*pad)/rg]);
  const last=pts[pts.length-1];
  return `<svg class="spark" viewBox="0 0 ${w} ${ht}" width="100%" height="${ht}">
    <polyline points="${pts.map(p=>p.map(x=>Math.round(x*10)/10).join(',')).join(' ')}"/>
    <circle cx="${last[0]}" cy="${last[1]}" r="3.5"/></svg>`;
}

/* ---------------- heatmaps ---------------- */
function heatmapCard(){
  const kinds=[['green','Green'],['putt','Putt'],['shape','Shape']];
  const spanRs = filteredRounds();
  const rows = allShots(spanRs);
  let counts={},total=0, latCounts=null;
  if(HM.kind==='shape'){
    rows.forEach(x=>{ if(!x.s.shape) return; if(HM.clubId&&x.s.clubId!==HM.clubId)return; if(!bandOK(x.s))return;
      counts[x.s.shape]=(counts[x.s.shape]||0)+1; total++; });
  } else if(HM.kind==='green'){
    rows.forEach(x=>{ if(x.s.fType!=='green'||!x.s.pad)return; if(HM.clubId&&x.s.clubId!==HM.clubId)return; if(!bandOK(x.s))return;
      counts[x.s.pad]=(counts[x.s.pad]||0)+1; total++; });
    if(!HM.clubId && !HM.band) spanRs.forEach(r=>!r.legacy&&r.holes.forEach(h=>{   // quick-score rounds contribute too
      if(h.ov&&h.ov.girPad){ counts[h.ov.girPad]=(counts[h.ov.girPad]||0)+1; total++; }}));
  } else {
    rows.forEach(x=>{ if(x.s.fType!=='putt'||!x.s.pad)return; if(!bandOKputt(x.s))return;
      counts[x.s.pad]=(counts[x.s.pad]||0)+1; total++; });
  }
  const max=Math.max(1,...Object.values(counts));
  const rowsHTML = padRows(HM.kind==='shape'?'shape':'green');
  const lab=PAD_LABELS[HM.kind];
  let padB=`<div class="pad heat">`;
  for(const row of rowsHTML) for(const d of row){
    const c=counts[d]||0; const op=c? 0.14+0.86*(c/max):0;
    const col = d===5? `rgba(24,92,55,${op})` : `rgba(210,46,46,${op})`;
    padB+=`<button class="${d===5?'pure':''}" style="background:${c? col:'var(--card)'};color:${op>0.55?'#fff':'var(--ink)'}">
      <span class="pct">${total? Math.round(100*c/total)+'%':'–'}</span>
      <span class="n">${lab[d]} · ${c}</span></button>`;
  }
  padB+='</div>';
  const clubOpts = `<option value="">All clubs</option>`+S.clubs.filter(c=>c.type!=='P').map(c=>`<option value="${c.id}" ${HM.clubId===c.id?'selected':''}>${esc(c.label)}</option>`).join('');
  const bands = HM.kind==='putt'? [['','All'],['0-6','0–6ft'],['7-20','7–20ft'],['21-99','21+ft']] : [['','All dist'],['0-100','≤100'],['101-150','101–150'],['151-200','151–200'],['201-999','200+']];
  return `<div class="card"><div class="hd"><span class="t">Miss patterns</span><span class="small muted num">${total} shots</span></div><div class="bd">
    <div class="chips" style="margin-bottom:8px">${kinds.map(k=>`<button class="chip sm ${HM.kind===k[0]?'on':''}" onclick="HM.kind='${k[0]}';HM.band='';render()">${k[1]}</button>`).join('')}</div>
    ${HM.kind!=='putt'? `<div class="row" style="margin-bottom:8px"><select class="f" style="min-height:42px" onchange="HM.clubId=this.value;render()">${clubOpts}</select></div>`:''}
    <div class="chips" style="margin-bottom:10px">${bands.map(b=>`<button class="chip sm ${HM.band===b[0]?'on':''}" onclick="HM.band='${b[0]}';render()">${b[1]}</button>`).join('')}</div>
    ${padB}
    <div class="small muted" style="margin-top:8px">${heatRead()}</div>
  </div></div>`;
}
function bandOK(s){ if(!HM.band)return true; const [a,b]=HM.band.split('-').map(Number); return s.unit==='y'&&s.dist!=null&&s.dist>=a&&s.dist<=b; }
function bandOKputt(s){ if(!HM.band)return true; const [a,b]=HM.band.split('-').map(Number); return s.dist!=null&&s.dist>=a&&s.dist<=b; }
function heatRead(){
  return {green:'Hot bottom row (1·2·3) = chronic short miss — take more club. Hot right column = right-miss pattern.',
    putt:'Hot 2 = dying it short-center (pace). Hot 6 = sliding by right (read or face). 5 is holed.',
    shape:'A corner that stays lit names the fault: 7-corner = hook family, 3-corner = slice family.'}[HM.kind];
}

/* ---------------- stock yardages ---------------- */
function clubShotDists(cid){
  const round=[], prac=[];
  allShots().forEach(x=>{ const s=x.s;
    if(s.clubId!==cid||s.unit!=='y'||s.dist==null)return;
    if(!['T','FW','RF'].includes(s.lie))return;
    if(s.strike||s.frac||(s.effort&&s.effort<95))return;      // mishits & partials don't pollute stock
    round.push(s.dist); });
  S.practice.forEach(p=>(p.blocks||[]).forEach(b=>{ if(b.clubId!==cid||b.frac)return;
    (b.shots||[]).forEach(sh=>{ if(sh.carry) prac.push(Number(sh.carry)); }); }));
  return {round, prac, all:round.concat(prac)};
}
function stockYardCard(){
  const rows=S.clubs.filter(c=>c.type!=='P').map(c=>{
    const d=clubShotDists(c.id);
    if(!d.all.length) return `<tr><td>${esc(c.label)}</td><td class="num muted">${c.stock||'–'}</td><td class="num muted" colspan="3">no data yet</td></tr>`;
    const med=median(d.all), lo=quantile(d.all,0.25), hi=quantile(d.all,0.75);
    const flag = c.stock && Math.abs(med-c.stock)>=8 ? ` <span class="tag" style="background:var(--sand);color:var(--amber)">Δ${Math.round(med-c.stock)}</span>`:'';
    return `<tr><td><b>${esc(c.label)}</b></td><td class="num muted">${c.stock||'–'}</td>
      <td class="num"><b>${r0(med)}</b>${flag}</td><td class="num">${r0(lo)}–${r0(hi)}</td>
      <td class="num small muted">${d.round.length}r+${d.prac.length}p</td></tr>`;
  }).join('');
  return `<div class="card"><div class="hd"><span class="t">Stock yardages</span></div><div class="bd tight">
    <table class="data"><tr><th>Club</th><th class="num">Set</th><th class="num">Median</th><th class="num">25–75%</th><th class="num">n</th></tr>${rows}</table>
    <div class="small muted" style="padding:8px 12px">Median from clean full swings (round + practice carry). Thin/heavy tags and partials are excluded. Δ flags where reality drifted 8+ yds from the set number — a missing-zone or club-up signal.</div>
  </div></div>`;
}

/* ---------------- wedge matrix ---------------- */
function wedgeMatrixCard(){
  const wedges=S.clubs.filter(c=>c.type==='Wg');
  if(!wedges.length) return '';
  const cell=(cid,frac)=>{
    const v=[];
    allShots().forEach(x=>{ const s=x.s; if(s.clubId!==cid||s.unit!=='y'||s.dist==null)return;
      const f = s.frac|| (s.effort&&s.effort<95? 'e':null) || 'full';
      if(frac==='full'&&f!=='full')return; if(frac!=='full'&&f!==frac)return; if(s.strike)return; v.push(s.dist); });
    S.practice.forEach(p=>(p.blocks||[]).forEach(b=>{ if(b.clubId!==cid)return;
      const f=b.frac||'full'; if(f!==frac)return; (b.shots||[]).forEach(sh=>{if(sh.carry)v.push(Number(sh.carry));}); }));
    return v.length? `<b>${r0(median(v))}</b><span class="small muted"> ·${v.length}</span>` : '<span class="muted">–</span>';
  };
  const rows=wedges.map(w=>`<tr><td><b>${esc(w.label)}</b></td>
    <td class="num">${cell(w.id,'½')}</td><td class="num">${cell(w.id,'¾')}</td><td class="num">${cell(w.id,'full')}</td></tr>`).join('');
  return `<div class="card"><div class="hd"><span class="t">Wedge matrix</span></div><div class="bd tight">
    <table class="data"><tr><th>Wedge</th><th class="num">½</th><th class="num">¾</th><th class="num">Full</th></tr>${rows}</table>
    <div class="small muted" style="padding:8px 12px">Median carry by swing length, from rounds and practice. Tag ½ / ¾ at entry and this table builds itself.</div>
  </div></div>`;
}

let TIPQ='', TIPTAG='';
function vTips(){
  const tags=[...new Set(S.tips.flatMap(t=>t.tags||[]))].sort();

  }).sort((a,b)=> (b.pinned?1:0)-(a.pinned?1:0));

  <button class="btn primary wide" onclick="tipEditor(null)">＋ Quick capture</button>

  <div class="chips" style="margin:10px 0">${tags.map(t=>`<button class="chip sm ${TIPTAG===t?'on':''}" onclick="TIPTAG=TIPTAG==='${t}'?'':'${t}';render()">${esc(t)}</button>`).join('')}</div>
  ${list.map(t=>`<div class="tipCard">
    <div class="tt"><span>${t.pinned?'<span class="pinBadge">★ </span>':''}${esc(t.title)}</span>
      <span class="row"><button class="btn sm ghost" onclick="togglePin('${t.id}')">${t.pinned?'Unpin':'Pin'}</button>
      <button class="btn sm ghost" onclick="tipEditor('${t.id}')">Edit</button></span></div>

    ${t.photo?`<img src="${t.photo}" alt="">`:''}
    ${t.url?`<div style="margin-top:6px"><a href="${esc(t.url)}" target="_blank" rel="noopener">🔗 ${esc(t.url.replace(/^https?:\/\//,'').slice(0,42))}</a></div>`:''}
    <div>${(t.tags||[]).map(g=>`<span class="tag">${esc(g)}</span>`).join('')}</div>
  </div>`).join('') || '<p class="muted">Nothing matches.</p>'}`;
}
function togglePin(id){ const t=S.tips.find(x=>x.id===id);
  if(!t.pinned) S.tips.forEach(x=>x.pinned=false); // one "today's thought" at a time
  t.pinned=!t.pinned; render(); }
function tipEditor(id){
  TIPPHOTO=null;
  const t=id? S.tips.find(x=>x.id===id) : {title:'',body:'',tags:[]};
  const sugg=['driver','irons','wedges','chipping','bunker','putting','mental','pre-shot','drill'];
  openSheet(`<div class="sheetHd"><span class="t">${id?'Edit tip':'New tip'}</span><button class="btn sm ghost" onclick="closeSheet()">Cancel</button></div>
    <label class="f">Title</label><input class="f" id="tipT" value="${esc(t.title)}" placeholder="Swing thought…">
    <label class="f">Body</label><textarea class="f" id="tipB">${esc(t.body)}</textarea>
    <label class="f">Link (optional)</label><input class="f" id="tipU" value="${esc(t.url||'')}" placeholder="https://youtube.com/…">
    <label class="f">Photo (optional)</label>
    <div class="row"><button class="btn sm" onclick="$('#tipP').click()">${t.photo?'Replace photo':'＋ Attach photo'}</button>
      ${t.photo?`<button class="btn sm ghost" onclick="TIPPHOTO='';this.previousElementSibling.textContent='＋ Attach photo';toast('Photo will be removed on save')">Remove</button>`:''}</div>
    <input type="file" id="tipP" accept="image/*" style="display:none" onchange="tipPhoto(this)">
    <label class="f">Tags (comma separated)</label><input class="f" id="tipG" value="${esc((t.tags||[]).join(', '))}">
    <div class="chips" style="margin-top:8px">${sugg.map(g=>`<button class="chip sm" onclick="tipTagAdd('${g}')">${g}</button>`).join('')}</div>
    <div style="height:12px"></div>
    <button class="btn primary wide" onclick="tipSave('${id||''}')">Save</button>
    ${id?`<div style="height:8px"></div><button class="btn wide danger sm" onclick="S.tips=S.tips.filter(x=>x.id!=='${id}');closeSheet();render()">Delete</button>`:''}`);
}
function tipTagAdd(g){ const el=$('#tipG'); const cur=el.value.split(',').map(s=>s.trim()).filter(Boolean);
  if(!cur.includes(g))cur.push(g); el.value=cur.join(', '); }
let TIPPHOTO=null;   // pending compressed photo for the open editor; ''=remove, null=unchanged
function tipPhoto(inp){
  const f=inp.files[0]; if(!f) return;
  const img=new Image(); const rd=new FileReader();
  rd.onload=()=>{ img.onload=()=>{
      const max=900, sc=Math.min(1, max/Math.max(img.width,img.height));
      const cv=document.createElement('canvas'); cv.width=Math.round(img.width*sc); cv.height=Math.round(img.height*sc);
      cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
      TIPPHOTO=cv.toDataURL('image/jpeg',0.72);
      toast('Photo attached ('+Math.round(TIPPHOTO.length/1024)+' KB, stored on-device)');
    }; img.src=rd.result; };
  rd.readAsDataURL(f);
}
function tipSave(id){
  const title=$('#tipT').value.trim(); if(!title){toast('Give it a title');return;}
  const tags=$('#tipG').value.split(',').map(s=>s.trim().toLowerCase()).filter(Boolean);
  const url=$('#tipU').value.trim();
  if(id){ const t=S.tips.find(x=>x.id===id); t.title=title;t.body=$('#tipB').value;t.tags=tags;t.url=url;
    if(TIPPHOTO!==null) t.photo = TIPPHOTO||undefined; }
  else S.tips.unshift({id:uid(),title,body:$('#tipB').value,tags,url,photo:TIPPHOTO||undefined,pinned:false,created:todayISO()});
  TIPPHOTO=null; closeSheet(); render();
}

function download(name, text, mime){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([text],{type:mime||'text/plain'}));
  a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),4000);
}
function exportJSON(){
  const payload={app:'caddiebook',schema:1,exported:new Date().toISOString(),data:S};
  download('caddiebook-backup-'+todayISO()+'.json', JSON.stringify(payload,null,1),'application/json');
}
function importJSON(inp){
  const f=inp.files[0]; if(!f)return;
  const rd=new FileReader();
  rd.onload=()=>{ try{ const p=JSON.parse(rd.result); const d=p.data||p;
      if(!d.clubs||!d.rounds) throw 0;
      S=Object.assign(defaultState(),d); save(); toast('Backup restored.'); render();
    }catch(e){ toast('That file did not parse as a Caddie Book backup.'); } };
  rd.readAsText(f);
}
function csvEsc(v){ v=v==null?'':String(v); return /[",\n]/.test(v)? '"'+v.replace(/"/g,'""')+'"':v; }
function exportCSV(){
  const head='date,course,hole,par,yardage,shot,club,lie,distance,unit,finish_type,finish,shape,effort,fraction,strike,note,score,putts,fir,gir,pen,sand,ud,three_putt';
  const rows=[head];
  finishedRounds().forEach(r=>{
    const cn=courseOf(r)? courseOf(r).name:'';
    if(r.legacy){
      r.holes.forEach(h=>{
        rows.push([r.date,cn,h.n,'','','SUMMARY','','','','','','','','','','','18Birdies import',
          h.strokes||'', '', '', '', '', '', '', ''].map(csvEsc).join(','));
      });
      return;
    }
    r.holes.forEach(h=>{
      (h.shots||[]).forEach((s,i)=>{
        const fin = s.fType==='lat'? (s.lat||'') : s.pad? s.pad+(s.fType==='putt'?'p':'g'):'';
        rows.push([r.date,cn,h.n,h.par,h.ydg||'',i+1,clubLabel(s.clubId),s.lie,s.dist!=null?s.dist:'',s.unit==='f'?'feet':'yards',
          s.fType||'',fin,s.shape?s.shape+'s':'',s.effort||'',s.frac||'',s.strike||'',s.note||'','','','','','','','',''].map(csvEsc).join(','));
      });
      const d=deriveHole(h);
      if(d.score!=null) rows.push([r.date,cn,h.n,h.par,h.ydg||'','SUMMARY','','','','','','','','','','','',
        d.score,d.putts,d.fir||'',d.gir||'',d.pen,d.sand,(d.udA? (d.udM?'Y':'N'):'-'),d.threePutt?'Y':'N'].map(csvEsc).join(','));
    });
  });
  download('caddiebook-shots-'+todayISO()+'.csv', rows.join('\n'),'text/csv');
}
function roundText(r){
  const lines=[];
  const cn=courseOf(r)? courseOf(r).name:''; const t=teeOf(r);
  lines.push(`ROUND ${r.date} ${cn}${t? ' ('+t.name+' '+ (t.rating||'?')+'/'+(t.slope||'?')+')':''}`);
  r.holes.forEach(h=>{
    const d=deriveHole(h); if(d.score==null && !(h.shots||[]).length) return;
    const wind=h.windD? ` wind${h.windD}${h.windS||''}`:'';
    lines.push(`H${h.n} P${h.par} ${h.ydg||'?'}${wind} | sc${d.score!=null?d.score:'?'} putts${d.putts} FIR-${d.fir||'?'} GIR-${d.gir||'?'} pen${d.pen} sand${d.sand} ud${d.udA?(d.udM?'Y':'N'):'-'}`);
    (h.shots||[]).forEach((s,i)=>{
      const fin = s.fType==='lat'? `fin-${s.lat||'?'}` : `fin-${s.pad||'?'}${s.fType==='putt'?'p':'g'}`;
      const bits=[`s${i+1}`, clubLabel(s.clubId), s.lie, s.dist!=null? s.dist+(s.unit==='f'?'ft':''):'', fin,
        s.shape?`shp-${s.shape}s`:'', s.frac?`f${s.frac}`:'', s.effort?`e${s.effort}`:'', s.strike||'', s.note?`"${s.note}"`:''].filter(Boolean);
      lines.push(' '+bits.join(' '));
    });
  });
  return lines.join('\n');
}
function exportRoundText(id){
  const r=S.rounds.find(x=>x.id===id);
  copyText(roundText(r), 'Round copied — paste anywhere.');
}
function exportAllText(){
  copyText(finishedRounds().filter(r=>!r.legacy).map(roundText).join('\n\n'), 'All shot-tracked rounds copied.');
}
function copyText(txt,msg){
  const done=()=>toast(msg||'Copied.');
  if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(txt).then(done,()=>fallbackCopy(txt,done));
  else fallbackCopy(txt,done);
}
function fallbackCopy(txt,done){
  const ta=document.createElement('textarea'); ta.value=txt; document.body.appendChild(ta);
  ta.select(); try{document.execCommand('copy');}catch(e){} document.body.removeChild(ta); done();
}

/* ============================================================
   18BIRDIES IMPORT — merge, never replace; idempotent by source id
   ============================================================ */
function import18B(inp){
  const f=inp.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=()=>{ try{ const res=convert18B(JSON.parse(rd.result));
      toast(`Imported ${res.rounds} rounds and ${res.courses} new courses.` + (res.skipped? ` Skipped ${res.skipped} already imported.`:''));
      MOREVIEW='menu'; TAB='play'; PLAYVIEW='home'; render();
    }catch(e){ toast('Could not read that as an 18Birdies export.'); }
    inp.value=''; };
  rd.readAsText(f);
}
function convert18B(json){
  const md = json.myData||json;
  const act = (md.activityData&&md.activityData.rounds)||[];
  const clubs = ((md.clubData&&md.clubData.playedClubs)||[]);
  const nameById = {}; clubs.forEach(c=>{ nameById[c.clubId]=c.name; });
  // course per 18Birdies club: reuse by name, else create a stub (tees added later by hand)
  const courseIdByName = {};
  S.courses.forEach(c=>{ courseIdByName[c.name.toLowerCase()]=c.id; });
  let newCourses=0;
  function courseFor(name){
    if(!name) name='Imported course';
    const key=name.toLowerCase();
    if(!courseIdByName[key]){
      const c={id:uid(), name, tees:[]};
      S.courses.push(c); courseIdByName[key]=c.id; newCourses++;
    }
    return courseIdByName[key];
  }
  const have=new Set(S.rounds.map(r=>r.srcId).filter(Boolean));
  let added=0, skipped=0;
  for(const r of act){
    if(!r || !Array.isArray(r.holeStrokes) || !r.holeStrokes.length) continue;
    if(have.has(r.id)){ skipped++; continue; }
    const st=r.stats||{};
    const d=new Date(r.timestamp||Date.now());
    const date=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    S.rounds.push({
      id:uid(), legacy:true, source:'18birdies', srcId:r.id, finished:true,
      courseId: courseFor(nameById[(r.clubId&&r.clubId.id)||''] ), teeId:null, date,
      holes: r.holeStrokes.map((s,i)=>({n:i+1, strokes:s})),
      agg:{
        strokes:r.strokes, toPar:(typeof r.score==='number'? r.score : null),
        putts:st.putts||0,
        firY:st.fairwayMiddles||0, firD:st.fairwayHoleCount||0,
        girY:st.gir||0, girD:st.girHoleCount||0,
        eagles:(st.eagles||0)+(st.doubleEagleOrBetter||0)+(st.aces||0),
        birdies:st.birdies||0, pars:st.pars||0, bogeys:st.bogeys||0,
        dblOrWorse:st.doubleBogeyOrWorse||0
      }
    });
    have.add(r.id); added++;
  }
  save();
  return {rounds:added, courses:newCourses, skipped};
}

function openSheet(html){ $('#sheet').innerHTML=html; $('#sheetWrap').classList.add('open'); }

let toastT=null;
function toast(msg){
  let el=$('#toast');
  if(!el){ el=document.createElement('div'); el.id='toast';
    el.style.cssText='position:fixed;left:50%;transform:translateX(-50%);bottom:96px;background:var(--ink);color:#fff;padding:10px 18px;border-radius:999px;font-weight:700;font-size:14px;z-index:99;max-width:88%;text-align:center';
    document.body.appendChild(el); }
  el.textContent=msg; el.style.display='block';
  clearTimeout(toastT); toastT=setTimeout(()=>el.style.display='none',2600);
}
document.addEventListener('DOMContentLoaded',()=>{
  $('#sheetWrap').addEventListener('click',e=>{ if(e.target.id==='sheetWrap') closeSheet(); });

});
