/** Quick-mode toggle-set of an ov field (tap again to clear). */
function bset(k,v){ const h=curHole(); h.ov=h.ov||{};
  h.ov[k] = h.ov[k]===v? undefined : v;
  if(h.ov[k]===undefined) delete h.ov[k];
  render(); }
/** Quick-mode counter increment (sand, penalties). */
function bstep(k,dv){ const h=curHole(); h.ov=h.ov||{}; h.ov[k]=Math.max(0,(h.ov[k]||0)+dv); render(); }
/** Wipe every override on the current hole. */
function bclear(){ const h=curHole(); h.ov={}; render(); }
/** Quick-mode green pad: digit sets girPad, and GIR = (digit===5). */
function bPad(dgt){ const h=curHole(); h.ov=h.ov||{};
  if(h.ov.girPad===dgt){ delete h.ov.girPad; delete h.ov.gir; }
  else { h.ov.girPad=dgt; h.ov.gir = dgt===5? 'Y':'N'; }
  render(); }
/** Flip the active round between 'advanced' and 'basic' — any time. */
function setMode(m){ activeRound().mode=m; render(); }
/** The on-course drinks counter. Hydration data is data. */
function addDrink(){ const r=activeRound(); r.ctx=r.ctx||{drinks:0}; r.ctx.drinks=(r.ctx.drinks||0)+1; render(); }
/** Past performance on this exact hole at this course (includes 18B imports):
 *  {n: times played, avg, best}. */
function holeHistory(courseId, holeN, excludeId){
  const scores=[];
  S.rounds.forEach(r=>{ if(!r.finished||r.courseId!==courseId||r.id===excludeId) return;
    (r.holes||[]).forEach(h=>{ if(h.n!==holeN) return;
      const sc=r.legacy? h.strokes : deriveHole(h).score; if(sc!=null) scores.push(sc); }); });
  return {n:scores.length, avg:mean(scores), best:scores.length?Math.min(...scores):null};
}
/** Toggle per-hole wind direction (H/D/L2R/R2L); auto-sets strength 1. */
function setWind(w){ const h=curHole(); h.windD = h.windD===w? '':w; if(!h.windD)h.windS=0; else if(!h.windS)h.windS=1; render(); }
/** Set wind strength 1-3. */
function setWindS(n){ curHole().windS=n; render(); }
/** The hole object currently on screen. */
function curHole(){ const r=activeRound(); return r.holes[r.curHole-1]; }
/** Prev/next hole; next past the last hole opens the finish overview. */
function navHole(dir){
  const r=activeRound(); const nH=r.holes.length;
  if(dir>0 && r.curHole===nH){ PLAYVIEW='overview'; render(); return; }
  r.curHole=Math.min(nH,Math.max(1,r.curHole+dir)); render();
}
/** Adjust the hole\u2019s penalty count (tap the PEN row to remove). */
function adjPen(d){ const h=curHole(); h.pen=Math.max(0,(h.pen||0)+d); render(); }
/** Legacy helper (pre-v4): +1 penalty and open a drop shot. The PN lie in
 *  the sheet is now the normal path; kept for old muscle memory / tests. */
function penaltyDrop(){ render(); newShot('PN'); }
/** Tap a derived chip to override it (FIR/GIR cycle Y↔N, U&D toggles made). */
function cycleOv(k){
  const h=curHole(); h.ov=h.ov||{};
  if(k==='fir'||k==='gir'){ const cur=deriveHole(h)[k]; const seq= k==='fir'&&h.par<=3? ['-']:['Y','N']; 
    const nxt = seq[(seq.indexOf(cur)+1)%seq.length]; h.ov[k]=nxt; }
  if(k==='ud'){ const cur=deriveHole(h).udM; h.ov.udA=true; h.ov.udM=!cur; }
  render();
}


/* ═══════════════ src/js/10-shot-sheet.js ═══════════════ */
/* ============================================================
   SHOT SHEET — chain entry: DISTANCE TO HOLE + LIE, that's it
   ============================================================
   Modeled on datadriven.golf's insight: a shot's result IS the
   next shot's position, so you never enter the same information
   twice. The routine flow per shot:

     1. Distance to hole  (prefilled on the tee — often 0 taps;
                           flips to feet automatically on GR)
     2. Lie               (prefilled from context — usually 0 taps)
     3. Save · next shot  — or —  🕳 In the hole

   Everything else — club (auto-suggested and auto-saved),
   the result direction pad, carry estimate, shape, strike,
   note — lives under one collapsed "Detail" section and never
   blocks a save. A typical tee shot is TWO taps.

   PN (Penalty) as a lie = "playing from a drop": it records the
   position and adds the penalty stroke in one move.

   SH = the open draft {idx: shot index or null-for-new, s: shot,
   more: detail expanded, distStr: keypad buffer}.
   ============================================================ */
let SH=null;

/** New shot with context-smart defaults: lie + distance follow from the
 *  previous position, club from the distance, feet on the green. */
function blankShot(prefLie){
  const h=curHole();
  const prev=h.shots[h.shots.length-1];
  let lie = prefLie || 'FW';
  if(!prefLie){
    if(!h.shots.length) lie='T';
    else if(prev.lie==='GR' && prev.pad!==5) lie='GR';
    else if(prev.fType==='green' || (prev.pad!=null && prev.lie!=='GR')) lie='GR';
    else if(prev.fType==='lat') lie = prev.lat==='C'?'FW':'RF';
  }
  const remain = estRemaining(h);
  return {id:uid(), clubId: lie==='GR'? putterId(): suggestClub(remain), lie,
    dist: null, unit: lie==='GR'?'f':'y', fType:null, lat:null, pad:null,
    est:null, intent:null, line:null, miss:null, style:null, tags:[],
    shape:null, effort:null, frac:null, strike:null, note:''};
}
/** Rough remaining-distance guess (also powers the club suggestion). */
function estRemaining(h){
  if(!h.shots.length) return h.ydg||null;
  const last=h.shots[h.shots.length-1];
  if(last.unit==='y'&&last.dist&&last.clubId){ const c=club(last.clubId); if(c&&c.stock) return Math.max(0, last.dist - c.stock) || Math.round(last.dist*0.12); }
  return null;
}
/** Open the sheet for a fresh shot. The first shot of a hole arrives with
 *  the card yardage already typed in — Save is the only required tap. */
function newShot(prefLie){
  const s=blankShot(prefLie);
  const prefill = (!curHole().shots.length && s.lie==='T' && curHole().ydg)? String(curHole().ydg) : '';
  if(prefill) s.dist=parseInt(prefill);
  SH={idx:null, s, more:false, distStr:prefill};
  renderShotSheet();
}
/** Open the sheet on an existing shot, detail expanded. */
function editShot(i){ const h=curHole(); SH={idx:i, s:JSON.parse(JSON.stringify(h.shots[i])), more:true, distStr: h.shots[i].dist!=null? String(h.shots[i].dist):''}; renderShotSheet(); }

/** Which optional result control fits this shot: putt pad on the green,
 *  lateral buttons for tee balls/layups, green pad for approaches. */
function defaultFType(s){
  if(s.lie==='GR') return 'putt';
  const c=club(s.clubId);
  if(s.lie==='T' && curHole().par>3) return 'lat';
  if(c && c.type==='D') return 'lat';
  if(s.dist!=null) return s.dist<=240? 'green':'lat';
  if(curHole().par===3 && s.lie==='T') return 'green';
  return c && (c.type==='Wg'||c.type==='I')? 'green':'lat';
}

/** Draw the whole entry sheet from the SH draft (called on every tap). */
function renderShotSheet(){
  const s=SH.s;
  if(s.lie==='GR'){ s.unit='f'; if(!s.clubId) s.clubId=putterId(); }
  else s.unit='y';
  if(!s.fType) s.fType=defaultFType(s);
  if(s.fType==='putt' && s.lie!=='GR') s.fType=defaultFType(s);

  /* — distance to hole: the hero — */
  const keyp = `
    <div class="row" style="align-items:flex-end;gap:14px;margin-bottom:8px">
      <div class="distShow">${SH.distStr||'<span class="muted">–</span>'}<span class="u"> ${s.unit==='f'?'ft':'yds'}</span></div>
      <div class="small muted">distance to the hole<br>from where the ball lies</div>
    </div>
    <div class="keypad">
      ${[1,2,3,4,5,6,7,8,9].map(n=>`<button onclick="shKey('${n}')">${n}</button>`).join('')}
      <button onclick="shKey('C')" style="font-size:15px">CLR</button><button onclick="shKey('0')">0</button><button onclick="shKey('B')">⌫</button>
    </div>`;

  /* — lie: a native dropdown (fast iOS wheel, prefilled) — */
  const lieSel = `<select class="f" style="min-height:54px;font-size:18px;font-weight:700" onchange="shSet('lie',this.value)">
    ${LIES.map(l=>`<option value="${l[0]}" ${s.lie===l[0]?'selected':''}>${l[1]}</option>`).join('')}</select>`;
  const penNote = s.lie==='PN'? `<div class="small" style="color:var(--flag);font-weight:700;margin-top:6px">Playing from a drop — adds 1 penalty stroke automatically.</div>`:'';

  /* — club: a dropdown like the lie, suggestion pre-selected — */
  const sug = s.lie!=='GR'? suggestClub(parseInt(SH.distStr)||null): putterId();
  const chosen = s.clubId || sug;
  const clubSel = s.lie==='GR'
    ? `<select class="f" style="min-height:54px;font-size:18px;font-weight:700" disabled><option>Putter</option></select>`
    : `<select class="f" style="min-height:54px;font-size:18px;font-weight:700" onchange="shSet('clubId',this.value)">
        ${activeClubs().filter(c=>c.type!=='P').map(c=>
          `<option value="${c.id}" ${chosen===c.id?'selected':''}>${esc(c.label)}${c.stock?` · ${c.stock}y`:''}${c.id===sug?' ★':''}</option>`).join('')}</select>`;

  /* — optional detail: result pad, carry estimate, shape, strike, note — */
  const kind = shotKind(s);
  let resultCtl='';
  if(kind==='putt'){
    // Putting speaks putting: intent + the pace×line compass.
    // One tap on the pad records BOTH axes: vertical = pace
    // (short / good / long), horizontal = line (pulled / on / pushed).
    // The leave distance is never asked — it's the next putt's entry.
    resultCtl = `
      <div class="chips" style="margin-bottom:10px">${PUTT_INTENTS.map(p=>
        `<button class="chip sm ${ (s.intent|| (s.dist!=null&&s.dist>20?'lag':'make'))===p[0]?'on':''}" onclick="shSet('intent','${p[0]}')">${p[1]}</button>`).join('')}</div>
      ${padHTML('putt', s.pad, "shPad")}
      <div class="small muted" style="margin-top:6px">One tap, two answers: up/down = <b>pace</b>, left/right = <b>start line vs your read</b>. Column 2-5-8 = started on line; row 4-5-6 = good pace. How far it finished isn't asked — your next putt's distance is the leave.</div>`;
  } else if(kind==='short'){
    // Inside 100: trajectory/style, not draw vs fade.
    resultCtl = `
      <div class="chips" style="margin-bottom:10px">${SHORT_STYLES.map(y=>
        `<button class="chip sm ${s.style===y[0]?'on':''}" onclick="shSet('style','${y[0]}')">${y[1]}</button>`).join('')}</div>
      ${padHTML('green', s.pad, "shPad")}
      <div class="small muted" style="margin-top:6px">Style + finish vs <b>where you aimed</b>. Leave distance comes from your next shot.</div>`;
  } else if(s.fType==='lat'){
    resultCtl = `<div class="chips">${LATS.map(L=>`<button class="chip ${s.lat===L?'on':''}" style="min-width:56px" onclick="shSet('lat','${L}')">${L}</button>`).join('')}</div>
      <div class="small muted" style="margin-top:6px">${s.lat? LAT_NAME[s.lat]:'Finish vs. intended line — optional, feeds the heatmaps'}</div>`;
  } else {
    resultCtl = padHTML('green', s.pad, "shPad")
      + `<div class="small muted" style="margin-top:6px">Relative to <b>where you aimed</b>, not the pin or the green — back pin, aimed middle, finished front fringe is a "Short". Whether the green was hit comes from your next shot's lie.</div>`;
  }
  const fSwitch = s.lie==='GR'? '' :
    `<div class="chips" style="margin-bottom:8px">
       <button class="chip sm ${s.fType==='green'?'on':''}" onclick="shSet('fType','green')">Green attempt</button>
       <button class="chip sm ${s.fType==='lat'?'on':''}" onclick="shSet('fType','lat')">Layup / tee ball</button></div>`;
  const secTitle = kind==='putt'? 'The putt (optional)' : kind==='short'? 'The shot — style & finish (optional)' : 'Result — where it ended up (optional)';
  const moreBody = `
    <div class="sec">${secTitle}</div>
    ${kind==='full'? `<div class="small muted" style="margin:-2px 0 8px">Usually skip this: your next shot's distance + lie already records the result. Tap it when you want dispersion on the heatmaps, or to sharpen the carry math (long misses add, pin-high counts flat).</div>`:''}
    ${kind==='full'? fSwitch:''}${resultCtl}
    ${s.lie!=='GR'? `<div class="sec">Carry estimate (optional)</div>
    <div class="row"><input class="f num" style="width:110px" inputmode="numeric" placeholder="yds"
      value="${s.est||''}" onchange="SH.s.est=parseInt(this.value)||null">

    ${kind==='full'? `<div class="sec">Shape</div>`+padHTML('shape', s.shape, "shShape"):''}
    <div class="sec">Strategy tags</div>
    <div class="chips">${SHOT_TAGS.map(t=>

    </div>

    <div class="sec">Note</div>
    <input class="f" value="${esc(s.note)}" onchange="SH.s.note=this.value" placeholder="optional">`;

  openSheet(`
    <div class="sheetHd"><span class="t">${SH.idx==null?'Shot '+(curHole().shots.length+1):'Edit shot '+(SH.idx+1)} · Hole ${curHole().n}</span>

    <div class="sec">Lie</div>${lieSel}${penNote}

/** Render any 3×3 numpad (green/putt/shape) with axis labels; `fn` is the
 *  global click handler name. Shared by entry AND heatmaps. */
function padHTML(kind, sel, fn){
  const rows=padRows(kind), lab=PAD_LABELS[kind], ax=PAD_AXES[kind];
  const topAx = (kind==='shape'&&!S.settings.shapeTopDraw)? ['FADE ↑','DRAW ↓'] : ax;
  const hax=PAD_HAXES[kind]||PAD_HAXES.green;
  let b=`<div class="pad"><div class="axis"><span>${hax[0]}</span><span>${topAx[0]}</span><span>${hax[1]}</span></div>`;
  for(const row of rows) for(const d of row){
    b+=`<button class="${d===5?'pure ':''}${sel===d?'on':''}" onclick="${fn}(${d})">
        <span class="d">${d}</span>${S.settings.showLabels?`<span class="l">${lab[d]}</span>`:''}</button>`;
  }
  b+=`<div class="axis"><span></span><span>${topAx[1]}</span><span></span></div></div>`;
  return b;
}

/** Sheet field setter with the side-effect rules (lie change resets the
 *  result control, GR forces putter + feet, fraction clears effort…). */
function shSet(k,v){
  if(k==='lie'){ SH.s.lie=v; SH.s.fType=null; SH.s.pad=null; SH.s.lat=null;
    if(v==='GR'){SH.s.unit='f'; SH.s.clubId=putterId();} else {SH.s.unit='y'; if(SH.s.clubId===putterId()) SH.s.clubId=null;} }
  else if(k==='fType'){ SH.s.fType=v; if(v==='lat')SH.s.pad=null; else SH.s.lat=null; }
  else if(k==='frac'){ SH.s.frac = SH.s.frac===v? null:v; if(SH.s.frac)SH.s.effort=null; }
  else if(k==='strike'){ SH.s.strike = SH.s.strike===v? null:v; }
  else if(k==='intent'){ SH.s.intent = SH.s.intent===v? null:v; }
  else if(k==='line'){ SH.s.line = SH.s.line===v? null:v; }
  else if(k==='miss'){ SH.s.miss = SH.s.miss===v? null:v; }
  else if(k==='style'){ SH.s.style = SH.s.style===v? null:v; }
  else if(k==='tag'){ const a=SH.s.tags=SH.s.tags||[]; const i=a.indexOf(v); if(i>=0)a.splice(i,1); else a.push(v); }
  else { if(k==='clubId') SH.userPickedClub=true; SH.s[k]=v; }
  renderShotSheet();
}
/** Distance keypad input; re-suggests a club unless the player picked one. */
function shKey(k){
  if(k==='C') SH.distStr='';
  else if(k==='B') SH.distStr=SH.distStr.slice(0,-1);
  else if(SH.distStr.length<3) SH.distStr+=k;
  SH.s.dist = SH.distStr? parseInt(SH.distStr):null;
  if(SH.s.lie!=='GR' && !SH.userPickedClub){ const sg=suggestClub(SH.s.dist); if(sg) SH.s.clubId=sg; }
  renderShotSheet();
}
/** Result pad tap (toggle). */
function shPad(d){ SH.s.pad = SH.s.pad===d? null:d; renderShotSheet(); }
/** Shape pad tap (toggle). */
function shShape(d){ SH.s.shape = SH.s.shape===d? null:d; renderShotSheet(); }

/** Commit the draft into the hole (append or replace) and close. */
function saveShot(){
  const h=curHole(); const s=SH.s;
  s.dist = SH.distStr? parseInt(SH.distStr) : s.dist;
  if(SH.idx==null) h.shots.push(s); else h.shots[SH.idx]=s;
  closeSheet(); render();
}
/** This shot went in: save it marked holed (pad 5) and toast the hole's
 *  score. Works for putts AND hole-outs from anywhere. */
function holedOut(){
  const h=curHole(); const s=SH.s;
  s.dist = SH.distStr? parseInt(SH.distStr) : s.dist;
  s.pad = 5;
  if(!s.fType || s.fType==='lat') s.fType = s.lie==='GR'? 'putt':'green';
  s.lat=null; s.miss=null;
  if(SH.idx==null) h.shots.push(s); else h.shots[SH.idx]=s;
  closeSheet(); render();
  const d=deriveHole(h);
  toast(`Hole ${h.n}: ${d.score} (${d.toPar===0?'E':(d.toPar>0?'+':'')+d.toPar})${d.toPar<0?' 🐦':''}`);
}
/** Delete the shot being edited. */
function delShot(){ curHole().shots.splice(SH.idx,1); closeSheet(); render(); }
/** Reorder the shot up/down within the hole (post-hole reconstruction). */
function moveShot(d){ const a=curHole().shots; const j=SH.idx+d; if(j<0||j>=a.length)return;
  [a[SH.idx],a[j]]=[a[j],a[SH.idx]]; SH.idx=j; renderShotSheet(); render(); }
/** Insert a forgotten shot before the one being edited. */
function insertBefore(){ const h=curHole(); const ins=blankShot(); h.shots.splice(SH.idx,0,ins);
  SH={idx:SH.idx, s:h.shots[SH.idx], more:false, distStr:''}; renderShotSheet(); }

/* ═══════════════ src/js/12-stats.js ═══════════════ */
/* ============================================================
   STATS TAB — the payoff
   ============================================================
   Order on screen: filter chips → handicap → scoring (all
   normalized to per-18 so nines don't distort) → tee-to-green
   → putting + first-putt table → hot/best clubs → the three
   miss-pattern heatmaps → stock yardages → wedge matrix.

   HM = heatmap filter state {kind, clubId, span, band}.
   Quick-mode holes contribute their green pad (ov.girPad) to
   the green heatmap; shot-tracked holes feed everything.

   EXTENSION POINT — adding a stat card is: compute inside
   vStats() from `rds`/`agg`, append one ui.card()/template to
   the returned string. See hotClubsCard() as the model.
   ============================================================ */
let HM = {kind:'green', clubId:'', span:'all', band:''};   // heatmap filters

/** Flatten rounds → [{r,h,s}] for every shot (heatmaps, yardages). */
function allShots(spanRounds){
  const rs = spanRounds || finishedRounds();
  const out=[];
  rs.forEach(r=> r.holes.forEach(h=> (h.shots||[]).forEach(s=> out.push({r,h,s}))));
  return out;
}


/** The global filter chips (time window) + course dropdown driving STATF. */
function statFilterBar(){
  const times=[['all','All time'],['ytd','This year'],['l90','90 days'],['l5','Last 5']];
  const courses=[...new Set(finishedRounds().map(r=>r.courseId))].map(id=>S.courses.find(c=>c.id===id)).filter(Boolean);
  return `<div class="chips" style="margin-bottom:10px">
    ${times.map(t=>`<button class="chip sm ${STATF.time===t[0]?'on':''}" onclick="STATF.time='${t[0]}';render()">${t[1]}</button>`).join('')}
  </div>
  ${courses.length>1? `<select class="f" style="min-height:44px;margin-bottom:12px" onchange="STATF.courseId=this.value;render()">
    <option value="">All courses</option>
    ${courses.map(c=>`<option value="${c.id}" ${STATF.courseId===c.id?'selected':''}>${esc(c.name)}</option>`).join('')}</select>`:''}`;
}
/** The dashboard. Composed of cards top-to-bottom; see module header for
 *  the extension recipe. All scoring uses per-18 normalization. */
function vStats(){
  const rs=filteredRounds();
  if(!rs.length) return `<div class="pageTitle"><h1>Stats</h1></div>${statFilterBar()}
    <div class="card"><div class="bd"><p class="muted">No rounds match this filter yet. Finish a round and this page fills itself in: handicap, scoring, putting, heatmaps, stock yardages, the wedge matrix.</p></div></div>`;
  const tl=handicapTimeline();
  const idx=currentIndex();
  const rds=rs.map(r=>deriveRound(r));
  const n=rs.length;
  const r18=rs.filter(is18), r9=rs.filter(r=>!is18(r));
  const d18=r18.map(deriveRound), d9=r9.map(deriveRound);
  const scores18=d18.map(d=>d.score), scores9=d9.map(d=>d.score);
  const totHoles=rds.reduce((s,d)=>s+d.played,0);
  const per18=(tot)=> totHoles? tot/totHoles*18 : null;

  const shotRs = rs.filter(r=>!r.legacy);             // rounds with full shot detail
  const nShot = shotRs.length, nLegacy = n-nShot;
  // scoring by par (shot-tracked only: legacy holes carry no par)
  const byPar={3:[],4:[],5:[]};
  shotRs.forEach(r=>r.holes.forEach(h=>{const d=deriveHole(h); if(d.score!=null&&byPar[h.par]) byPar[h.par].push(d.score);}));
  // score distribution — Dbl+ bucket so 18Birdies aggregates merge cleanly
  const dist={eagle:0,birdie:0,par:0,bogey:0,dbl:0};
  shotRs.forEach(r=>r.holes.forEach(h=>{const d=deriveHole(h); if(d.score==null)return; const t=d.score-h.par;
    if(t<=-2)dist.eagle++; else if(t===-1)dist.birdie++; else if(t===0)dist.par++; else if(t===1)dist.bogey++; else dist.dbl++;}));
  rds.filter(d=>d.legacy).forEach(d=>{dist.eagle+=d.eagles;dist.birdie+=d.birdies;dist.par+=d.pars;dist.bogey+=d.bogeys;dist.dbl+=d.dblOrWorse;});
  // aggregates: FIR/GIR/putts blend legacy; scrambling/3-putt need shot detail
  const agg=rds.reduce((a,d)=>{a.firY+=d.firY;a.firD+=d.firD;a.girY+=d.girY;a.girD+=d.girD;a.pen+=d.pen;a.putts+=d.putts;
    if(!d.legacy){a.tp+=d.tp;a.udA+=d.udA;a.udM+=d.udM;a.sA+=d.sA;a.sM+=d.sM;a.holes+=d.played;} return a;},
    {firY:0,firD:0,girY:0,girD:0,tp:0,udA:0,udM:0,sA:0,sM:0,pen:0,putts:0,holes:0});
  // putts per GIR + first-putt detail (shot-tracked only)
  let pGIR=[],fp=[];
  shotRs.forEach(r=>r.holes.forEach(h=>{const d=deriveHole(h);
    if(d.gir==='Y') pGIR.push(d.putts);
    if(d.firstPuttFt!=null) fp.push({ft:d.firstPuttFt, made:d.firstPuttMade, putts:d.putts});}));
  // first-putt buckets
  const buckets=[[0,3],[4,6],[7,10],[11,20],[21,30],[31,999]];
  const bRows=buckets.map(b=>{
    const g=fp.filter(x=>x.ft>=b[0]&&x.ft<=b[1]);
    return `<tr><td class="num">${b[1]===999? b[0]+'+':b[0]+'–'+b[1]} ft</td>

      <div class="small muted" style="margin-top:6px">Differential = 113 ÷ slope × (adjusted gross − rating). Index = best 8 of last 20 (reduced table under 20). Last: ${tl.length&&tl[tl.length-1].diff!=null? r1(tl[tl.length-1].diff):'–'}</div>

/* ---------------- club form: best clubs + hot streaks ---------------- */
function hotClubsCard(rs){
  const shotRs = rs.filter(r=>!r.legacy);
  if(!shotRs.length) return '';
  const recent = new Set(shotRs.slice(-5).map(r=>r.id));
  const byClub = {};
  shotRs.forEach(r=>r.holes.forEach(h=>(h.shots||[]).forEach(s=>{
    if(s.fType!=='green'||!s.pad||!s.clubId) return;
    const b = byClub[s.clubId]=byClub[s.clubId]||{n:0,pure:0,rn:0,rp:0};
    b.n++; if(s.pad===5) b.pure++;
    if(recent.has(r.id)){ b.rn++; if(s.pad===5) b.rp++; }
  })));
  const rows = Object.entries(byClub).filter(([,b])=>b.n>=5)
    .map(([cid,b])=>({cid, n:b.n, pure:b.pure/b.n, rPure:b.rn>=3? b.rp/b.rn:null}))
    .sort((a,b)=>b.pure-a.pure).slice(0,6);
  if(!rows.length) return '';
  return `<div class="card"><div class="hd"><span class="t">Club form — green attempts</span></div><div class="bd tight">
    <table class="data"><tr><th>Club</th><th class="num">Attempts</th><th class="num">Pin-high %</th><th class="num">Last 5 rds</th></tr>
    ${rows.map(x=>{
      const hot = x.rPure!=null && x.rPure > x.pure+0.10;
      const cold = x.rPure!=null && x.rPure < x.pure-0.10;
      return `<tr><td><b>${esc(clubLabel(x.cid))}</b>${hot?' <span class="flame">🔥</span>':cold?' ❄️':''}</td>
        <td class="num">${x.n}</td><td class="num"><b>${Math.round(x.pure*100)}%</b></td>
        <td class="num">${x.rPure!=null? Math.round(x.rPure*100)+'%':'–'}</td></tr>`;}).join('')}
    </table>
    <div class="small muted" style="padding:8px 12px">Pin-high = finished 5 on the green pad. 🔥 running 10+ points above baseline over the last five rounds; ❄️ the opposite. Minimum 5 attempts.</div>
  </div></div>`;
}
/** Big-number + small-label cell used inside stat grids. */
function bignum(v,l){ return `<div><div class="num" style="font-size:24px;font-weight:800">${v}</div><div class="small muted" style="font-size:11px;text-transform:uppercase;letter-spacing:.08em;font-weight:700">${l}</div></div>`; }
/** "Course handicap at <last course>" line under the index. */
function courseHcpLine(idx){
  const last=finishedRounds().slice(-1)[0]; const tee=teeOf(last);
  if(!tee||!tee.slope) return '';
  const parT=last.holes.reduce((s,h)=>s+h.par,0);
  const ch=courseHandicap(idx,tee.slope,tee.rating,parT);
  return `<div class="small" style="margin-top:6px">Course handicap at ${esc(courseOf(last).name)} (${esc(tee.name)}): <b class="num">${ch}</b></div>`;
}
/** Minimal inline SVG sparkline (last point flagged red). */
function spark(vals){
  if(vals.length<2) return '';
  const w=300,ht=54,pad=4;
  const mn=Math.min(...vals),mx=Math.max(...vals),rg=(mx-mn)||1;
  const pts=vals.map((v,i)=>[pad+i*(w-2*pad)/(vals.length-1), ht-pad-(v-mn)*(ht-2*pad)/rg]);
  const last=pts[pts.length-1];
  return `<svg class="spark" viewBox="0 0 ${w} ${ht}" width="100%" height="${ht}">
    <polyline points="${pts.map(p=>p.map(x=>Math.round(x*10)/10).join(',')).join(' ')}"/>
    <circle cx="${last[0]}" cy="${last[1]}" r="3.5"/></svg>`;
}

/* ---------------- heatmaps ---------------- */
function heatmapCard(){
  const kinds=[['green','Green'],['putt','Putt'],['shape','Shape']];
  const spanRs = filteredRounds();
  const rows = allShots(spanRs);
  let counts={},total=0, latCounts=null;
  if(HM.kind==='shape'){
    rows.forEach(x=>{ if(!x.s.shape) return; if(HM.clubId&&x.s.clubId!==HM.clubId)return; if(!bandOK(x.s))return;
      counts[x.s.shape]=(counts[x.s.shape]||0)+1; total++; });
  } else if(HM.kind==='green'){
    rows.forEach(x=>{ if(x.s.fType!=='green'||!x.s.pad)return; if(HM.clubId&&x.s.clubId!==HM.clubId)return; if(!bandOK(x.s))return;
      counts[x.s.pad]=(counts[x.s.pad]||0)+1; total++; });
    if(!HM.clubId && !HM.band) spanRs.forEach(r=>!r.legacy&&r.holes.forEach(h=>{   // quick-score rounds contribute too
      if(h.ov&&h.ov.girPad){ counts[h.ov.girPad]=(counts[h.ov.girPad]||0)+1; total++; }}));
  } else {
    rows.forEach(x=>{ if(x.s.fType!=='putt'||!x.s.pad)return; if(!bandOKputt(x.s))return;
      counts[x.s.pad]=(counts[x.s.pad]||0)+1; total++; });
  }
  const max=Math.max(1,...Object.values(counts));
  const rowsHTML = padRows(HM.kind==='shape'?'shape':'green');
  const lab=PAD_LABELS[HM.kind];
  let padB=`<div class="pad heat">`;
  for(const row of rowsHTML) for(const d of row){
    const c=counts[d]||0; const op=c? 0.14+0.86*(c/max):0;
    const col = d===5? `rgba(24,92,55,${op})` : `rgba(210,46,46,${op})`;
    padB+=`<button class="${d===5?'pure':''}" style="background:${c? col:'var(--card)'};color:${op>0.55?'#fff':'var(--ink)'}">
      <span class="pct">${total? Math.round(100*c/total)+'%':'–'}</span>
      <span class="n">${lab[d]} · ${c}</span></button>`;
  }
  padB+='</div>';
  const clubOpts = `<option value="">All clubs</option>`+S.clubs.filter(c=>c.type!=='P').map(c=>`<option value="${c.id}" ${HM.clubId===c.id?'selected':''}>${esc(c.label)}</option>`).join('');
  const bands = HM.kind==='putt'? [['','All'],['0-6','0–6ft'],['7-20','7–20ft'],['21-99','21+ft']] : [['','All dist'],['0-100','≤100'],['101-150','101–150'],['151-200','151–200'],['201-999','200+']];
  return `<div class="card"><div class="hd"><span class="t">Miss patterns</span><span class="small muted num">${total} shots</span></div><div class="bd">
    <div class="chips" style="margin-bottom:8px">${kinds.map(k=>`<button class="chip sm ${HM.kind===k[0]?'on':''}" onclick="HM.kind='${k[0]}';HM.band='';render()">${k[1]}</button>`).join('')}</div>
    ${HM.kind!=='putt'? `<div class="row" style="margin-bottom:8px"><select class="f" style="min-height:42px" onchange="HM.clubId=this.value;render()">${clubOpts}</select></div>`:''}
    <div class="chips" style="margin-bottom:10px">${bands.map(b=>`<button class="chip sm ${HM.band===b[0]?'on':''}" onclick="HM.band='${b[0]}';render()">${b[1]}</button>`).join('')}</div>
    ${padB}
    <div class="small muted" style="margin-top:8px">${heatRead()}</div>
  </div></div>`;
}
/** Distance-band filter for full shots (yards). */
function bandOK(s){ if(!HM.band)return true; const [a,b]=HM.band.split('-').map(Number); return s.unit==='y'&&s.dist!=null&&s.dist>=a&&s.dist<=b; }
/** Distance-band filter for putts (feet). */
function bandOKputt(s){ if(!HM.band)return true; const [a,b]=HM.band.split('-').map(Number); return s.dist!=null&&s.dist>=a&&s.dist<=b; }
/** One-line interpretation hint per heatmap kind. */
function heatRead(){
  return {green:'Hot bottom row (1·2·3) = chronic short miss — take more club. Hot right column = right-miss pattern.',
    putt:'Vertical = pace, horizontal = start line vs your read. Hot 2 = good line, dying short. Hot 6 = pushed past. 5 is holed.',
    shape:'A corner that stays lit names the fault: 7-corner = hook family, 3-corner = slice family.'}[HM.kind];
}

/* ---------------- stock yardages ---------------- */
function clubShotDists(cid){
  const round=[], prac=[];
  // Round samples are CHAIN-DERIVED carries: distance-to-hole now minus
  // distance-to-hole next (direction-adjusted, see derivedCarry in the
  // engine). A player-entered estimate (s.est) wins; mishits & partials
  // are excluded so the stock number stays honest.
  finishedRounds().forEach(r=>{ if(r.legacy) return;
    r.holes.forEach(hh=> (hh.shots||[]).forEach((s,i)=>{
      if(s.clubId!==cid || s.unit!=='y') return;
      if(!['T','FW','RF','DR'].includes(s.lie)) return;
      if(s.strike||s.frac||(s.effort&&s.effort<95)) return;
      const c=derivedCarry(hh,i);
      if(c!=null && c>=20) round.push(Math.round(c));
    })); });
  S.practice.forEach(p=>(p.blocks||[]).forEach(b=>{ if(b.clubId!==cid||b.frac)return;
    (b.shots||[]).forEach(sh=>{ if(sh.carry) prac.push(Number(sh.carry)); }); }));
  return {round, prac, all:round.concat(prac)};
}
/** Median + 25-75% band per club, Δ-flag when reality drifts ≥8y from the
 *  set number — the missing-zone detector. */
function stockYardCard(){
  const rows=S.clubs.filter(c=>c.type!=='P').map(c=>{
    const d=clubShotDists(c.id);
    if(!d.all.length) return `<tr><td>${esc(c.label)}</td><td class="num muted">${c.stock||'–'}</td><td class="num muted" colspan="3">no data yet</td></tr>`;
    const med=median(d.all), lo=quantile(d.all,0.25), hi=quantile(d.all,0.75);
    const flag = c.stock && Math.abs(med-c.stock)>=8 ? ` <span class="tag" style="background:var(--sand);color:var(--amber)">Δ${Math.round(med-c.stock)}</span>`:'';
    return `<tr><td><b>${esc(c.label)}</b></td><td class="num muted">${c.stock||'–'}</td>
      <td class="num"><b>${r0(med)}</b>${flag}</td><td class="num">${r0(lo)}–${r0(hi)}</td>
      <td class="num small muted">${d.round.length}r+${d.prac.length}p</td></tr>`;
  }).join('');
  return `<div class="card"><div class="hd"><span class="t">Stock yardages</span></div><div class="bd tight">
    <table class="data"><tr><th>Club</th><th class="num">Set</th><th class="num">Median</th><th class="num">25–75%</th><th class="num">n</th></tr>${rows}</table>
    <div class="small muted" style="padding:8px 12px">Median from clean full swings (round + practice carry). Thin/heavy tags and partials are excluded. Δ flags where reality drifted 8+ yds from the set number — a missing-zone or club-up signal.</div>
  </div></div>`;
}

/* ---------------- wedge matrix ---------------- */
function wedgeMatrixCard(){
  const wedges=S.clubs.filter(c=>c.type==='Wg');
  if(!wedges.length) return '';
  const cell=(cid,frac)=>{
    const v=[];
    allShots().forEach(x=>{ const s=x.s; if(s.clubId!==cid||s.unit!=='y'||s.dist==null)return;
      const f = s.frac|| (s.effort&&s.effort<95? 'e':null) || 'full';
      if(frac==='full'&&f!=='full')return; if(frac!=='full'&&f!==frac)return; if(s.strike)return; v.push(s.dist); });
    S.practice.forEach(p=>(p.blocks||[]).forEach(b=>{ if(b.clubId!==cid)return;
      const f=b.frac||'full'; if(f!==frac)return; (b.shots||[]).forEach(sh=>{if(sh.carry)v.push(Number(sh.carry));}); }));
    return v.length? `<b>${r0(median(v))}</b><span class="small muted"> ·${v.length}</span>` : '<span class="muted">–</span>';
  };
  const rows=wedges.map(w=>`<tr><td><b>${esc(w.label)}</b></td>
    <td class="num">${cell(w.id,'½')}</td><td class="num">${cell(w.id,'¾')}</td><td class="num">${cell(w.id,'full')}</td></tr>`).join('');
  return `<div class="card"><div class="hd"><span class="t">Wedge matrix</span></div><div class="bd tight">
    <table class="data"><tr><th>Wedge</th><th class="num">½</th><th class="num">¾</th><th class="num">Full</th></tr>${rows}</table>
    <div class="small muted" style="padding:8px 12px">Median carry by swing length, from rounds and practice. Tag ½ / ¾ at entry and this table builds itself.</div>
  </div></div>`;
}

/* ============================================================
   STROKES GAINED CARD + PUTTING CRAFT
   ============================================================ */
/** The four SG categories with display metadata. */
const SG_CATS=[['ott','Off the tee','🚀'],['approach','Approach','🎯'],['short','Short game','⛳'],['putt','Putting','🥄']];
/** The target handicap SG is calibrated against: setting → current index → 10. */
function sgTargetHcp(){
  if(S.settings.sgTarget!=null && S.settings.sgTarget!=='') return Number(S.settings.sgTarget);
  const idx=currentIndex(); return idx!=null? Math.round(idx) : 10;
}
/** Strokes gained dashboard card: calibrated category bars, biggest-leak
 *  callout, raw-vs-scratch total, per-round trend. */
function sgCard(rs){
  const target=sgTargetHcp();
  const sum=sgSummary(rs.filter(r=>!r.legacy), target);
  if(!sum) return `<div class="card"><div class="hd"><span class="t">Strokes gained</span></div><div class="bd">
    <p class="small muted">Track a round shot-by-shot (distance + lie per shot) and SG appears here: which part of your game is leaking strokes versus a target ${target} handicap.</p></div></div>`;
  const worst=SG_CATS.reduce((a,c)=> sum.calCats[c[0]]<sum.calCats[a[0]]? c:a, SG_CATS[0]);
  const maxAbs=Math.max(0.6, ...SG_CATS.map(c=>Math.abs(sum.calCats[c[0]])));
  const bars=SG_CATS.map(c=>{
    const v=sum.calCats[c[0]], w=Math.min(100, Math.abs(v)/maxAbs*100);
    return `<div class="sgRow"><span class="sgLab">${c[1]}</span>
      <div class="sgTrack"><div class="sgBar ${v<0?'neg':'pos'}" style="width:${w/2}%;${v<0?'right:50%':'left:50%'}"></div><i></i></div>
      <span class="num sgVal ${v<-0.05?'bad':v>0.05?'good':''}">${v>=0?'+':''}${r1(v)}</span></div>`;
  }).join('');
  const trend=sum.rounds.map(x=> x.s.total / x.s.holesCounted * 18);
  return `<div class="card"><div class="hd"><span class="t">Strokes gained · per 18</span>
      <span class="small muted num">${sum.holes} holes</span></div><div class="bd">
    ${bars}
    <hr class="sep">
    <div class="banner" style="margin:0 0 10px">🎯 <span><b>${worst[1]}</b> is your leak — it costs the most strokes vs a ${target} handicap. That's where practice pays.</span></div>
    ${trend.length>=2? spark(trend):''}
    <div class="small muted" style="margin-top:6px">Bars = vs your target handicap (${target}), split by stroke share. Raw vs scratch: <b class="num">${sum.rawTotal>=0?'+':''}${r1(sum.rawTotal)}</b> per 18. Baseline: Broadie-style scratch tables. Change the target in Settings.</div>
  </div></div>`;
}
/** Putting-craft stats from the new putt fields: start line, lag leaves,
 *  read-based miss tendencies, intent split. Leave distance is the CHAIN:
 *  the next putt's entered distance. */
function puttCraft(rs){
  const putts=[]; // {s, made, leaveFt, first}
  rs.filter(r=>!r.legacy).forEach(r=> r.holes.forEach(h=>{
    (h.shots||[]).forEach((s,i)=>{ if(s.lie!=='GR') return;
      const nx=h.shots[i+1];
      putts.push({s, made:s.pad===5, leaveFt: nx&&nx.lie==='GR'? nx.dist:null,
                  first: !h.shots.slice(0,i).some(x=>x.lie==='GR')});
    });}));
  if(!putts.length) return '';
  // the compass axes: column 2-5-8 = started on line; row 4-5-6 = good pace
  const padded=putts.filter(p=>p.s.pad!=null);
  const onLine=padded.filter(p=>[2,5,8].includes(p.s.pad)).length;
  const goodPace=padded.filter(p=>[4,5,6].includes(p.s.pad)).length;
  const missPads=padded.filter(p=>!p.made);
  const cnt=(arr)=>missPads.filter(p=>arr.includes(p.s.pad)).length;
  const pulled=cnt([1,4,7]), pushed=cnt([3,6,9]), short=cnt([1,2,3]), long=cnt([7,8,9]);
  const lags=putts.filter(p=>p.first && p.s.dist>=21);
  const leaves=lags.map(p=> p.made?0:p.leaveFt).filter(x=>x!=null);
  const inside3=leaves.filter(x=>x<=3).length;
  const makers=putts.filter(p=> (p.s.intent||'')==='make' || (!p.s.intent && p.s.dist<=20));
  return `<hr class="sep"><div class="small" style="font-weight:800;margin-bottom:6px">Putting craft</div>
    <div class="grid3 center">
      ${bignum(padded.length? pct(onLine,padded.length):'–','started on line')}
      ${bignum(padded.length? pct(goodPace,padded.length):'–','good pace')}
      ${bignum(leaves.length? r1(mean(leaves))+"'":'–','avg leave 21ft+')}
    </div>
    ${missPads.length? `<div class="chips" style="margin-top:10px">
      <span class="stat ${pulled>pushed?'bad':''}">Pulled <b>${pct(pulled,missPads.length)}</b></span>
      <span class="stat ${pushed>pulled?'bad':''}">Pushed <b>${pct(pushed,missPads.length)}</b></span>
      <span class="stat ${short>long?'bad':''}">Short <b>${pct(short,missPads.length)}</b></span>
      <span class="stat ${long>short?'bad':''}">Long <b>${pct(long,missPads.length)}</b></span></div>
      <div class="small muted" style="margin-top:4px">Of ${missPads.length} compass-tagged misses. Left/right = start line vs your read; short/long = pace.</div>`:''}
    <div class="small muted" style="margin-top:6px">Make-intent putts: <b class="num">${pct(makers.filter(p=>p.made).length, makers.length)}</b> holed · lags inside 3ft: <b class="num">${leaves.length? pct(inside3,leaves.length):'–'}</b>. Leave = your next putt's distance — never entered twice.</div>`;
}

/* ============================================================
   SHORT-GAME STYLES & STRATEGY TAGS
   ============================================================
   The question this card answers is Mike's: "do I score better
   playing it safe or taking the shot on?" Metric = strokes
   gained per shot, grouped by tag/style, with proximity (the
   chain-derived leave) alongside for short-game styles.
   ============================================================ */
function craftCard(rs){
  const styleRows={}, tagRows={};
  SHORT_STYLES.forEach(y=>styleRows[y[0]]={n:0,sg:0,sgN:0,leaves:[]});
  SHOT_TAGS.forEach(t=>tagRows[t[0]]={n:0,sg:0,sgN:0});
  rs.filter(r=>!r.legacy).forEach(r=> r.holes.forEach(h=>{
    const rows=sgHole(h);   // may be null when distances are missing
    (h.shots||[]).forEach((s,i)=>{
      const sg = rows? rows[i].sg : null;
      if(s.style && styleRows[s.style]){
        const y=styleRows[s.style]; y.n++;
        if(sg!=null){ y.sg+=sg; y.sgN++; }
        const nx=h.shots[i+1];
        if(nx&&nx.lie==='GR'&&nx.dist!=null) y.leaves.push(nx.dist);
        else if(s.pad===5 && !nx) y.leaves.push(0);
      }
      (s.tags||[]).forEach(t=>{ if(!tagRows[t]) return; const g=tagRows[t]; g.n++;
        if(sg!=null){ g.sg+=sg; g.sgN++; } });
    });
  }));
  const anyStyle=Object.values(styleRows).some(x=>x.n);
  const anyTag=Object.values(tagRows).some(x=>x.n);
  if(!anyStyle && !anyTag) return '';
  const sRows=SHORT_STYLES.filter(y=>styleRows[y[0]].n).map(y=>{ const d=styleRows[y[0]];
    return `<tr><td><b>${y[1]}</b></td><td class="num">${d.n}</td>
      <td class="num">${d.leaves.length? r1(mean(d.leaves))+"'":'–'}</td>
      <td class="num ${d.sgN&&d.sg/d.sgN<-0.03?'':''}">${d.sgN? (d.sg/d.sgN>=0?'+':'')+(Math.round(d.sg/d.sgN*100)/100).toFixed(2):'–'}</td></tr>`; }).join('');
  const tRows=SHOT_TAGS.filter(t=>tagRows[t[0]].n).map(t=>{ const d=tagRows[t[0]];
    return `<tr><td><b>${t[1]}</b></td><td class="num">${d.n}</td>
      <td class="num">${d.sgN? (d.sg/d.sgN>=0?'+':'')+(Math.round(d.sg/d.sgN*100)/100).toFixed(2):'–'}</td></tr>`; }).join('');
  // the verdict line: smart vs (risky ∪ hero)
  const sm=tagRows.smart, rk={n:tagRows.risky.n+tagRows.hero.n, sg:tagRows.risky.sg+tagRows.hero.sg, sgN:tagRows.risky.sgN+tagRows.hero.sgN};
  let verdict='';
  if(sm.sgN>=5 && rk.sgN>=5){
    const a=sm.sg/sm.sgN, b=rk.sg/rk.sgN;
    verdict=`<div class="banner" style="margin:10px 0 0">${a>=b?'🧠':'🎲'} <span>${a>=b
      ? `The data sides with the <b>smart play</b>: ${(a-b).toFixed(2)} strokes better per shot than risky/hero.`
      : `Plot twist: your <b>risky/hero</b> shots are outscoring the smart play by ${(b-a).toFixed(2)} per shot. Sample: ${rk.sgN}.`}</span></div>`;
  } else if(sm.n||rk.n){
    verdict=`<div class="small muted" style="margin-top:8px">Verdict on smart-vs-risky arrives at 5+ SG-scored shots per side (${sm.sgN} vs ${rk.sgN} so far).</div>`;
  }
  return `<div class="card"><div class="hd"><span class="t">Styles & strategy</span></div><div class="bd tight">
    ${anyStyle? `<table class="data"><tr><th>Short-game style</th><th class="num">n</th><th class="num">Avg leave</th><th class="num">SG/shot</th></tr>${sRows}</table>`:''}
    ${anyTag? `<table class="data"><tr><th>Strategy tag</th><th class="num">n</th><th class="num">SG/shot</th></tr>${tRows}</table>`:''}
    <div style="padding:${verdict?'0 12px 12px':'0'}">${verdict}</div>
  </div></div>`;
}

  <datalist id="drillList">${DRILLS.map(d=>`<option value="${esc(d.name)}">`).join('')}</datalist>
  ${(()=>{const d=DRILLS.find(x=>x.name===p.focus); return d? `<div class="histLine" style="margin-top:8px">📋 <span class="small">${esc(d.how)}</span></div>`:'';})()}
  <label class="f">Notes</label><textarea class="f" onchange="prac().notes=this.value;save()">${esc(p.notes)}</textarea>
  <div class="sec">Ball flight blocks (TrackMan / launch monitor)</div>

  <button class="btn wide" onclick="addBlockSheet()">＋ Club block</button>

    <div style="padding:8px 12px"><button class="btn sm" onclick="prac().putting.push({});render()">＋ Drill row</button></div></div></div>

/* ============================================================
   TIPS — searchable, taggable swing-thought library
   ============================================================
   One tip may be pinned as "today's thought" and surfaces on
   the hole screen. Tips can carry a link and a photo (photos
   are canvas-compressed to ~100 KB before storing — they share
   the ~5 MB localStorage budget, hence the compression).
   ============================================================ */
let TIPQ='', TIPTAG='';
/** Search + tag-filtered tip list, pinned first. */
function vTips(){
  const tags=[...new Set(S.tips.flatMap(t=>t.tags||[]))].sort();
  const list=S.tips.filter(t=>{
    if(TIPTAG && !(t.tags||[]).includes(TIPTAG)) return false;
    if(TIPQ){ const q=TIPQ.toLowerCase(); return (t.title+' '+t.body+' '+(t.tags||[]).join(' ')).toLowerCase().includes(q);} return true;
  }).sort((a,b)=> (b.pinned?1:0)-(a.pinned?1:0));
  return `<div class="pageTitle"><h1>Tips & thoughts</h1></div>
  <button class="btn primary wide" onclick="tipEditor(null)">＋ Quick capture</button>
  <div style="height:10px"></div>
  <input class="f" placeholder="Search tips…" value="${esc(TIPQ)}" oninput="TIPQ=this.value;render();this.focus();this.setSelectionRange(this.value.length,this.value.length)">
  <div class="chips" style="margin:10px 0">${tags.map(t=>`<button class="chip sm ${TIPTAG===t?'on':''}" onclick="TIPTAG=TIPTAG==='${t}'?'':'${t}';render()">${esc(t)}</button>`).join('')}</div>
  ${list.map(t=>`<div class="tipCard">
    <div class="tt"><span>${t.pinned?'<span class="pinBadge">★ </span>':''}${esc(t.title)}</span>
      <span class="row"><button class="btn sm ghost" onclick="togglePin('${t.id}')">${t.pinned?'Unpin':'Pin'}</button>
      <button class="btn sm ghost" onclick="tipEditor('${t.id}')">Edit</button></span></div>
    ${t.body?`<div class="tb">${esc(t.body)}</div>`:''}
    ${t.photo?`<img src="${t.photo}" alt="">`:''}
    ${t.url?`<div style="margin-top:6px"><a href="${esc(t.url)}" target="_blank" rel="noopener">🔗 ${esc(t.url.replace(/^https?:\/\//,'').slice(0,42))}</a></div>`:''}
    <div>${(t.tags||[]).map(g=>`<span class="tag">${esc(g)}</span>`).join('')}</div>
  </div>`).join('') || '<p class="muted">Nothing matches.</p>'}`;
}
/** Pin as "today\u2019s thought" (only one at a time) — surfaces on the hole screen. */
function togglePin(id){ const t=S.tips.find(x=>x.id===id);
  if(!t.pinned) S.tips.forEach(x=>x.pinned=false); // one "today's thought" at a time
  t.pinned=!t.pinned; render(); }
/** Create/edit sheet: title, body, link, photo, tags with suggestions. */
function tipEditor(id){
  TIPPHOTO=null;
  const t=id? S.tips.find(x=>x.id===id) : {title:'',body:'',tags:[]};
  const sugg=['driver','irons','wedges','chipping','bunker','putting','mental','pre-shot','drill'];
  openSheet(`<div class="sheetHd"><span class="t">${id?'Edit tip':'New tip'}</span><button class="btn sm ghost" onclick="closeSheet()">Cancel</button></div>
    <label class="f">Title</label><input class="f" id="tipT" value="${esc(t.title)}" placeholder="Swing thought…">
    <label class="f">Body</label><textarea class="f" id="tipB">${esc(t.body)}</textarea>
    <label class="f">Link (optional)</label><input class="f" id="tipU" value="${esc(t.url||'')}" placeholder="https://youtube.com/…">
    <label class="f">Photo (optional)</label>
    <div class="row"><button class="btn sm" onclick="$('#tipP').click()">${t.photo?'Replace photo':'＋ Attach photo'}</button>
      ${t.photo?`<button class="btn sm ghost" onclick="TIPPHOTO='';this.previousElementSibling.textContent='＋ Attach photo';toast('Photo will be removed on save')">Remove</button>`:''}</div>
    <input type="file" id="tipP" accept="image/*" style="display:none" onchange="tipPhoto(this)">
    <label class="f">Tags (comma separated)</label><input class="f" id="tipG" value="${esc((t.tags||[]).join(', '))}">
    <div class="chips" style="margin-top:8px">${sugg.map(g=>`<button class="chip sm" onclick="tipTagAdd('${g}')">${g}</button>`).join('')}</div>
    <div style="height:12px"></div>
    <button class="btn primary wide" onclick="tipSave('${id||''}')">Save</button>
    ${id?`<div style="height:8px"></div><button class="btn wide danger sm" onclick="S.tips=S.tips.filter(x=>x.id!=='${id}');closeSheet();render()">Delete</button>`:''}`);
}
/** Append a suggested tag chip into the tags input. */
function tipTagAdd(g){ const el=$('#tipG'); const cur=el.value.split(',').map(s=>s.trim()).filter(Boolean);
  if(!cur.includes(g))cur.push(g); el.value=cur.join(', '); }
let TIPPHOTO=null;   // pending compressed photo for the open editor; ''=remove, null=unchanged
/** Compress a chosen image on-device (≤900px JPEG ~100 KB) before storing. */
function tipPhoto(inp){
  const f=inp.files[0]; if(!f) return;
  const img=new Image(); const rd=new FileReader();
  rd.onload=()=>{ img.onload=()=>{
      const max=900, sc=Math.min(1, max/Math.max(img.width,img.height));
      const cv=document.createElement('canvas'); cv.width=Math.round(img.width*sc); cv.height=Math.round(img.height*sc);
      cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
      TIPPHOTO=cv.toDataURL('image/jpeg',0.72);
      toast('Photo attached ('+Math.round(TIPPHOTO.length/1024)+' KB, stored on-device)');
    }; img.src=rd.result; };
  rd.readAsDataURL(f);
}
/** Validate + persist the tip (photo applied/removed via TIPPHOTO). */
function tipSave(id){
  const title=$('#tipT').value.trim(); if(!title){toast('Give it a title');return;}
  const tags=$('#tipG').value.split(',').map(s=>s.trim().toLowerCase()).filter(Boolean);
  const url=$('#tipU').value.trim();
  if(id){ const t=S.tips.find(x=>x.id===id); t.title=title;t.body=$('#tipB').value;t.tags=tags;t.url=url;
    if(TIPPHOTO!==null) t.photo = TIPPHOTO||undefined; }
  else S.tips.unshift({id:uid(),title,body:$('#tipB').value,tags,url,photo:TIPPHOTO||undefined,pinned:false,created:todayISO()});
  TIPPHOTO=null; closeSheet(); render();
}

/* ═══════════════ src/js/16-data.js ═══════════════ */
/* ============================================================
   DATA — backup, analysis exports, 18Birdies import
   ============================================================
   JSON     full state, restores with one tap (schema in 02-store)
   CSV      one row per shot + a SUMMARY row per hole; legacy
            imports emit summary-only rows
   AI text  compact per-hole blocks with g/p/s digit suffixes
   18B      merge-only, idempotent by source round id
   ============================================================ */
function vData(){
  return backBtn()+`<div class="pageTitle"><h1>Backup & export</h1></div>
  <div class="card"><div class="hd"><span class="t">Full backup</span></div><div class="bd">
    <p class="small muted">Everything — bag, courses, rounds, tips, practice, settings — as one JSON file. Round-trips cleanly and mirrors the relational schema (club, course, tee, hole_template, round, hole_play, shot, tip, practice_session, practice_shot).</p>
    <div class="grid2"><button class="btn primary" onclick="exportJSON()">Export JSON</button>
    <button class="btn" onclick="$('#impFile').click()">Import JSON</button></div>
    <input type="file" id="impFile" accept=".json,application/json" style="display:none" onchange="importJSON(this)">
  </div></div>
  <div class="card"><div class="hd"><span class="t">Analysis exports</span></div><div class="bd">
    <p class="small muted">Flat CSV: one row per shot plus a SUMMARY row per hole. Loads straight into MySQL.</p>
    <button class="btn wide" onclick="exportCSV()">Download shots CSV</button>
    <div style="height:8px"></div>
    <p class="small muted">AI text: the compact per-hole block format, ready to paste into a chat for analysis.</p>
    <button class="btn wide" onclick="exportAllText()">Copy all rounds as AI text</button>
  </div></div>
  <div class="card"><div class="hd"><span class="t">Import from 18Birdies</span></div><div class="bd">
    <p class="small muted">Request your data export from 18Birdies (Settings → Account → Request My Data), then pick the JSON file here. Courses and round history come in as summary rounds: hole strokes, putts, FIR and GIR. Re-importing a newer export is safe — rounds already imported are skipped, so you can top up your history any time.</p>
    <button class="btn primary wide" onclick="$('#imp18b').click()">Import 18Birdies JSON</button>
    <input type="file" id="imp18b" accept=".json,application/json,.txt" style="display:none" onchange="import18B(this)">
  </div></div>`;
}
/** Trigger a client-side file download via a Blob URL. */
function download(name, text, mime){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([text],{type:mime||'text/plain'}));
  a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),4000);
}
/** Full-state backup with schema/version envelope. */
function exportJSON(){
  const payload={app:'caddiebook',schema:1,exported:new Date().toISOString(),data:S};
  download('caddiebook-backup-'+todayISO()+'.json', JSON.stringify(payload,null,1),'application/json');
}
/** Restore a backup: REPLACES state (18B import merges; this doesn\u2019t). */
function importJSON(inp){
  const f=inp.files[0]; if(!f)return;
  const rd=new FileReader();
  rd.onload=()=>{ try{ const p=JSON.parse(rd.result); const d=p.data||p;
      if(!d.clubs||!d.rounds) throw 0;
      S=Object.assign(defaultState(),d); save(); toast('Backup restored.'); render();
    }catch(e){ toast('That file did not parse as a Caddie Book backup.'); } };
  rd.readAsText(f);
}
/** RFC-4180 quoting for one CSV value. */
function csvEsc(v){ v=v==null?'':String(v); return /[",\n]/.test(v)? '"'+v.replace(/"/g,'""')+'"':v; }
/** Shots CSV: one row per shot + SUMMARY per hole; imports summary-only. */
function exportCSV(){
  const head='date,course,hole,par,yardage,shot,club,lie,distance,unit,finish_type,finish,shape,effort,fraction,strike,note,score,putts,fir,gir,pen,sand,ud,three_putt';
  const rows=[head];
  finishedRounds().forEach(r=>{
    const cn=courseOf(r)? courseOf(r).name:'';
    if(r.legacy){
      r.holes.forEach(h=>{
        rows.push([r.date,cn,h.n,'','','SUMMARY','','','','','','','','','','','18Birdies import',
          h.strokes||'', '', '', '', '', '', '', ''].map(csvEsc).join(','));
      });
      return;
    }
    r.holes.forEach(h=>{
      (h.shots||[]).forEach((s,i)=>{
        const fin = s.fType==='lat'? (s.lat||'') : s.pad? s.pad+(s.fType==='putt'?'p':'g'):'';
        rows.push([r.date,cn,h.n,h.par,h.ydg||'',i+1,clubLabel(s.clubId),s.lie,s.dist!=null?s.dist:'',s.unit==='f'?'feet':'yards',
          s.fType||'',fin,s.shape?s.shape+'s':'',s.effort||'',s.frac||'',s.strike||'',s.note||'','','','','','','','',''].map(csvEsc).join(','));
      });
      const d=deriveHole(h);
      if(d.score!=null) rows.push([r.date,cn,h.n,h.par,h.ydg||'','SUMMARY','','','','','','','','','','','',
        d.score,d.putts,d.fir||'',d.gir||'',d.pen,d.sand,(d.udA? (d.udM?'Y':'N'):'-'),d.threePutt?'Y':'N'].map(csvEsc).join(','));
    });
  });
  download('caddiebook-shots-'+todayISO()+'.csv', rows.join('\n'),'text/csv');
}
/** One round in the compact AI format (fin-4g / fin-2p / shp-6s suffixes). */
function roundText(r){
  const lines=[];
  const cn=courseOf(r)? courseOf(r).name:''; const t=teeOf(r);
  lines.push(`ROUND ${r.date} ${cn}${t? ' ('+t.name+' '+ (t.rating||'?')+'/'+(t.slope||'?')+')':''}`);
  r.holes.forEach(h=>{
    const d=deriveHole(h); if(d.score==null && !(h.shots||[]).length) return;
    const wind=h.windD? ` wind${h.windD}${h.windS||''}`:'';
    lines.push(`H${h.n} P${h.par} ${h.ydg||'?'}${wind} | sc${d.score!=null?d.score:'?'} putts${d.putts} FIR-${d.fir||'?'} GIR-${d.gir||'?'} pen${d.pen} sand${d.sand} ud${d.udA?(d.udM?'Y':'N'):'-'}`);
    (h.shots||[]).forEach((s,i)=>{
      const fin = s.fType==='lat'? `fin-${s.lat||'?'}` : `fin-${s.pad||'?'}${s.fType==='putt'?'p':'g'}`;
      const bits=[`s${i+1}`, clubLabel(s.clubId), s.lie, s.dist!=null? s.dist+(s.unit==='f'?'ft':''):'', fin,
        s.shape?`shp-${s.shape}s`:'', s.frac?`f${s.frac}`:'', s.effort?`e${s.effort}`:'', s.strike||'', s.note?`"${s.note}"`:''].filter(Boolean);
      lines.push(' '+bits.join(' '));
    });
  });
  return lines.join('\n');
}
/** Copy a single round\u2019s AI text. */
function exportRoundText(id){
  const r=S.rounds.find(x=>x.id===id);
  copyText(roundText(r), 'Round copied — paste anywhere.');
}
/** Copy every shot-tracked round\u2019s AI text. */
function exportAllText(){
  copyText(finishedRounds().filter(r=>!r.legacy).map(roundText).join('\n\n'), 'All shot-tracked rounds copied.');
}
/** Clipboard write with an execCommand fallback for older WebKit. */
function copyText(txt,msg){
  const done=()=>toast(msg||'Copied.');
  if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(txt).then(done,()=>fallbackCopy(txt,done));
  else fallbackCopy(txt,done);
}
/** Hidden-textarea copy fallback. */
function fallbackCopy(txt,done){
  const ta=document.createElement('textarea'); ta.value=txt; document.body.appendChild(ta);
  ta.select(); try{document.execCommand('copy');}catch(e){} document.body.removeChild(ta); done();
}

/* ============================================================
   18BIRDIES IMPORT — merge, never replace; idempotent by source id
   ============================================================ */
function import18B(inp){
  const f=inp.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=()=>{ try{ const res=convert18B(JSON.parse(rd.result));
      toast(`Imported ${res.rounds} rounds and ${res.courses} new courses.` + (res.skipped? ` Skipped ${res.skipped} already imported.`:''));
      MOREVIEW='menu'; TAB='play'; PLAYVIEW='home'; render();
    }catch(e){ toast('Could not read that as an 18Birdies export.'); }
    inp.value=''; };
  rd.readAsText(f);
}
/** Pure converter: 18Birdies export JSON → legacy rounds + stub courses.
 *  Merge-only and idempotent (dedupes on the source round id). */
function convert18B(json){
  const md = json.myData||json;
  const act = (md.activityData&&md.activityData.rounds)||[];
  const clubs = ((md.clubData&&md.clubData.playedClubs)||[]);
  const nameById = {}; clubs.forEach(c=>{ nameById[c.clubId]=c.name; });
  // course per 18Birdies club: reuse by name, else create a stub (tees added later by hand)
  const courseIdByName = {};
  S.courses.forEach(c=>{ courseIdByName[c.name.toLowerCase()]=c.id; });
  let newCourses=0;
  function courseFor(name){
    if(!name) name='Imported course';
    const key=name.toLowerCase();
    if(!courseIdByName[key]){
      const c={id:uid(), name, tees:[]};
      S.courses.push(c); courseIdByName[key]=c.id; newCourses++;
    }
    return courseIdByName[key];
  }
  const have=new Set(S.rounds.map(r=>r.srcId).filter(Boolean));
  let added=0, skipped=0;
  for(const r of act){
    if(!r || !Array.isArray(r.holeStrokes) || !r.holeStrokes.length) continue;
    if(have.has(r.id)){ skipped++; continue; }
    const st=r.stats||{};
    const d=new Date(r.timestamp||Date.now());
    const date=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    S.rounds.push({
      id:uid(), legacy:true, source:'18birdies', srcId:r.id, finished:true,
      courseId: courseFor(nameById[(r.clubId&&r.clubId.id)||''] ), teeId:null, date,
      holes: r.holeStrokes.map((s,i)=>({n:i+1, strokes:s})),
      agg:{
        strokes:r.strokes, toPar:(typeof r.score==='number'? r.score : null),
        putts:st.putts||0,
        firY:st.fairwayMiddles||0, firD:st.fairwayHoleCount||0,
        girY:st.gir||0, girD:st.girHoleCount||0,
        eagles:(st.eagles||0)+(st.doubleEagleOrBetter||0)+(st.aces||0),
        birdies:st.birdies||0, pars:st.pars||0, bogeys:st.bogeys||0,
        dblOrWorse:st.doubleBogeyOrWorse||0
      }
    });
    have.add(r.id); added++;
  }
  save();
  return {rounds:added, courses:newCourses, skipped};
}


/* ═══════════════ src/js/17-init.js ═══════════════ */
/* ============================================================
   PLUMBING + BOOT
   ============================================================
   The bottom sheet (#sheetWrap/#sheet), toast notifications,
   fast-resume boot (reopen mid-round → straight back to the
   hole), aggressive save-on-hide, and a console bridge that
   exposes top-level state (S, HM, …) on window for debugging
   from Safari's Web Inspector.
   ============================================================ */
function openSheet(html){ $('#sheet').innerHTML=html; $('#sheetWrap').classList.add('open'); }
/** Hide the sheet, drop any shot draft, save. */
function closeSheet(){ $('#sheetWrap').classList.remove('open'); SH=null; save(); }
let toastT=null;
/** Transient pill notification above the tab bar. */
function toast(msg){
  let el=$('#toast');
  if(!el){ el=document.createElement('div'); el.id='toast';
    el.style.cssText='position:fixed;left:50%;transform:translateX(-50%);bottom:96px;background:var(--ink);color:#fff;padding:10px 18px;border-radius:999px;font-weight:700;font-size:14px;z-index:99;max-width:88%;text-align:center';
    document.body.appendChild(el); }
  el.textContent=msg; el.style.display='block';
  clearTimeout(toastT); toastT=setTimeout(()=>el.style.display='none',2600);
}
document.addEventListener('DOMContentLoaded',()=>{
  applyTheme();                                   // THEME overrides from theme.js
  $('#sheetWrap').addEventListener('click',e=>{ if(e.target.id==='sheetWrap') closeSheet(); });
  if(S.activeRoundId && activeRound()) { TAB='play'; PLAYVIEW='home'; }  // land on the round summary; Resume is one tap
  render();
});
window.addEventListener('pagehide', save);
document.addEventListener('visibilitychange', ()=>{ if(document.hidden) save(); });

/* debug/console bridge: expose top-level lexical state on window
   (lets you inspect S from Safari's console; harmless otherwise) */
try{
  Object.defineProperties(window,{
    S:{get:()=>S,set:v=>{S=v}}, CE:{get:()=>CE,set:v=>{CE=v}},
    HM:{get:()=>HM,set:v=>{HM=v}}, SH:{get:()=>SH,set:v=>{SH=v}},
    TIPQ:{get:()=>TIPQ,set:v=>{TIPQ=v}}, TIPTAG:{get:()=>TIPTAG,set:v=>{TIPTAG=v}},
    PLAYVIEW:{get:()=>PLAYVIEW,set:v=>{PLAYVIEW=v}}, VIEWROUND:{get:()=>VIEWROUND,set:v=>{VIEWROUND=v}},
    PRACVIEW:{get:()=>PRACVIEW,set:v=>{PRACVIEW=v}}, MOREVIEW:{get:()=>MOREVIEW,set:v=>{MOREVIEW=v}},
    TAB:{get:()=>TAB,set:v=>{TAB=v}}, CID:{get:()=>typeof CID!=='undefined'?CID:null,set:v=>{try{CID=v}catch(e){}}}, STATF:{get:()=>STATF,set:v=>{STATF=v}}
  });
}catch(e){}
